受想滅定與一分聲聞學者一分大乘所說不同一分聲聞學者以受想為心行有了受想就一定有心有了受與想情感的知識的一切分別一切苦惱都無法避免從厭患受想下手滅受想即一切心心所法滅而不起名為滅受想定這是阿那含三果以上的聖者為了身心的勞累所以修此以暫滅心心所法與涅槃相似但一分學者與大乘法說滅受想定為淨智現前徹證究竟法性的深定有受就有取著有想就有分別於一切而不起憶想分別超三界尋思所行境名為滅受想定得滅受想定即安住無所取著的涅槃究竟無上丁四受教得脫化比丘說是語時五百比丘不受諸法心得解脫來詣佛所頭面禮足在一面立化比丘說是語時五百比丘就不受諸法心得解脫得阿羅漢果如來教化的善巧方便真是不可思議這些比丘本已修得深定修所斷的煩惱可能幾乎已斷盡了所以一經善巧開導即斷盡三界一切見修所斷煩惱得究竟解脫既證阿羅漢果也就能於如來所說深法信解隨順通達不再偏滯於禪定所以還來詣佛所在到了以頭面禮佛足向佛致最敬的接足禮然後退在一面靜靜的立著這麼一來佛是心心相印而大眾卻不免驚疑了丙三密說丁一密論自證爾時須菩提問諸比丘言汝等去至何所今何從來諸比丘言佛所說法無所從來去無所至又問誰為汝師答言我師先來不生亦無有滅又問汝等從何聞法答言無有五陰十二入十八界從是聞法又問云何聞法答言不為縛故不為解脫故又問汝等習行何法答言不為得故不為斷故又問誰調伏汝答言身無定相心無所行是調伏我此下密說一科從文段來說這是五百比丘回來須菩提與他們作一連串的問答他們本著自證的心境而答覆正如中國禪者的作風一樣因他們的密說自證法門使法會大眾得益不少所以別出此一科以明正化巧化以外還有這密化一途這一連串問答可分三段一六番問答問修學歷程那時須菩提見五百比丘回來了心裡不免希奇當然大眾都有此感如來曾命須菩提去勸他們回來自己無能為力而謙辭了現在他們卻自己回來了這裡面定有一番因緣所以就問諸比丘汝等離此而去是到何所在今又從何處來這是想從他們的去處以了解他們為什麼回來諸比丘卻本著自證的心境作答佛所說的一切法無所從來去時也無所至不見一法有來處不見一法有去處佛說不來不去或說不來而來去無所至一切本來如此怎麼問我們的來蹤去跡呢須菩提聽了立刻意會到他們有了深徹的契入這一定從誰聽法修學了所以又問那誰為汝等的師長比丘們答道說起我們的師長那是先來不生以後也無有滅這是說佛弟子以法為師此外還有什麼師呢法性本來不生滅我們就這樣的依法順法而修證罷了須菩提聽懂他們的意思依正法為師又問那汝等從何而聞法呢這是說你們從什麼處悟入諸比丘答無有五陰五陰即五蘊的舊譯色受想行識為五陰陰是聚集義無有十二入入是處的舊譯眼耳鼻舌身意六根為內六入色聲香味觸法六塵為外六入內外六入為識所因處所以叫入無有十八界界是類別義十二處加眼識耳識鼻識舌識身識意識總名十八界即一一法有十八類別諸比丘的答意是無有五陰十二入十八界也就是五陰十二入十八界性空不可得我們從是而聞法悟入蘊界處三科為佛對眾生的分析以明我我所不可得或者又執著蘊界處為實有自性不解性空所以如來說法如本經的中道正觀都以觀蘊處界空為方便諸比丘也是這樣的聞思而悟入須菩提又問你們到底為了什麼為斷煩惱嗎為了生死嗎為得解脫嗎為成佛嗎到底為什麼去聞法觀空而悟入呢諸比丘答道我們不是為了繫縛也不是為了解脫而聞法這意思說煩惱本性空寂本無所縛怎麼為這繫縛的斷除而聞法解脫也本性空寂怎麼為這解脫的求得而聞法呢這正是不除妄想不求真了須菩提接著又問修證的動機是已經明白了但汝等習行何法而得入呢諸比丘答道我們所修行的法門是不為了有所得也不為了有所斷無所得無所斷的法門不是別的就是般若波羅蜜須菩提知道他們已得調伏如牧牛調馬已馴順如法所以又問誰調伏了汝等呢諸比丘答道誰能調伏誰呢只是通達身無決定相心無所行沒有所緣慮的影像身空心寂就是這樣的調伏了我們換句話說因身空心寂而得調伏又問何行心得解脫答言不斷無明不生明故又問汝等為誰弟子答言無得無知者是彼弟子又問汝等已得幾何當入涅槃答言猶如如來所化入涅槃者我等當入又問汝等已得己利耶答言自利不可得故又問汝等所作已辦耶答言所作不可得故又問汝等修梵行耶答言於三界不行亦非不行是我梵行又問汝等煩惱盡耶答言一切諸法畢竟無盡相故又問汝等破魔耶答言陰魔不可得故二八番問答約究竟解脫作問須菩提又問你們是心得解脫了但是以何行心什麼心行得解脫呢以貪心得解脫還是以無貪心得解脫以瞋行心癡行心得解脫還是離癡心得解脫呢這是都不能得解脫的如說貪心貪心是煩惱怎麼能得解脫如說離貪心離貪心就是解脫怎麼能得解脫難道解脫心又得解脫嗎這些並如中觀法門所明比丘們約明無明作答不斷無明也不生明煩惱本無所斷般若明本來不生這樣的通達即得解脫所以非無明心行也非明心行須菩提又問究竟解脫的聲聞是依師的如中國禪者即使悟入了也要求師印證汝等不在佛的法會中得悟入那你們是誰的弟子呢諸比丘答凡無得無知者我們就是他的弟子無得是無有法而可證得無知是無智為能證無知無得即理智一如的聖證聖者是理和同證心心相印所以誰能無知無得誰就印證了我們我們為他的弟子須菩提又問汝等已得究竟解脫那幾時當入涅槃呢涅槃為畢竟空寂性的現證入涅槃聲聞法以為阿羅漢最後死了不再受生死而契入畢竟不生的寂滅性須菩提以此相問諸比丘答道猶如如來所化的化人入涅槃了那我等也當入涅槃但是如來的所化如幻如化幻起而無所從來幻滅而無所至幻性本空示現生死而不落生死不落三世這樣的化人有什麼涅槃可入還有什麼時間呢比丘們現證寂滅達一切如幻如化就是涅槃亦復如幻如化這有什麼定相可問呢須菩提又問這樣汝等是已得己利了聲聞以自己的生死解脫為己利須菩提也就這樣的問諸比丘答己利嗎有自己才可說己利不見有自己可得那有什麼己利呢所以說自利不可得其實這才真能得自利呢聲聞證究竟果都以四句話來表示自己的證境我生已盡梵行已立所作已辦不受後有以下須菩提就以其中二句來問汝等所作的證涅槃事已成辦了嗎諸比丘答所作是不可得的沒有所作可得這才成辦了自己的所作又問汝等已修梵行嗎上問證滅此問修道諸比丘答於三界法而不行也非不行這是我們所修的梵行如有行可修行於三界那是生死行如什麼都不行那也就不成修行所以非行非不行須菩提又問汝等的煩惱都斷盡了嗎諸比丘答一切諸法空寂畢竟無盡滅相可得煩惱也一切法所攝怎麼可說盡呢須菩提又問汝等破魔了嗎魔是惡者為生死法的攝屬者究竟解脫即不落魔界所以說破魔魔有煩惱魔陰魔死魔天魔四類這裡約五陰魔說五陰五蘊為生死法眾生取著五蘊從蘊生取不離生死所以說五陰為魔現在諸比丘答道陰魔性空不可得就這樣的破了陰魔又問汝等奉如來耶答言不以身心故又問汝等住福田耶答言無有住故又問汝等斷於生死往來耶答言無常無斷故又問汝等隨法行耶答言無礙解脫故又問汝等究竟當至何所答言隨於如來化人所至三五番問答約解脫以後作問經上來的問答已表示諸比丘已確實究竟解脫所以須菩提又問汝等奉如來嗎奉是承事供養的意思佛弟子從佛出家法恩深極理應供養承事以報世尊的法恩一切供養中法供養最上法供養是依法修行知法證法契合如來教化的本懷所以諸比丘答道當然供奉如來但這是不以身心的不是以身體供侍如來也不是心念佛恩感激不盡我們是達身心空不可得是真奉佛須菩提又問汝等住福田嗎阿羅漢義譯為應供應受世間的供養阿羅漢身心清淨真能受人的供養能報施主的恩德凡布施供養阿羅漢的得大果報如像種子種在良田裡一樣所以阿羅漢住福田位應受世間的供養諸比丘答是的為眾生作福田是因為心無有住如有所住著就不是福田了從前禪宗有一故事有婆子建一草庵供養一位禪者已二十年後經婆子的考驗那禪者還是心有所住不能佛魔平等善惡一如於是放火燒了草庵說二十年供養了一位光頭俗漢也就是說心有所住就不值得供養不名福田須菩提又問那汝等已斷於生死往來不再受生死了諸比丘答一切法無常無斷生死也無常無斷這對世俗來說既不是常在生死也不是斷盡生死這有什麼往來不往來呢這在大乘即於畢竟空寂中悲願內熏盡未來際而不離生死如是聲聞乘就於畢竟空寂中一切戲論永息須菩提又問這樣汝等是隨法行了一切依於法順於法與法相應叫法隨法行諸比丘答是的隨法行不是隨什麼不隨什麼法正法性無在無不在所以於一切無礙而得解脫是隨法行無礙解脫也就是不思議解脫一一無非解脫門須菩提最後又問汝等究竟當至何所在呢也就是問究竟的歸趣現在是解脫了無所謂了生死不了生死無所往而不解脫難道就這樣下去嗎隨世間法說總該有一究竟的歸趣諸比丘答究竟的歸趣當然是涅槃了但涅槃如幻如化畢竟空寂實沒有能入所入能到所到可說如一定要問究竟那我們是隨於如來所化的化人化人所至處也就是我們所到達處而化人實無所至那我們也無所謂究竟到達處了這五百位比丘是如來化人所教化的所以在問答深義中也就當地風光以化人為喻丁二時眾開解須菩提問諸比丘時有五百比丘不受諸法心得解脫三萬二千人遠塵離垢得法眼淨須菩提問諸比丘諸比丘一一以自證的境地作答這等於隱密的在宣說甚深法門所以那時就有五百比丘不受諸法心得解脫證阿羅漢果還有三萬二千出家或在家人聽了也遠塵離垢得法眼淨證得了初果從這些看來須菩提起初不願勸化諸比丘這時又與諸比丘問答實是在如來教化中擔負一種助佛揚化的責任如真以為須菩提不能不知就誤會了甲三流通分乙一問答修學丙一普明問爾時會中有普明菩薩白佛言世尊菩薩欲學是寶積經者當云何住當云何學流通分有問答修學時眾奉行二科由普明菩薩發起所以本經又稱普明菩薩會普明菩薩的問答是重要的但在全經中只是流通部分所以以普明菩薩為經名不大恰當本經異譯遺日摩尼寶經流通分非常簡單沒有本經流通部分摩訶衍寶嚴經與世親菩薩造論所依的寶積經本也與本經不同流通分由須菩提起問如來宣說持經功德及身口意各十種清淨唯趙宋譯的大迦葉問大寶積正法經流通部分是綜合了寶嚴經世親所依經本及本經也說是普明菩薩問的這可見本經的流通分梵本多有不同因此以普明菩薩為經名越覺得不妥當了在那時法會中有名為普明以慧光普照得名菩薩的出來啟白佛說世尊如菩薩欲學是寶積經如來上面所說的寶積法門應當怎樣的安住應當怎樣的修學普明菩薩所提出的住是心住於正法與正法相應而不動學是種種修行金剛經以住行降伏其心三句來啟問本經以住學來啟問據如來的開示來說如來是綜合的答覆應這樣的住心而修學這是菩薩的修學法所以在這流通分中清楚地顯出了大乘學者的面目這所以在本經中雖屬流通也是非常的重要丙二如來答丁一不住相學佛言菩薩學是經所說皆無定相而不可取亦不可著隨是行者有大利益如來開示修學的方法有四一不住相學佛說菩薩學是寶積經應該是這樣的對如來上面所說的一切能信解皆無定相如幻如化而不可取的不可取也就不可著取是持取著是堅持不捨但這不是說可取而不要取可著而不要著是說本沒有可取可著的如夢中的忽貪忽瞋覺得不應起貪瞋因為並沒有可貪可瞋的真實存在如菩薩能隨順這不取不著相而修行那就有大利益不但能得己利而且自他兩利福慧具足丁二大精進學普明譬如有乘坏船欲渡恆河以何精進乘此船渡答言世尊以大精進乃可得渡所以者何恐中壞故佛告普明菩薩亦爾欲修佛法當勤精進倍復過是所以者何是身無常無有決定壞敗之相不得久住終歸磨滅未得法利恐中壞故二大精進學佛告普明譬如有的乘了一艘坏船雖已造成船形但還沒製造完密乘這樣的船想渡過極寬闊而水流又急的恆河你想這應以何等的精進努力來乘此船而橫渡呢普明菩薩答道這是要以極大精進才可能得渡為什麼呢因為船質太差河面太闊恐怕船到中流來不及渡河船就壞了啦佛告普明菩薩說菩薩也應該這樣的修學佛法如上所說的寶積法門應當勤勉精進比起乘坏船渡恆河要加倍的超過渡河的精進才行為什麼菩薩應有更大的精進大寶積法門如恆河那樣的廣大本不是一下就能學成了的而菩薩的身體也許比坏船更不如呢佛說是身無常在息息生滅中無有定相可得身體不斷的變化什麼時候死全沒有一定所以身體的壞敗變異相是必然如此的怎麼也不得久住終歸磨滅人生必有一死只是遲早而已所以在修學寶積法門時未得法利信解通達悟入正法的利益有誰能保證到幾歲一定能悟入呢這個身體是必壞的卻又不知什麼時候要壞如不趁早努力修學忽而因病死了要修也來不及了豈非可惜所以死稱死魔為障道的一大因緣那麼如修學而未得法益不應該特別精進以求悟入嗎因為正像船到中流恐怕這身體在修學中間忽然壞了這是現身急於求得法利的精進古代中國禪師很有這種精神有的怕現身不能成辦所以佛開淨土彌陀淨土藥師淨土彌勒淨土等法門以確保來生的見佛聞法成就大乘信心的不退也有深信因果雖說死了可惜而到底善根深植所學不虛未來一定能以此而得入所以只是盡力修學去丁三為眾生學我在大流為渡眾生斷於四流故當習法船乘此法船往來生死度脫眾生云何菩薩所習法船謂平等心一切眾生為船因緣習無量福以為牢厚清淨戒板行施及果以為莊嚴淨心佛道為諸材木一切福德以為具足堅固繫縛忍辱柔軟憶念為釘諸菩提分堅強精進最上妙善法林中出不可思議無量禪定福德業成善寂調心以為師匠畢竟不壞大悲所攝以四攝法廣度致遠以智慧力防諸怨賊善方便力種種合集四大梵行以為端嚴四正念處為金樓觀四正勤行四如意足以為疾風五根善察離諸曲惡五力強浮七覺覺悟能破魔賊入八真正道隨意到岸離外道濟止為調御觀為利益不著二邊有因緣法以為安隱大乘廣博無盡辯才廣布名聞能濟十方一切眾生而自唱言來上法船從安隱道至於涅槃度身見岸至佛道岸離一切見如是普明菩薩摩訶薩應當修習如是法船以是法船無量百千萬億阿僧祇劫在生死中度脫漂沒長流眾生三為眾生學菩薩的修學佛法是為了眾生要利益眾生就必須自己修治悟入所以菩薩是為了利他而自利從利他中完成自利如專為了自己這樣那樣就不是菩薩風格而是聲聞了如來開示這一重要的學習法說菩薩應這樣的想我在生死大流中為了要渡脫生死眾生使他們斷於四流欲流有流見流無明流眾生為煩惱而漂流生死如在瀑流的漂蕩洄漩中不能自脫一樣所以度脫生死河中的眾生主要為斷眾生的煩惱煩惱如瀑流一樣所以叫四瀑流要渡生死瀑流中的眾生應當修習佛法而這一切佛法如能在河流中往來的船隻一樣所以譬喻為法船學習佛法而有所成就如有了法船一樣可以乘此法船往來生死河流自己依法船而不致陷溺也就能在生死河中度脫眾生這樣的佛法船自度度他是菩薩所應勵力修學的那到底什麼是菩薩所習學的法船呢這當然是一切佛法以法為船所以就以種種佛法功德來比喻船隻所有的一切先舉一一的譬喻一修平等心救護一切眾生這一切眾生為成就法船的因緣因緣不具足造船不能成就佛法依眾生而起沒有眾生也就沒有佛法所以於一切眾生的平等心為法船的因緣二修習無量福德主要是清淨戒行有了清淨戒那就人間天上不會墮落否則自己淪墜惡道還想救眾生嗎這無量福德為牢固堅厚的清淨戒行如船板一樣牢固堅厚不會沈沒三修行布施及布施的果報在人天中受種種的富樂自在就以此為法船的莊嚴莊嚴即精美的裝飾富麗堂皇四淨心佛道於佛菩提而生清淨信心菩提心為成就法船的諸材木這是造作大船的主材如房屋有棟樑一樣五除上布施持戒淨信以外廣修其他的一切福德這一切福德以為法船所有的具足而堅固的繫縛什麼是繫縛如船隻要有足夠而堅固的纜索才可以牢繫上岸六修忍辱心性柔軟不失正憶念這樣的柔忍而攝受眾生正念而不忘佛道為法船的釘子緊密的結合而不致破散七諸菩提分是成就菩提的因素這都從堅強精進中修習成就這些菩提分法如造成法船的一切材木從精進中來所以是從最上妙善的法林中出來八修不可思議的無量禪定無量是四無量禪是四禪定是四無色定合為十二門禪以福德業所成就的這些極善靜寂極善調伏的定心以為造成法船的工師匠人工師的審慎精製如以定心而成就一切功德九法船是盡未來際的廣度眾生這是由於畢竟不壞不變異的大悲心所攝受依大悲心而以布施愛語利行同事四攝法來攝導眾生悲心是這樣的深徹堅固四攝是這樣的方便攝受所以法船能廣度眾生致遠到達極遠的目的地廣度是化眾生致遠是成佛道十在法船的往來生死中以智慧力覺照一切這才能防護諸怨賊不為魔外煩惱所壞十一從智慧所起的善方便力能種種合集四大梵行四梵行是慈無量令一切眾生得樂悲無量令一切眾生脫苦喜無量見眾生的得福樂而隨喜捨無量於一切眾生住平等捨這方便所起的梵行以為法船的大莊嚴十二四正念處身念處受念處心念處法念處為法船上的金樓觀什麼是金樓觀在船的上層高處建一金屬的樓臺以便瞭望海中的一切四念處觀一切法不淨苦無常無我如金樓觀一樣十三四正勤行四如意足是精進力定通力能推進大乘法船往來生死海救度眾生所以如推動船帆的疾風一樣十四五根是信進念定慧以慧根為主所以能善巧觀察法船所行的航道遠離諸險曲的惡道而平安的前進十五五力呢那是強大的浮力能載重而不致沈沒十六七覺分能覺悟大眾的昏迷所以能破魔賊如船在海中能隨時覺察就不會為海盜等侵襲十七八正道如八條正確的航線法船進入八真正道就能隨意到達涅槃彼岸安穩的上岸遊樂不會誤入歧途所以能離外道濟濟是津濟也就是渡頭碼頭外道渡頭即外道教化到達的地方十八止與觀為修行的主要法門在大乘法船中以修止為調御即駕駛者一心一意的駕駛如制心一處的止又以修觀為真實利益因為唯有正觀才能得真實的自利利他十九這樣的法船運眾生從此岸到彼岸又從彼還來此岸不著於生死涅槃的二邊無盡的利濟眾生二十有無量法門的因緣法圓滿究竟所以能為眾生作安隱能得安樂上來二十句以佛法喻船的一切以船喻佛法的救度眾生菩薩應修學佛法從生死海中度脫眾生如船一樣而修學法門得成就的人菩薩就如船主一樣上面說明了法船以下要說法船的主導者菩薩怎樣的宣傳號召引導眾生來同登法船呢大乘菩薩具備了廣博的無盡辯才這對於折伏外道化導愚蒙是非常重要的經說四無礙解法無礙解義無礙解詞無礙解樂說無礙解有了這四無礙解才能說法的辯才無盡這樣的大菩薩真的無人不知菩薩有了這樣的功德所以德聲廣布名聞十方也就因此能濟度十方一切眾生菩薩以此法船度眾生時自己宣唱佛法說來大家來登上這佛法的大船大家如登上這法船就是歸依三寶依法修學這樣生死苦海中的眾生就能從安隱與穩同的正道一直前進而至於涅槃這就是度脫身見我見的此岸而至佛道的彼岸要知道不脫生死只是我見繫縛有了我見就是世間就是生死就是此岸一切法空無我是破除我見而入佛道的正道所以要到佛彼岸必須離我見為本的一切見有我見就有常見斷見一見異見有見無見六十二種見趣如滋蔓叢生不易清除唯有截除我見根本一切枝末的見趣才從此永盡斷我見離一切見的佛道就是一切法空無我無相無願不生不滅不取不捨的正法菩薩以法船度眾生主要是宣揚正法以正法來號召攝受眾生救脫眾生於生死大海為眾生學的法船普度已如上廣說末了結告普明菩薩菩薩摩訶薩應當修習這樣的法船以是法船在無量百千萬億阿僧祇無量數劫中一直在生死中度脫漂沒於長流的眾生眾生在生死流中頭出頭沒如不遇佛法永無了日所以說長流所說的無量百千萬億阿僧祇劫舉一極長的時間來說其實菩薩的廣度眾生是盡未來際無窮無盡菩薩應這樣的度眾生就不能不為了眾生而修習這樣的法門丁四速疾道學又告普明復有法行能令菩薩疾得成佛謂諸所行真實不虛厚習善法深心清淨不捨精進樂欲近明修習一切諸善根故常正憶念樂善法故多聞無厭具足慧故破壞憍慢增益智故除滅戲論具福德故樂住獨處身心離故不處憒鬧離惡人故深求於法依第一義故求於智慧通達實相故求於真諦得不壞法故求於空法所行正故求於遠離得寂滅故如是普明是為菩薩疾成佛道四速疾道學佛又告普明此外還有隨法順法的法行能令菩薩疾得成佛法門是這樣的廣大甚深身命又如此的危脆難保如未得法利而就死了被可憐為如入寶山空手回所以怎樣的容易成佛迅速成佛為佛弟子的普遍要求佛也就在這開示修學時明白地提出了這一修學法古人比喻如船在港汊河渠中一天不過行幾十里拉縴搖槳還是那麼艱苦如一旦船到大海那時風帆飽滿被形容為瞬息千里修行也是這樣專在事相上修行修行又難功德又少如能與法相應心心流入法性大海那就捷疾無比金剛經說釋迦在然燈佛處悟入無生法忍比之以前的久劫修行是不能相比的悟入法性才能易疾成佛雖然如來適應眾生根性說些易行易成法門唯與法相應的法行才是第一義悉檀如說極樂世界種種莊嚴為易行道這是說極樂世界修行容易穩當決定能不退轉菩提心並非說容易成佛生了淨土還得修行一直到得無生忍才能通入法性大海一帆風順還有些說欲樂為方便容易成佛那無非世界悉檀以欲鉤牽使人樂於修學而已又有些經文為了懈怠眾生聽說三大阿僧祇劫修行就心怯引退所以說三生一生即可成佛那是對治悉檀有的不知佛法人人可修人人可成懷疑自己於是佛說一切眾生有如來藏性眾生即佛指心本淨性為成佛因以啟發向上向善的菩提心那是為人悉檀然約究竟義說唯般若與法相應才能入法性海疾成佛道佛說疾易成佛的修學有十四句分三三根本六要行五求真實三根本是直心深心菩提心與維摩詰經所說的一樣一所行真實不虛是直心從現相說真實不虛是心性質直沒有諂曲約實質說那是般若與真如相應是正觀諸法空性大乘起信論以正念真如為直心正觀實相法性本空並非落空成病而是以般若無所得為方便所以能厚集善法如般若經說厚集是無邊積集的意思二深心菩薩的大悲心深徹骨髓悲與般若相應名為無緣大悲悲心清淨雖法性空不可得而以悲願力不捨精進利益眾生三菩提心菩薩樂欲志願愛樂近明明是菩提的覺明近明是向於菩提臨近菩提這是願菩提心以菩提心為本修習一切諸善根這直心深心菩提心即大乘三要菩提願大悲心真空見大乘法必備這三心有三心才直向佛道如離卻三心一切修行都不名為大乘法了六要行是一菩薩心恆常正憶念如念佛念法念僧念無常無我念法性本空本淨等菩薩樂於善法所以一心正念常時現前二多聞佛法而無厭足心因法義甚深廣大無邊所以聽法無厭才能具足智慧三菩薩應破壞自心的憍慢謙卑和順這才不致得少為足能增益智慧四除滅一切愛見戲論心在正道所以能積集具足一切福德否則大好時光盡從戲論閑話中過去了五樂住獨處這是身心遠離取相遠離煩惱所以無往而不寂靜六不處憒鬧的地方為什麼喧囂吵鬧只是有了不清淨不如法的人如遠離惡人那諸上善人共會一處即使人天雲集也一樣的安靜呢以上六行仍著重為出家菩薩說五求真實本著三心而行六行以及六度等法門而心心念念唯求真實一深求於法依第一義而求所求的是勝義法如求世俗法事相法既非真實也就不易成佛二求於智慧這不是世俗偏邪智慧而是通達實相的如實智即般若三求於真諦求那非虛妄不倒亂的這就是得不壞法不壞法即法性常住不變不異得常法性即一得永得不再失壞了四求於空法這由於所行中正正觀正念而能悟入五求於遠離這是真遠離不起一切戲論離煩惱息生死證得涅槃寂滅這五求只是求於智證空性體實相而究竟寂滅如是的依三根本心修六要行求五真實普明這就是菩薩速疾成佛的唯一要道了乙二時眾奉行說是經時普明菩薩大迦葉等諸天阿修羅及世間人皆大歡喜頂戴奉行寶積法門的修行法也已為普明菩薩說了從始至終法門圓滿即以時眾奉行為總結結集者敘述說如來說是寶積經時始終圓滿大乘行者如普明菩薩等聲聞行者如大迦葉等還有人天大眾如諸天阿修羅及世間人凡在法會中見佛聞法的莫不皆大歡喜對於這寶積法門看作最可尊貴的頂戴高舉信奉而願意實行當時大眾能頂戴奉行自然能傳持不絕流通末世了
