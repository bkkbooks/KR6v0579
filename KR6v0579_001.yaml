body:
  text: 民國五十一年講於臺北慧日講堂懸論一大寶積經與寶積經大寶積經共一百二十卷是唐代的菩提流志在武后神龍二年開譯到先天二年編譯完成的在中國佛教界大寶積經被稱為五大部之一有著崇高的地位這部大寶積經共有四十九會也就是四十九部經的纂集雖然是菩提流志奉詔翻譯其實只能說是譯編因為四十九會當中如古人翻譯得很精確就不再新譯如古譯文義艱澀或者脫落或者古人還沒有譯出的這才加以翻譯所以現在的大寶積經實是多數人翻譯的編集菩提流志新譯的凡二十七會古師所譯的共二十二會論卷數菩提流志新譯的不過三分之一只因為到菩提流志手中大部才編集完成所以一般說是菩提流志所譯的本經為什麼稱為寶積有人以為大寶積經是一部叢書所以寶積是多種經典法寶總集的意思當然大寶積經被作為多種經典的編集在玄奘法師時代早就如此了據慈恩傳說奘師去世那一年元旦曾因寺僧的勸請而試譯大寶積經但真正說起來現在所要講的普明菩薩會大寶積經第四十三會第一百十二卷才是原始的寶積經而現在的大寶積經只是附合寶積二字將四十九部不同的經典編集在一起而已所以現在的四十九會性質互不相同既沒有一貫的論題也說不上前後的一定次第大寶積經四十九會與大般若經十六會華嚴經九會等意義完全不同現在要講的大寶積經的普明菩薩會是古典的寶積經其餘四十八會是合編而才稱為寶積的這可以從兩點來說一古代所說的寶積經都是指本經說的一本會內題古大寶積經糅譯於大乘寶雲經中的叫寶積品二龍樹大智度論卷二八引寶頂經明菩薩初發心勝於二乘就是此經可知寶頂是寶積的異譯三魏菩提流支或勒那摩提譯的大寶積經論四卷傳為世親菩薩所造依西藏所譯說是世親弟子安慧菩薩造的這部大寶積經論就是本經普明菩薩會的釋論二古代大乘聖者是特別重視本經的一中觀大乘空宗的龍樹菩薩引用寶頂經就是本經這已在上面說過了又如大智度論所說聲聞空如毛孔空菩薩空如太虛空及中論的大聖說空法為離諸見故一偈都是引用本經的二瑜伽大乘有宗的彌勒菩薩在瑜伽師地論攝決擇分卷七九八說菩薩正行十六事就是本經的摩呾理迦安慧的大寶積經論是依此敷演而成的又如攝大乘論所知相分所說成就三十二法名為菩薩以及唯識學者所傳的十三種中道都是依據本經的特別是寧起我見如須彌山不起空見如芥子許一語為瑜伽大乘特別重視的金句這樣看來印度大乘正統的空有二宗一致重視本經寶積經普明菩薩會可見本經的價值了二古寶積經的翻譯本經現存的譯本共有四譯一後漢支婁迦讖譯佛遺日摩尼寶經一卷二晉失譯佛說摩訶衍寶嚴經一名大迦葉品一卷三秦失譯普明菩薩會古大寶積經一卷編入大寶積經第四十三會四趙宋施護譯大迦葉問大寶積正法經五卷此外一宋沮渠京聲譯的佛說迦葉禁戒經實為本經兼說聲聞道中正說一段之別譯二梁曼陀羅仙共僧伽婆羅譯的大乘寶雲經第七卷名寶積品實是本經被編入寶雲經的寶雲經的其他譯本並沒有此品現在所講的是傳為秦失譯本名古大寶積經而被編入大部改名為普明菩薩會的在十六國中秦有三一前秦國主姓苻也稱苻秦二後秦國主姓姚也稱姚秦三西秦國主姓乞伏也叫乞伏秦現本古人推斷為秦失譯但不知是三秦的那一秦不過據譯文來看這是羅什來華以前的譯品三寶積的意義本經的經題古代的譯者或從人立名如大迦葉品普明菩薩會或從法喻得名如大寶積經寶頂經摩訶衍寶嚴經佛遺日摩尼寶經或從人法喻得名如大迦葉問大寶積正法經然據經文的珍寶之積寶積寶嚴來說本經實應名寶積古人或譯為寶頂或譯為寶嚴梵文都是什麼叫寶積寶是譬喻凡希有的珍貴的有妙用的叫做寶寶所喻的是法寶宋譯作正法也就是妙法正法是佛所證的依此而覺悟成佛的約圓滿說唯佛與佛乃能究盡諸法實相如來的自證化他是最清淨的妙法喻如白蓮如法華經所說但是菩薩也能分證妙法二乘聖者也同樣的契證妙法所以說須陀洹初得法身等正法雖是本來如此的但從實踐而體悟來說這是希有的珍貴的有妙用的因為唯有信解這隨順這通達這才能轉迷啟悟超凡入聖才能了生死才能度眾生才能無邊福德莊嚴才能究竟成佛這是不共世間的正法珍寶本經與金剛經一樣一切賢聖皆以無為法而有差別是依三乘共證的正法說三乘聖者的體證正法都不離無所得的中道所以古人說無所得小無所得大又說一切大乘經同以無二顯道為宗乃至小乘經意亦不外此然本經的主要意趣是宣說大乘行著重在從加行位到通達位大乘的核心是大菩提願為本大悲心為上首空慧為方便的如本經所明的菩薩道略分三段一修廣大正行重於菩提願二習甚深中觀重於空慧三作教化事業重於大悲心綜貫這三德而修行才成為菩薩正道依此來解釋經題可約寶積寶頂寶嚴三義來說一正法的珍寶是依三德而證正法這是真實菩薩行一定是廣集無邊福智功德珍寶的如經中說到真實菩薩就說有四大藏攝諸善根無量福德莊嚴為了說明菩薩福德無量無邊用大地等十九種譬喻來顯示所以菩薩的正法珍寶是寶積這是經題的本義二極廣大的才能極崇高如塔婆一樣塔基廣大又一層層的疊積起來才有高聳雲空的塔頂所以由於正法珍寶的無邊積集顯出了菩薩體證正法的高超如經說菩薩是真實佛子紹隆佛種初發心菩薩就已勝出聲聞為人天所禮敬因為是寶積所以成寶頂積是積集積集了就崇高維摩詰經有香積世界奘譯作香臺臺也就是高的意思這與一般的好高騖遠說心說悟而不知平實的廣積功德是怎樣的不同三這樣的正法極廣大而又極崇高顯出了正法的宏偉莊嚴不同於小乘如塔的廣大崇高顯出了宏偉而莊嚴一樣所以又稱為寶嚴同一梵語而古德三譯不同意義還是一貫的相顯相成的梵語摩訶譯為大而含有多與勝二義本經所說的正法珍寶寶積是眾多義寶頂是殊勝義積而又頂的寶嚴是大義所以本經也叫大寶積經四寶積經的宗要統觀所有的大乘經可以略分兩大流一專為菩薩說廣明菩薩的大行與佛果的如華嚴經等二為菩薩及聲聞乘大小兼暢而宗歸於大乘的這裡面有些是從觀慧的修證來說發明三乘同入一法性大乘與小乘都以無所得而入道當然也說到菩薩般若的方便善巧不共二乘有些是從廣行來說著重於菩薩的特勝由於悲願殊勝智證也殊勝這便有貶抑訶斥二乘的教說有些是從菩提果德及因心來說對二乘折攝兼施而導歸佛乘的這些雖然方便不同各有特勝但對於發菩提心修菩薩行趨無上菩提果的大乘宗要是沒有什麼差別的本經大體與般若經相近說三乘都以無所得入道所以是正明菩薩道兼說聲聞行的教典又一切大乘經可以約境行果三義來分別一詳於境的有事境與理境事境中或詳於三乘共的心境或詳於菩薩不共的心境如說阿賴耶等理境說一切法無性故空空故不生滅的勝義諦二詳於行的或重於資糧行菩薩發菩提心廣集無邊福智資糧廣大的資糧中如十善等分同世間正行而實是菩薩的要行或重於慧悟行從加行到見道位廣明般若的無所得行如本經的如實中道正觀約無所得的悟入說是分同二乘的所以說般若為母不但是佛母也是二乘聖者的生母或重於如實行這是悟後的大行如十地經等所說分同於佛陀的果德三詳於果的特詳於如來的依正莊嚴自利利他的德行圓滿依此三義來分別本經是詳行的是重於資糧行及慧悟行的菩薩的修行六度四攝等都是依遍通三乘行來說宗要是戒定慧三增上學在三學中本經是特重於戒慧的這也許是繼承佛陀根本教學的風格吧雜阿含經卷二四說當先淨其戒直其見具足三業然後修四念處佛法是不離世間的要處世而做到自他和樂非戒不可戒行是基於慈悲的同情佛法即世間而出世解脫這非智慧的達妄契真不可這二者戒如足慧如目從自證說這才能前進而深入從利他說這才能悲智相成廣度眾生假使不重戒慧而偏重禪定不但有落入邪定味定的可能即使是正定也會傾向於隱遁獨善當然大乘廣攝一切根機也有獨善風格的聲聞菩薩行但在利他為先的大乘法中如本經的著重戒慧才是更契當於菩薩道的精神戒律本於慈悲的同情不忍損害他而來律儀戒中的別解脫重於身語的止惡但每一持戒的都是可能違犯的這一定要所犯眾罪終不覆藏向他發露心無蓋纏能隨犯隨懺才能保持自心的無憂無悔戒行清淨不過僅是身語的止惡是不夠的戒尸羅的義譯為清涼也重於自心的淨除煩惱釋尊的略教誡說諸惡莫作眾善奉行自淨其意是諸佛教所以意地的種種煩惱戲論分別如不能遠離不能算是真正的持戒清淨本經在兼說聲聞行時四沙門中的形服沙門威儀欺誑沙門貪求名聞沙門不消說是不夠清淨的四種持戒比丘中說有我論的我見不息的怖畏一切法空的見有所得的總之只要是執我執法的無論怎樣的持戒都不能符合如來律行的本意因為這樣的持戒者雖好像清淨持戒而終久今生或後世要破壞戒法的所以本經從一般的律儀戒說起而深意在道共戒如說諸聖所持戒行無漏不繫不受三界遠離一切諸依止法這無漏相應的聖智相應的戒行本經在正明菩薩道中也深切的說出無有持戒亦無破戒若無持戒無破戒者是則無行亦無非行若無有行無非行者是則無心無心數法若無有心心數法者則無有業亦無業報若無有業無業報者則無苦樂若無苦樂即是聖性不但聖者以此為體性也是聖者以此為因性的共三乘說為聖性專約大乘說就是佛性從慈悲不忍損他到遠離憶想分別深入真空的戒行為本經的要義之一現證慧聖智淨智是依定修觀而成就的本經說不以戒律儀戒為最亦不貴三昧過此二事已修習於智慧又說依戒得三昧三昧能修慧依因所修慧逮得於淨智戒定慧的三學相資次第修發修定與修慧不同本經都說得明白智慧般若不是泛泛的知識而是通達我空法空空寂法性的聖智這不但依戒依定而修得在慧學自身也有修學次第這就是依聞慧而起思慧依思慧而進起修慧與定相應的觀慧叫修慧依修慧才能得現證的聖智所以本經重智慧也就重於多聞修行如說菩薩有四法得大智慧何謂為四常尊重法恭敬法師這是自己樂意多聞隨所聞法以清淨心廣為人說不求一切名聞利養這是樂意使他人多聞知從多聞生於智慧勤求不懈如救頭然知多聞的功德而勤求聞經誦持樂如說行不隨言說這是由聞而思而修不為文字所封蔽本經說菩薩行以得大智慧為第一要行而說智慧從多聞生明白的開示了慧學的進修次第依因所修慧能得於淨智可見觀慧的修習是極為重要的本經廣明如實的中道正觀即一切我法性空觀空無相無願無生滅等是本性空是中道所以增減不得有些人取空著空以為有空可得這是增益了這不但辜負了佛說空觀的本意反而著空成病如以藥除病藥不出其病轉增一樣龍樹依據經義所以在中論上說大聖說空法為離諸見故若復見有空諸佛所不化一切是本性空的眾生著有起種種見而流轉生死而一切法空還是本來如此由於一切諸見唯空能滅所以說空滅諸戲論妄執即顯一切法本性空寂並非別有空理可住可得有些人著有成迷怖畏法性空寂不生不滅佛說這些人如怖畏虛空而想逃避虛空一樣這是減損了其實空是一切法性虛空那樣的遍於一切有什麼可怖畏有什麼可捨離的想離空立有真是狂亂失心了龍樹說五百部聞畢竟空如刀傷心就是這一類人能於一切法性空不增不減的如實觀察是引發真實聖智的方便一切法本性空以如幻性空的觀心觀如幻性空的觀境心境並冥經說如幻食幻的比喻極為明白觀心是分別伺察聖智是無分別智依分別觀怎麼能引生無分別智呢這如經上說真實觀故生聖智慧聖智生已還燒實觀要知道如實觀慧是觀一切法無自性空的這雖是世俗的分別觀察但是順於勝義的觀自性不可得的所以這樣的觀慧能引發無分別聖智等到聖智現前那如實空觀也就不起了唯有理解這個道理才知觀慧的必要不致於落入一味息除分別的定窟本經以律儀戒而深入到道共戒從聞慧修慧而深入到現證慧在法空性的現證中戒智不二也就是無漏戒定慧的具足這可說是本經的宗要所在了正釋甲一序分如是我聞一時佛在王舍城耆闍崛山中與大比丘眾八千人俱菩薩摩訶薩萬六千人皆是阿惟越致從諸佛土而來集會悉皆一生當成無上正真大道以下正釋經文依一般釋經的通例分本經為三分一序分二正宗分三流通分序分中一般有通序與別序本經敘事簡要如佛說阿彌陀經一樣僅有通序即如是我聞等這是一切經典所共有的約文體來說這是佛經的特有體裁是佛將涅槃時告訴阿難將來結集的佛經應該說如是我聞等約意義來說說方時人為令人生信故大智度論這部經有時間地點說者與聽法的大眾足見得信而有徵所以通序也叫做證信序通序或分為六種成就現在約五事來說一如是我聞指出所聽聞的法門意思說這一法門是我所聽聞來的我是結集經典者阿難的自稱我聞或者是親從佛聞或者是從佛弟子展轉傳聞阿難說我聞表明了稟承佛說而不是結集者的杜撰所以在當初大眾結集時阿難宣說如是我聞經大眾一致審定公認為佛說含有一致無諍的意義也就因此古德解說為文如義是下面的文句與佛說一樣的如不增不減其中的意義正確恰當是不偏不倒通序本以證信為主要意義所以首說如是我聞即表示了確而可信非杜撰不錯誤而為學者所可以信受奉行的法門二一時是說法與聽法的時間說到時間不但世間曆法年月日種種不同就是日夜也不一定相同如我們這裡的時間與菲律賓馬尼拉就差了一點鐘佛法是一切世間的全人類的佛法並不限於印度一地所以只泛說一時法會始終那一段時間而不說年月日時三佛是宣說法門的法主佛的意義是覺者為一切究竟大覺者的通稱但這裡專指釋迦牟尼佛而說釋迦佛是出現於我們這個世界的佛是在這世界宣揚正法救度眾生的佛為什麼稱為佛呢眾生一直在生死中怎麼也不得解脫癥結在情情是迷情情識有迷情的稱為有情以迷情為本的有情可說是盲目的活動糊糊塗塗顛顛倒倒沒有自主的苦樂升沈怎麼也不得自在解脫佛法是能使有情獲得究竟解脫的也就是轉化情識本位而成為正覺本位的對於宇宙人生的真實義能如實的覺了能依於正法一切隨智慧而行得大解脫所以佛法的特質是般若正覺得三菩提正覺的成就聲聞與緣覺的聖果得阿耨多羅三藐三菩提無上正等覺的成就佛果聖者的證入雖有淺深的不同而都是以正覺為本的所以究竟圓滿的大覺者也就約自覺覺他覺行圓滿的意義而稱之為佛佛為法本佛為法根法門的宣揚流通都由佛而來四在王舍城耆闍崛山中是佛說法也是大眾聽法的地點釋迦佛出現於印度中印度摩竭陀國的首都叫王舍城一向是國王的住處所以叫王舍當時王舍城是印度文化經濟政治的中心所以佛也常在這裡教化王舍城有五山環繞耆闍崛山即五山之一梵語耆闍崛意義是鷲峰從形勢得名安靜而並不太高離城而並不太遠這是釋迦佛常住說法的道場五與大比丘眾八千人俱以下是列同聞正法的大眾這又有二眾一小乘聲聞眾二大乘菩薩眾聲聞的學眾有在家的出家的而以出家的為主出家眾又有五眾比丘比丘尼沙彌沙彌尼式叉摩那尼而以比丘為主導者本經簡略所以但列比丘眾為代表梵語比丘華語為乞士男性是外乞食以資身內乞法以資心就是過著乞化生活而專修佛法的出家者比丘眾同住在一起叫俱但這不只是群居而是過著有紀律的見和利和戒和集體生活在這聽法的聲聞眾中有凡有聖聖眾也有四果的差別第四阿羅漢果有九種其中得三明六通的俱解脫阿羅漢為比丘中的大比丘這樣的大比丘就有八千人可見參加法會的聲聞眾人數是多極了菩薩摩訶薩萬六千人以下列菩薩眾梵語菩提薩埵簡譯為菩薩華語覺有情梵語摩訶薩埵簡譯為摩訶薩華語為大有情大士菩提是佛的大菩提無上正等覺薩埵是勇心是強毅勇猛的願欲凡發堅固的大菩提心依菩薩道而勤勇進修的就名為菩薩從初發心到成佛菩薩的階位是不等的高位的菩薩如文殊彌勒等為菩薩中的大菩薩所以叫菩薩摩訶薩在這寶積大法會中單是大乘眾的領導者菩薩摩訶薩就有一萬六千人敘列同聞的大眾集經者每每稱讚聽眾的功德本經簡要所以比丘眾沒有讚德菩薩眾也僅以三句來讚說皆是阿惟越致指出了菩薩眾的行位阿惟越致是阿毘跋致的舊譯華語為不退就是不退轉於阿耨多羅三藐三菩提但不退有四類一信不退在十信的第六心對於大菩提的深信不疑不會再退失了二位不退在十住的第七住不再會退證小乘的果證了三證不退在十地的初地證得甚深法性一得永得不會退失四行不退在八地以上清淨心的德行進修念念不斷的向上不再會退起染心或停滯不進了以本經的菩薩摩訶薩來說應該是行不退釋迦佛出世時的印度在家菩薩是少數的出家菩薩更只是彌勒菩薩一人所以寶積法會中的大菩薩們都是從諸佛土而來集會的十方的世界佛土無量菩薩也無量有些清淨佛土更是純一的菩薩眾在釋迦佛說法時就有十方的菩薩們來會這說明了佛是平等而不分彼此的菩薩們的來會除了供佛聽法以外還起著莊嚴法會讚揚大乘及示範的教化作用這些大菩薩們悉皆一生當成無上正真大道無上正真大道古來多譯菩提為道是無上正等覺阿耨多羅三藐三菩提的舊譯正覺是通於聲聞的正等普遍覺是通於菩薩的究竟圓滿的大覺稱為無上正等覺是佛所圓證的大菩提這些大菩薩都再是一生就要當來成佛證得無上菩提所以都是修證到鄰近佛果如彌勒一樣的補處菩薩甲二正宗分乙一正說菩薩道丙一修廣大正行丁一辨菩薩行相戊一正行差別己一得智慧爾時世尊告大迦葉本經的正宗分分正說菩薩道兼說聲聞道二科這說明了本經是以大乘為主而大小兼暢的法門代表正統的中期佛教在菩薩道中有修廣大正行習甚深中觀作教化事業三科廣大行與甚深觀是菩薩道自行的大綱教化事業是利他的大業這三者完滿的開示了菩提的正道如約修學階位的偏重來說修資糧以向加行位重於福智資糧的廣大積集從加行以入見道重於甚深中觀的修證從見道以趨修道位重在利他的教化事業修廣大正行也有辨菩薩行相讚菩薩功德二科辨菩薩行相也分三先說正行差別總有八事都以邪行正行一反一正的對辨以顯示菩薩應行的種種正行爾時是佛在鷲峰與大眾共集而要宣說寶積法門的時候世尊是佛的又一尊稱佛為究竟無上的大聖是人間天上一切世間所共尊仰的所以又稱為世尊當時佛告大迦葉說佛為無量大眾說法時一定有一位或幾位與佛問答的當機者受佛稱讚或被佛呵斥這是代表大眾的代表大眾而請問佛也就因對他說而告訴了大家本經的當機者是大迦葉迦葉是姓華語為飲光姓迦葉的佛弟子不在少數這位被稱為大迦葉的是釋尊門下了不起的大德釋尊涅槃後大迦葉主持了荼毘大典又在王舍城的七葉窟主持了佛典的第一結集大迦葉是佛涅槃後的領導者所以有釋尊付囑迦葉傳承正法的傳說大迦葉頭陀第一生活精嚴在崇尚苦行的東方印度耆那教與提婆達多的五法是道都興起於此受到了大眾的崇仰本經重於戒慧所以操行精嚴的大迦葉為本經的當機者還有當時就近參與荼毘典禮的以及出席結集法會的主要為王舍城毘舍離一帶的比丘也就是大迦葉領導的一系大迦葉不曾能邀集全佛教界集思廣益而舉行少數的結集連多聞第一的阿難也幾乎被拒絕這所以結集圓滿時就有富樓那等提出異議而種下了佛教學派分化的種子在佛教的傳弘中大迦葉領導的學系重戒的重定的帶有嚴重隱遁傾向的佛教被指為背棄釋迦精神的小乘本經不但開示大乘正法也針對重戒的重定的比丘而宣說聲聞正法以大迦葉為當機者那是最適當不過的了菩薩有四法退失智慧何謂為四不尊重法不敬法師所受深法秘不說盡有樂法者為作留難說諸因緣沮壞其心憍慢自高卑下他人迦葉是為菩薩四法退失智慧佛為大迦葉說菩薩的正行差別先說失智慧與得智慧智慧是佛法不共世間的特質是解脫與成佛的根本對於菩薩行是非常重要的所以首先提出來說菩薩有四法退失智慧已有的尚且要退失當然更不會增進了四法為因引起智慧的退失是果有著因果的一定關係因果是多種多樣的這裡說的主要約二類因果說一無論是善的惡的久而久之習以成性一天天的增強如常起貪心的會貪心越來越大起瞋心的瞋心會越來越嚴重如讀書的知識越來越豐富好靜的習慣了會愛靜惡動過不慣煩囂的生活這不但今生也影響到來生的性格能力這叫做等流因果二如布施的使別人的生活獲得充足自己將來就能得富裕的果傷害人使人死墮落惡道是異熟因果來生為人時會受到多病或夭壽的果總之使人苦惱自己得苦惱使人安樂自己能安樂障礙人的自己也受人的障礙這些叫做增上因果一般也叫做業報那四種邪行能退失智慧呢一不尊重法不敬法師法是真理理法理法的實現即證法是達到真理的正行行法表達這真理與正行的聖教教法自己學法而又以法教化的稱為法師法真理正行聖教從佛的大覺而宣揚出來對學者來說法是智慧的源泉如不尊重法不生希有難得心不看作治病的良藥昏夜的明燈而覺得沒有什麼了不得與自己沒有什麼關係那一定不會依法去信解修行不進則退也就會日漸愚癡了不能尊重法也就不會尊敬法師法師也是人不會是十全十美的所以如不從正法的關係去尊敬他就會挑剔一些不相關的事相貌不端嚴呀音聲不洪亮呀或說法師的某種不圓滿性急呀偏愛呀好名呀種種吹求而忘記了自己應學他的長處應學習他宣揚的正法這樣的不尊師不重道自己閉塞了聰明不能獲得正法的智慧反而要退失了二所受深法秘不說盡深法是大乘法大乘的空義經說深奧者空是其義深行密證的法門自己從師長受學得來應該善與人同盡量弘揚卻故意秘密化不肯輕易說說也不肯盡量的說而保留一分這或是為了名為了利秘而不傳的作風障礙人不能生長深智因果必然當然自己要退失智慧了拿淺事來說我國古代的工巧醫藥拳術都有高度的成就可是被秘密害了教拳的不肯盡量傳授徒眾而留下幾手醫藥只肯傳自己人或傳兒不傳女不願公開以求進步結果大多失傳了到現在我國還被看作落後地區這不是秘不盡傳而招退失智慧的惡果嗎三有樂法者為作留難說諸因緣沮壞其心樂法是愛好大法而深願欲求的意思遇到這樣的人應該隨機說法引他趣入佛法而現在卻故意的留難他說一些不成理由的理由如年紀還輕呀知識太差呀業障太重呀下次再來呀要供養多少呀根機中中的就會因而失望意志沮喪變壞了那種樂於求法的熱心有的受了外道的誘惑動搖了對三寶的信心犯了這樣障人智慧的罪過當然要退失智慧了四憍慢自高卑下他人修學佛法的容易犯一種過失就是義理愈了解或多少有些行持功德憍慢心就起來了覺得自己了不起高人一等看起他人來論教理論修行都卑下低劣不及自己於是覺得沒有值得尊敬的法師沒有可以造就的學者憍慢狂妄結果是滿招損智慧日漸退失了世尊總結的說上面所說的是為菩薩四法會退失智慧的求大智慧的大乘行者應切戒才好復次迦葉菩薩有四法得大智慧何謂為四常尊重法恭敬法師隨所聞法以清淨心廣為人說不求一切名聞利養知從多聞生於智慧勤求不懈如救頭然聞經誦持樂如說行不隨言說迦葉是為菩薩四法得大智慧現在再從正行來說能得大智慧的四法那四種法呢一常尊重法恭敬法師能常常的尊師重道就會常常的訪師求法智慧也就自然增長廣大起來二隨所聞法以清淨心廣為人說不求一切名聞利養菩薩隨自己聽聞受持的深法不會秘不說盡而是樂意的廣為人說以弘法心慈悲心報恩心來說法不是為了貪求名譽或者財利供養唯有這樣的清淨心說法才能廣為人說否則存有名聞利養徒眾不清淨心來說法就會或多或少的保留不是嫌說法的報酬太少就怕別人與自己一樣名聞利養被人奪去了三知從多聞生於智慧勤求不懈如救頭然對於樂法的人故意留難不願為他說法主要是由於不知聞法的利益要知道現證的智慧雖由於修習而修慧要由於思惟思慧要由於多聞知道智慧是從多聞而引生的就會尊重聞法的功德了對他人就不為留難樂意去為人說法對自己一定是精勤的求聞正法不懈不怠如頭髮鬚眉著了火一樣火燒然與燃同鬚眉一定急不容緩去救息他知道多聞的功德一定會不懈不怠的去多聞正法當然精勤的多聞也要注意到身心的調適必須行之以漸持之以恆從容不迫而又鍥而不捨才是中道的勤行四聞經誦持樂如說行不隨言說凡人聽聞經法背誦受持大抵會因此而憍慢起來但聞思經法還是為了實行如學者的志願在乎如經所說的去實行而不是隨著語言文字團團轉專在名相上作工夫那就會感覺自己的實行不足還不能完滿的實踐佛說能深切感覺到自己的不足自然謙和寬容不再憍慢自高了能這樣依解而起行智慧當然能生長廣大了佛總結的說這就是菩薩四法得大智慧己二不失菩提心復次迦葉菩薩有四法失菩提心何謂為四欺誑師長已受經法而不恭敬無疑悔處令他疑悔求大乘者訶罵誹謗廣其惡名以諂曲心與人從事迦葉是為菩薩四法失菩提心再說退失菩提心的邪行與不退菩提心的正行菩提心是大乘道的心要是不是菩薩以有沒有菩提心來分別的什麼是菩提心初學者約願心說菩薩以慈悲利他為本但要利濟眾生非佛那樣不能圓滿成就度眾生的願望這樣就誓願上求佛道下化眾生深信大願做到造次必於是顛沛必於是名為菩提心成就高位的菩薩常念菩提心念念不離菩提心所以也叫正念初學者就得修學正行來保持菩提心否則不但間雜不淨而且要退失了佛先開示邪行菩薩有四法失菩提心那四種法呢一欺誑師長已受經法而不恭敬經法是經典也是戒經從師長受學經法應該尊師重法依法修行才對如所行的違犯了經法被師長發現了還不知真實懺悔說些不盡不實的話來欺誑師長或者師長舉發他的錯誤還是欺誑狡賴這樣的沒有慈心沒有智慧惱亂師長目無法紀怎能保持菩提心而進修菩薩行呢二無疑悔處令他疑悔這是對於同參道友的故意的惱亂同學他人的言行本來沒有什麼卻故甚其辭說他違犯了好心的佛弟子如對經法沒有明確的認識就會懷疑自己的行為疑心一起憂愁懊悔就來了憂悔一來身心就不得安定障害了正法的修行像這樣的惱亂同學以別人的憂苦為自己的快樂真是斷慈悲種子菩提心當然就退失了三求大乘者訶罵誹謗廣其惡名上二是不重戒法而欺師害友下二是不重大法而誹謗菩薩自己發菩提心修大乘行那對於同願同行求大乘法的菩薩應該隨喜尊敬策勵才對由於內心的憍慢嫉妒瞋恨當面訶罵菩薩背後誹謗菩薩盡量的傳布他的惡名聲這樣的訶毀菩薩等於破壞大乘菩提心當然消失到不知那裡去了四以諂曲心與人從事諂曲是虛偽不直的與人從事是與人往來作朋友與他談話合作或者幫助他但這是虛偽的友善不懷好意想在與人的經常接觸中發現他的缺點隱藏而沒有顯露的錯誤找到了話柄就揭發陰私大肆攻訐這與上文的訶罵菩薩一樣上文是站在敵對的立場這是裝成友善的姿態而同以達成誹毀菩薩為目的世尊總結的說這就是四法邪行能退失菩提心了復次迦葉菩薩有四法世世不失菩提之心乃至道場自然現前何謂為四失命因緣不以妄語何況戲笑常以直心與人從事離諸諂曲於諸菩薩生世尊想能於四方稱揚其名自不愛樂諸小乘法所化眾生皆悉令住無上菩提迦葉是為菩薩四法世世不失菩提之心乃至道場自然現前再來說菩薩有四法世世不失菩提之心乃至道場自然現前如有四種正行不但生生世世不失菩提心一直到最後身菩薩坐道場成佛時都會任運的自然現前初學者是願菩提心到了證得法性名為勝義菩提心如寶珠一樣經洗治摩十地菩薩的進修越來越清淨光明到了究竟圓滿就是無上菩提了能不失菩提心的到底是那四種正行呢一失命因緣不以妄語何況戲笑這是針對不重經法欺誑師長的正行有了違犯的行為經師長的舉發不論依律應受怎樣的治罰都應老實承認就是因此會喪失生命如犯了波羅夷重罪於佛法為死人要受逐出僧團的處分也願受重罰決不以妄語來欺蒙師長重罪都不敢妄語那何況不必要的或戲笑時還會欺誑妄語呢二常以直心與人從事離諸諂曲這好像是針對上文的第四邪行而其實是與第二邪行相反的正行為什麼對同學要故意惱亂使他無辜的陷入悔疑的憂海呢本來如法的舉發他人的過失使他能懺悔清淨是悲心善意應該這樣做的但是虛偽的善意就會因此而惱亂同學了菩薩的正行與此相反對於同參道友經常以正直的善意往來從事離去種種的諂曲心所以決不故存惡意使人引起不必要的疑悔三於諸菩薩生世尊想能於四方稱揚其名大乘行者應對菩薩生起佛一樣的尊敬心如敬重王子與國王一樣菩薩是未來佛佛是菩薩行的究竟圓滿想菩薩為佛一樣的可尊可敬就不會呵毀誹謗了真正的學佛者怎麼也不會謗佛的不但不呵毀菩薩還能在一切處稱揚讚歎菩薩的功德使菩薩的美名善譽遍於四方四自不愛樂諸小乘法所化眾生皆悉令住無上菩提邪行者的與人從事目的在舉發陰私破壞菩薩菩薩的正行就不同了由於自己的志在大乘於小乘沒有愛好心所以希望別人都與自己一樣在與人往來親善時就教化眾生使往昔所集的大乘善根潛而未發的清淨德性充分的顯發出來堅固成就安住於大乘的無上菩提住是安立決定的意思菩薩這樣的修四正行尊重正法愛護同行讚歎大乘始終以菩提道為念當然不會退失菩提了己三增長善法復次迦葉菩薩有四法所生善法滅不增長何謂為四以憍慢心讀誦修學路伽耶經貪利養心詣諸檀越憎毀菩薩所未聞經違逆不信迦葉是為菩薩四法所生善法滅不增長菩薩的智慧增長菩提心就不會退失不退菩提心一切善法就滋長了所以接著說損滅善法的邪行與增長善法的正行佛告迦葉菩薩有四法所生善法滅不增長已生的善法受到了邪行的損害或是不再增長了或是損滅而消失了是那四種邪行呢一以憍慢心讀誦修學路伽耶經學者為了憍慢心所驅使好強爭勝不知於佛法作深入的聞思而卻去讀誦修學路伽耶經路伽耶經是世俗的典籍看起來科學哲學政治經濟知識愈來愈豐富其實憍慢心也愈來愈大了世俗的學術雖有有益於人生的部分但大多重於向外的爭取是雜染而不是純淨的常在這些駁雜不純的俗學上用功正沾沾自喜地以為進步而不知俗念熏染道念漸薄善法也漸滅了這在菩薩的修學來說真是棄明珠而取瓦礫實在不值得二貪利養心詣諸檀越人要有精神的食糧來資長慧命也要有物質的資糧來維持色身如追求世俗知識思想會流入歧途以貪染心去求利養生活會流入邪命依經文說為了貪著物質的財利供養以貪求物欲心到檀越家去梵語檀越華語為施主出家人依檀越而生活也就不能不去檀越家但為了生活的必要外應以化導的安慰的慈心進檀越家使檀越能生長信心增益福慧如一心一意的為了物欲那就有說不完的弊害了專心在物欲上著想善法怎能不損滅呢三憎毀菩薩大乘菩薩應該是尊敬讚歎的對象但如從自己的名聞利養著想對於超勝自己的菩薩就會引起憎怨嫉恨的心甚至惡意的毀謗他不能崇重賢善反而憎怨他那就穢念滋生善法就滅不增長了四所未聞經違逆不信總之是憍慢好勝心在作怪這才對超勝自己的菩薩憎厭誹謗對超勝自己所學的法門不肯信受了自己所學的有限有量就以為佛法不過如此這才憍慢高傲起來一旦發現了自己所沒有聽聞修學過的經典為了不承認自己的不知就不惜反對不肯隨順信受憍慢的人不但毀謗菩薩連佛說的深法也敢反對憍慢是多麼可怕的煩惱修學菩薩行的如貪求些世俗的知識世俗的財利嫉忌勝人勝法那善法怎能不滅而增長呢這就是使所生善法滅不增長的四法復次迦葉菩薩有四法所生善法增長不失何謂為四捨離邪法求正經典六波羅蜜菩薩法藏心無憍慢於諸眾生謙卑下下如法得施知量知足離諸邪命安住聖種不出他人罪過虛實不求人短若於諸法心不通達作如是念佛法無量隨眾所樂而為演說唯佛所知非我所解以佛為證不生違逆迦葉是為菩薩四法所生善法增長不失再來說使所生善法增長不失的四種正行是那四種呢一捨離邪法求正經典六波羅蜜菩薩法藏心無憍慢於諸眾生謙卑下下修學菩薩行的捨離邪法邪法是不與真理相應不順解脫的世俗學術尤其是唯物的功利的路伽耶經菩薩不學邪法而專心志求正經雖一切佛說都是正經而大乘法最為真正大乘法藏經典的總匯叫藏內容以六波羅蜜布施持戒忍辱精進禪定智慧為總綱波羅蜜華語到彼岸是從生死而到達佛果的法門專求大乘的六波羅蜜沒有一點的憍慢心對一切眾都非常的謙卑低下好像什麼都不及人一樣這樣的對人謙和求法精進無邊的善法都會增長而不失了二如法得施知量知足離諸邪命安住聖種這是出家眾對於生活資具的正行一切都是從布施得來的但要來得如法不能為了貪求布施而作些非法的行為如為了貪求布施裝模作樣的矯現威儀使人尊信或隨時往來施主家或者贈送禮品以增厚感情或在人前故意讚歎別人的布施或眩賣自己的修行怎樣用功怎樣得感應總之以一切技巧手段來達到他人施與的目的都是非法如法所得的布施不管多少不問精美或粗惡都會生歡喜心知足心能知量知足而不作過分的乞求這不但自己適量而受還要顧慮到檀越的經濟力量除了受施而外出家眾不宜營農經商或者趕鬼治病占卜算命看相等從這些而得來的生活資具叫做邪命這是說對出家眾來說這是不正當的經濟生活邪命是一定要遠離的這樣佛弟子能安住於四聖種中四聖種是對於衣服飲食臥具三者隨所能得到的都歡喜滿足第四是樂於斷除煩惱樂於修習聖道這樣的生活淡泊少欲知足而又勤修佛法就能因此而從凡入聖聖人由此四事而出生所以叫聖種這第二正行主要為不於物欲而生貪著三不出他人罪過虛實不求人短由於菩薩的心地謙卑專精修學所以對他人的罪過無論是虛的實的都不會舉發他在僧團中可以如法舉罪更不會故意吹求他人的短處對一般人都如此遇到大乘菩薩當然更不會憎毀了四若於諸法心不通達作如是念佛法無量隨眾所樂而為演說唯佛所知非我所解以佛為證不生違逆自心不能通達的諸法就是自己沒有聽聞受學過的諸經自己所沒有聽聞通達的怎麼可因自己的不通達而不信呢然而不明白不理解怎麼能生信心呢是的佛法有從勝解而來的解信有從親切體驗而來的證信但也還有因尊信聖者而來的仰信呢所以如心不通達就應該這樣的想佛法是無量的是適應眾生的根性好樂不同而作無量方便的演說橫說豎說淺說深說或似矛盾而並不相反或聽來驚奇而合於常道無量方便的不同說法唯有佛的智慧才能知道這不是我的淺智所能了解的這樣以佛的智慧方便為權證以佛的無方說法而起仰信雖然不了解不通達也能樂意的信受不致違逆如來的正法了世尊又總結的說是為菩薩四法所生善法增長不失己四直心復次迦葉菩薩有四曲心所應遠離何謂為四於佛法中心生疑悔於諸眾生憍慢瞋恨於他利養起嫉妬心訶罵菩薩廣其惡名迦葉是為菩薩四曲心所應遠離學者如善法增長心地就會質直佛是特重質直心的所以說直心是道場否則善法損滅心地就會邪曲起來因此接著來說菩薩應離的四種曲心與四種直心佛說菩薩有四曲心所應遠離那四種心呢一於佛法中心生疑悔於佛法中出家修學應秉承佛的教授教誡不敢違犯如違犯了應立即發露如對佛法的恭敬信順心不夠就會為了面子問題把罪過隱藏起來罪過藏在心裡一定會陷於重重疑悔的憂苦當中如把死尸放在家裡弄到膿血流漓臭氣充滿一樣這裡的悔不是懺悔而是嫌惡自己所作的不善引起內心的不得安定二於諸眾生憍慢瞋恨這可以約一切眾生說而主要為對於共住的師友在大眾中自以為高勝憍慢得了不得有了過失因為憍慢心而不肯認罪如受了僧團的處罰或驅擯那就生瞋恨心以為僧伽不公平故意難為他三於他利養起嫉妬心有大福德大智慧的菩薩當然會受到一般人的尊敬而得廣大的布施有的不怪自己不修福不修慧而又貪著財利這才見到他人得利養而生起了嫉妒心四訶罵菩薩廣其惡名菩薩的福慧增勝能通達甚深的法門所以受到廣大的敬施現在不但嫉妒菩薩的利養更進而憎厭他的大乘深法因此對大乘學者的菩薩訶罵他毀謗他廣大傳揚他的惡名疑悔憍慢與瞋恨嫉妒不信這就是菩薩的四曲心修學菩薩行的這是應該遠離的復次迦葉菩薩有四直心之相何謂為四所犯眾罪終不覆藏向他發露心無蓋纏若失國界身命財利如是急事終不妄語亦不餘言一切惡事罵詈毀謗撾打繫縛種種傷害受是苦時但自咎責自依業報不瞋恨他安住信力若聞甚深難信佛法自心清淨能悉受持迦葉是為菩薩有四直心之相再來說菩薩的四直心之相有了直心就有直心的事表現出來行事能表達內心的正直所以叫直心之相四直心是什麼當然是與上邪行相反的四種一所犯眾罪終不覆藏向他發露心無蓋纏菩薩在佛法中有深切的信順恭敬心那對或有違犯的眾罪或重或輕怎麼也不會隱覆的掩藏起來因為覆藏只是增長罪惡多生疑悔如把臭物嚴密的封存起來一定是越久越臭所以佛制比丘有罪不准覆藏覆藏的加重治罰而應該向他人發露發露就是懺悔隨犯罪的輕重依律制而作如法的懺悔就是對人而將自己的罪過吐露出來這是什麼罪應受怎樣的治罰一切依僧伽的規律而行過失一經懺悔或接受了處分如把瓶中的臭物倒在太陽下又加以洗淨一樣戒體就回復清淨不再有疑悔等蓋纏不再會障礙聖道的進修了蓋是五蓋貪欲瞋恚疑昏沈睡眠掉舉惡作惡作就是悔纏是十纏無慚無愧嫉慳悔眠掉舉昏沈忿覆二若失國界身命財利如是急事終不妄語亦不餘言在大眾中如有了違犯經人舉發決不說欺誑師友的妄語老實認罪也決不說其他的話如處分不適當不公平等國界等是譬說假使說了老實話會因此而國王失去國土會喪失身命會損失財物這樣的關係重大也還是不說妄語意思說犯了罪無論後果怎樣那怕是逐出僧團也要直心實說三一切惡事罵詈毀謗撾打繫縛種種傷害受是苦時但自咎責自依業報不瞋恨他上面第三邪行是於他利養生嫉妒心這雖也因為貪染心主要還是由於不信業報他受種種利養如知道是福業所感就應該生隨喜心即使他不如法得來如沒有福業不如法去追求也是得不到那是他自造來生的苦果應該悲憫他這都不會嫉妒的與這相反的正行從自己遭受的種種惡事來說如被人辱罵被人毀謗被人用手腳棍棒來毆打被人捆縛或者監禁起來名譽身體財物自由受到了種種的傷害一般人有此遭遇總是怨天尤人氣憤得不得了但菩薩是深信業報的所以受到這種的苦難只是自己怪自己責備自己為什麼造了惡業不與人廣結善緣由於自己依業報的信仰而安心中國人稱為安命所以不會瞋恨別人其實瞋恨有什麼用呢四安住信力若聞甚深難信佛法自心清淨能悉受持菩薩如聽聞甚深難信的佛法如不思議的佛境界一切法空性等能安住於信力中也就是能尊敬佛說而能起仰信經上說信如清水珠能清濁水所以能安住信力就能自心清淨也就能隨順深入完全受持這甚深的法門所以說佛法大海信為能入上面所說的就是菩薩四種直心之相己五善調順復次迦葉菩薩有四敗壞之相何謂為四讀誦經典而生戲論不隨法行不能奉順恭敬師長令心歡悅損他供養自違本誓而受信施見善菩薩輕慢不敬迦葉是為菩薩有四敗壞之相菩薩的善法增長心地正直就能善順本譯以邪行為敗壞正行為善順這是什麼意義呢善順是善調柔順的意思如象馬的野性未馴難調難伏等到訓練成功能隨人意而被御用就是善順又如生牛皮未經製煉堅硬而不合用一經如法的製煉就調和柔順可以用作器具所以菩薩如三學熏修內心煩惱不起成就法器就名為善順如不如法行煩惱熾盛不成大乘法器名為敗壞菩薩這裡先說菩薩有四敗壞之相四種是一讀誦經典而生戲論不隨法行菩薩讀誦大乘經典如專在義理上著力理論怎樣的明確怎樣不受外道的難破這落入了戲論法相而不知隨順正法去實行這樣的聞思經法每矯現為學者多聞持法者的身分以掩飾空言無行的毛病二不能奉順恭敬師長令心歡悅菩薩從師長受學如不能奉承隨順師長的意思而照著自己去顛倒解說這樣與師意相違當然不能得到師長的歡心不能在師門與大眾和合共住每矯現為阿蘭若者作為自己去修行以掩飾不能見和共住的毛病三損他供養自違本誓而受信施出家的依布施而生活本意為了如法修行如違反了自己的本願無戒無定而受信施就是浪費施主的供養這每矯現為興寺院辦僧事的身分以免虛耗信施的譏嫌四見善菩薩輕慢不敬菩薩本著自己所學的知見堅固執著所以見到勝善的大菩薩就輕慢他而不能恭敬為了自見每矯現為攝受大眾者的身分以群眾來維護自己的尊嚴學者阿蘭若者興福業者領眾者都是菩薩應行的但如由於著聞思起別解缺戒行執自見而這樣行那菩薩就不能調順成就而要成為敗壞菩薩了這就是菩薩有四敗壞之相復次迦葉菩薩有四善順之相何謂為四所未聞經聞便信受如所說行依止於法不依言說隨順師教能知意旨易與言語所作皆善不失師意不退戒定以調順心而受供養見善菩薩恭敬愛樂隨順善人稟受德行迦葉是為菩薩有四善順之相與敗壞菩薩相反菩薩有四善順之相那四種呢一所未聞經聞便信受如所說行依止於法不依言說菩薩對久曾聞思的當然修學就是從來所沒有聽過的大乘深法聽了也就能信順受持不專在論理上下工夫而能照所說的去實行這就是說依止於法的實踐而不是依著語言文字的論說二隨順師教能知意旨易與言語所作皆善不失師意這是能承受師說而無倒的佛法從佛而弟子展轉傳來無論是義理修行的方法都是有傳承的這決不能憑自己的小聰明望文生義而發揮自己的見解現在菩薩能隨順師長的教授能知經論的真實意趣宗旨自己不亂創別解所以師弟間心意相通說話也容易通達做起事來都是善的沒有違反師長的意思這才真能傳承師長的法門三不退戒定以調順心而受供養菩薩的本願是受戒習定而度著出家受施的生活現在能貫徹本願沒有退失戒定有戒有定心意調順這樣的受供養檀越的功德可大了四見善菩薩恭敬愛樂隨順善人稟受德行菩薩不堅執自見遇到勝善的菩薩弘揚深法就能生恭敬心愛慕心能隨順這樣的善人而稟受他德行的熏陶這四事一一與敗壞的邪行相反能這樣行可知是善順的菩薩能成大乘法器紹隆佛種己六正道復次迦葉菩薩有四錯謬何謂為四不可信人與之同意是菩薩謬非器眾生說甚深法是菩薩謬樂大乘者為讚小乘是菩薩謬若行施時但與持戒供養善者不與惡人是菩薩謬迦葉是為菩薩四謬菩薩以利益眾生為本到了心調柔順成就法器就更重於教化眾生了但可能不契真理不契根機而發生錯謬所以接著說菩薩的所行正確與所行錯謬先說菩薩有四錯謬四種是一不可信人與之同意是菩薩謬譯文不明依其他譯本來看不可信人是對三寶沒有成就信心的人對這種人應為他說法啟發增進他的信心如菩薩作與其他淨信的同樣的想法已信了而不給他說法以啟發信心那是菩薩的錯謬二非器眾生說甚深法是菩薩謬非器如小乘根性不是大乘法器雖菩薩要化導一切眾生成佛但也要適應機宜如對非大乘器而說大乘深法對聽者並沒有利益或者會引起相反的作用如身體過分虛弱給與高度的滋補品是受不了的所以說醍醐成毒藥這樣為小機說大法顯然是錯謬的了三樂大乘者為讚小乘是菩薩謬愛好大乘的根性如為他讚揚小乘法那是非常的錯謬因為聽者可能是由小入大的根性對小乘法有著深厚熏習可能因此會退失大心即使是純大乘的根性為他說小乘也該有個分寸不應該過分的讚揚四若行施時但與持戒供養善者不與惡人是菩薩謬這裡的行施通財施與法施二類供養也通財供養與法供養如法行施時應平等的教化對過失重的應特別的憐憫才對如只供養持戒的善人而不供養破戒的惡人這與菩薩平等普濟的精神不合所以也是錯謬的菩薩的四種錯謬問題在不能適應根機與不能平等而有所偏愛復次迦葉菩薩有四正道何謂為四於諸眾生其心平等普化眾生等以佛慧於諸眾生平等說法普令眾生等住正行迦葉是為菩薩有四正道上面說的邪行重在不契機現在來說菩薩有四正道著重於平等四正道到底是什麼呢一於諸眾生其心平等菩薩發心是為了一切眾生於一切眾生住平等心所以對未信的眾生如有因緣的話一定要教化他使他生長淨信不會輕忽的以為可能已信了而不為他說法二普化眾生等以佛慧這如法華經說的令一切眾生開示悟入佛之知見佛慧是佛菩提也就是佛知見菩薩以平等心本著不二的平等大慧來化導一切在這一原則下應機說法就是說二乘法也還是菩薩道還是引入佛慧的方便這樣的教化施設無量方便才是菩薩教化眾生成佛的正道並非不問根機的是否適應一味的以深法來教化才算是普化眾生同成佛道三於諸眾生平等說法對小機而引令向大要說大乘法大乘行者普學一切法門也應該開示小乘法所以可以說為一切眾生說一切法都是平等的但在現實的適應上先後差別也還是不同的四普令眾生等住正行菩薩如供養持戒善人不供養破戒惡人生分別心那善惡眾生就會明顯的分化距離越來越遠惡人會自卑而自棄於佛法試問菩薩這樣的教化不以財法供養惡人怎能教化惡人所以菩薩的平等布施才能普化眾生使同樣的安住於正行中菩薩的發心平等教化的目標平等說法平等使眾生同住正行平等菩薩以此四大平等而施教化就是菩薩的正道了己七善知識復次迦葉菩薩有四非善知識非善等侶何謂為四求聲聞者但欲自利求緣覺者喜樂少事讀外經典路伽耶毘文辭嚴飾所親近者但增世利不益法利迦葉是為菩薩有四非善知識非善等侶在菩薩自利利他的學程中什麼是善知識善等侶非善知識非善等侶呢知識是眾所知識是眾生仰望而人所親近的等侶是伴侶所以善知識與善等侶就是良師益友非善知識非善等侶是無益或有損的師友了以菩薩道來說如與菩薩道有損的那怕是德高望重也是非善知識非善等侶學菩薩道不能沒有良師益友所以特為開示先說菩薩有四非善知識非善等侶是那四種呢一求聲聞者但欲自利小乘的聲聞行者聽佛的聲教而得道所以名聲聞求聲聞乘的但求己利己利不是世俗的名聞利養也不是來生福德多聞持戒習定等功德是解脫自己的生死證得涅槃的大利專為自己的生死大事而修證說起來名正言順可尊可敬但這種專為自己著想的作風對菩薩道來說如受了他的熏染可能會退失大乘所以法華經說勿親近小乘三藏學者二求緣覺者喜樂少事這是小乘的又一類從觀緣起得悟而立名也叫獨覺聲聞人但求自利總還受佛的教導過著僧團的生活經常遊化人間顧問僧事緣覺可不同了不但專求自利而且喜樂少事不喜歡事情厭惡煩囂大迦葉就是這樣的根性他經常過著獨住苦行的生活連乞食也嫌麻煩為少年比丘說法也不願意甚至敢於違反釋尊的教導這對化度眾生的大乘道來說是嚴重的障礙所以儘管他有修有證也不是菩薩的良師益友緣覺者的風格由於佛涅槃後大迦葉取得僧團的領導權而深刻的影響了聲聞僧團使流行中的聲聞僧越來越遠離釋尊的本懷不重利益眾生的教化所以受到菩薩行者的嚴厲訶責指為欠佛債者三讀外經典路伽耶毘文辭嚴飾有的專重世學讀誦外道經書路伽耶毘路伽耶毘就是上文的路伽耶順世除了現實的功利的而外還學習文辭嚴飾那是文法修辭以現代話來說那是文藝古代佛教有很多有名的文藝大師如馬鳴等但那本是文藝家出家以後就以文藝來贊助教化不是出家學菩薩行而還專心去學習文藝這種人漂流於佛法門外親近了有向外退墮的危險四所親近者但增世利不益法利如所親近的師友不能使你得到法益戒定慧解脫等功德而只是增益些俗利使你有名聞有利養有地位有寺院有徒眾有護法盡是些世俗的利益這雖是一般所親近仰望的大德而不一定是大乘道中的良師益友這使你忘記佛法修證的利益謹慎謹慎總之或是使你離去以利益眾生為先的精神或是使你在世俗的知識財利中走入歧途的師友都是非善知識非善等侶復次迦葉菩薩有四善知識四善等侶何謂為四諸來求者是善知識佛道因緣故能說法者是善知識生智慧故能教他人令出家者是善知識增長善法故諸佛世尊是善知識增長一切諸佛法故迦葉是為菩薩四善知識四善等侶與上相反的菩薩有四善知識四善等侶四類是怎樣的呢一諸來求者是善知識佛道因緣故自利不是善知識那麼凡有來求求財求法的使你實踐利他的行為就是菩薩的良師益友了對於來求的一般都厭惡他或勉強的給予實在不對這可說是上門來教你積集利他的功德使你積集成就佛道的因緣這該怎樣的歡喜呢二能說法者是善知識生智慧故凡是能說法的肯說法的使你生長智慧的是菩薩的良師如本經所說以智慧為先而後菩提心能成就真實菩薩智慧是大乘道的眼目熱心弘揚正法就是菩薩的好模範緣覺的確是不對的他愛好少事獨住就是教化眾生只是現神通使人生信心而從不說法以啟發信者的智慧在大乘道中怎樣才是良師益友原是不消多說而可以明白的三能教他人令出家者是善知識增長善法故雖然在家與出家都可以信修佛法行菩薩道但在家人為了生活不免著重世俗功利的知識出家人沒有家庭生活的紛擾可以專心地增長出世的善法所以如能勸化他人出家的就是使人遠離世俗知識而專心佛法的是真善知識經上說到出家的功德很大勸人出家的功德也大四諸佛世尊是善知識增長一切諸佛法故諸佛世尊是善知識是不要多說的學者從佛修學如佛的兒女一樣繼承佛的家業有的得財分來生福報有的得法分佛的本意當然要使你知法入法是法分而不是財分要人不求果報而以正法的覺證來自利利他增長一切諸佛的功德法所以從佛而得證入的總是說自己是從佛口生從法化生得法分不得財分這與令人得世俗利益的惡知識是怎樣的不同拿這菩薩四善知識四善等侶與邪行的非善知識相對比就知道菩薩應怎樣的親近修學了己八真實菩薩復次迦葉菩薩有四非菩薩而似菩薩何謂為四貪求利養而不求法貪求名稱不求福德貪求自樂不救眾生以滅苦法樂聚徒眾不樂遠離迦葉是為四非菩薩而似菩薩菩薩有了直心調順成就而後在化他方面能行四正道在求法方面有四善知識那就可以成就真實菩薩了先從相反的邪行說起菩薩有四非菩薩而似菩薩實際是虛偽的那四種人呢一貪求利養而不求法有的多聞持誦通大乘的法藏可說是大乘的大學者但他是利名學教為了貪求利養而不求法的實踐不能說是真實的菩薩二貪求名稱不求福德有的大乘行者不能與大眾共住去阿蘭若修行但他是貪求修行的名稱而不想積集福德菩薩必要福慧雙修現在離眾修行不求福德那裡會是真實菩薩三貪求自樂不救眾生以滅苦法有的貪求自己的涅槃樂只作些興修寺院等福業而不以滅苦的佛法來救眾生自得解脫而不使人得解脫樂是相似的菩薩四樂聚徒眾不樂遠離有的統攝大眾歡喜聚集一些徒眾如世俗的兒女興旺一樣眷屬心深不重於身心的遠離似乎廣度眾生而其實算不得真實菩薩這四類瑜伽師地論解說為持法者阿蘭若者興福業者御眾者如沒有真無我的勝解著於世俗都是相似的菩薩復次迦葉菩薩有四真實菩薩何謂為四能信解空亦信業報知一切法無有吾我而於眾生起大悲心深樂涅槃而遊生死所作行施皆為眾生不求果報迦葉是為四種真實菩薩福德相反的菩薩有四真實菩薩怎樣才是真實的呢一能信解空亦信業報一切法性空是依因緣果報而顯示的所以大乘的正義是由於因果所以是本性空的因為本性空所以因果不失龍樹中論說雖空亦不斷雖有亦不常業果報不失是名佛所說如菩薩能這樣的信解空也能信解業果不偏於空理那麼多聞持法者也就不會為利養而不求正法的實踐了二知一切法無有吾我而於眾生起大悲心一切法無吾我無我無我所確是佛法的實義但如信解偏差會因無我無人而不問眾生去阿蘭若修行不知勝義無我世俗的眾生卻宛然而有這樣的通達就會徹悟無我而不忘眾生於眾生起大悲心廣修福德了三深樂涅槃而遊生死菩薩深深的愛樂涅槃又深知涅槃不離於生死所以能安住涅槃而遊生死也就是歷劫在生死中度眾生不會自趣涅槃專興福業而不以滅苦的正法救眾生了四所作行施皆為眾生不求果報菩薩是攝眾的是應以財法來攝受眾生的但所有的一切施與是為了利益眾生而不是貪著徒眾門庭興盛因此所有的功德不求自己現生與來生的果報而迴向大眾這樣的攝導大眾才是真實菩薩世尊總結的說是為四種真實菩薩福德特別提到福德真是語重心長出家的菩薩應知菩薩的修證成就是不能離去福德的從生長智慧不退菩提心到這成就真實菩薩世尊扼要又完滿的開示了菩薩的正行這是出家菩薩所應好好修習的正行戊二正行勝利己一得大藏復次迦葉菩薩有四大藏何謂為四若有菩薩值遇諸佛能聞六波羅蜜及其義解以無礙心視說法者樂遠離行心無懈怠迦葉是為菩薩有四大藏菩薩修學了上面所說的正行從得智慧不退菩提心到真實菩薩福德就能得到正行的種種勝利勝利是殊勝的義利本經又分四項來說趙宋譯作六項先說四大藏世尊又告訴迦葉菩薩有四大藏藏是庫藏菩薩在初阿僧祇劫中修學正行積聚無邊的福德智慧資糧如大庫藏一樣廣大的福智資糧以四事來統攝四事是一若有菩薩值遇諸佛菩薩在菩提道的學程中生生世世到處都能逢到諸佛生生都能見佛也就能生生聽法供養修行也就用不著擔心退墮了這是多大的福德善根呀二能聞六波羅蜜及其義解六波羅蜜度是大乘菩提道的綱領菩薩見了佛不但略聞六度的大要而且還聽到六度的義解因為六度的意義深廣無邊所以佛與菩薩又加以解說發揮這主要是六度的論典這樣不但是生生見佛又能生生聽聞大乘法義成就大乘的聞所成慧三以無礙心視說法者說法者是佛與菩薩菩薩聽聞了大乘法義對說法者所說的要有隨順心沒有成見沒有隔礙沒有異想這樣的隨順師意才能如理的思惟大乘法義成就大乘思所成慧四樂遠離行心無懈怠菩薩的親近如來聽法思惟目的在願樂修學遠離行什麼叫遠離行不受境界的拘縛心能解脫自在不與煩惱作伴侶是真遠離為此而修行從修行來實現解脫自在一心精進不懈怠不放逸能成大乘修所成慧大乘的無邊資糧總攝於見佛聞法思惟修行中是為菩薩有四大藏此四大藏等於聲聞的四預流支親近善友多聞正法如理思惟法隨法行己二過魔事復次迦葉菩薩有四法能過魔事何謂為四常不捨離菩提之心於諸眾生心無恚礙覺諸知見心不輕賤一切眾生迦葉是為菩薩四法能過魔事再說第二勝利修學了菩薩正行就能過魔事什麼是魔事無論是外境內心引使自己向下的退後的就是魔事本經為大乘法所以凡與大乘法相違或可能退失大乘的就是大乘的魔事修學菩薩正行就能勝過魔事也以四法來說明一常不捨離菩提之心菩提心是大乘道的親因有了就是菩薩失去了就不是菩薩菩薩能常念菩提而不捨離這就超過了世間五欲人天果報聲聞自利緣覺厭煩囂的魔事二於諸眾生心無恚礙菩薩以利益眾生的慈悲心為根本如對眾生而有恚怒心隔礙心這怎麼能利益眾生所以大乘法中貪欲的過失還小不妨修菩薩行而瞋恚的過失極重與菩薩道不能並存能心無恚礙就不致有退失慈悲的魔事三覺諸知見知見指外道的種種邪論邪法一異常斷等知見如不能覺了他就不能教化他還有在不知不覺間落入外道知見的危險四心不輕賤一切眾生下賤的貧窮的殘廢的愚癡的邪惡的顛倒的這些雖可憐可憫而終究要向上成佛如法華經的常不輕菩薩逢人就說我不敢輕於汝等汝等皆當作佛從一切終向佛道來說怎麼下賤也是未來的佛菩薩就不會如印度的世俗知見輕視低賤階級了約向佛道說離菩提心約化眾生說有恚礙心於眾生中特別是對外道知見不覺了對低賤眾生起輕視心這四法為菩薩道的大魔事修習正行就能超過這魔事成為真實菩薩己三攝善根復次迦葉菩薩有四法攝諸善根何謂為四在空閑處離諂曲心諸眾生中行四攝法而不求報為求法故不惜身命修諸善根心無厭足迦葉是為菩薩四法攝諸善根第三勝利是攝諸善根修學菩薩正行大乘善根會不斷的增長廣大起來如約根本說菩提心是大乘善根約差別說一切善根是大乘善根現在約能攝持善根而不失的四大要行來說一在空閑處離諂曲心沒有人的地方叫空閑處一般人面對別人多少會注意自己不起顛倒亂想怕內心有了邪曲目光與態度會自然的流露出來被人發覺了損害自己的名譽但一到無人處就什麼都不在乎種種諂曲邪心都起來了菩薩修學正行真能表裡一如人前人後都能正念在前不起邪曲心這是菩薩的慎獨功夫二諸眾生中行四攝法而不求報菩薩在獨居時能正念現前在大眾前呢就能以四攝法布施愛語利行同事來廣結人緣普施教化四攝本是世間法為攝眾的主要條件菩薩要攝受一切眾生當然要行四攝法但與常人不同既不求現生的報答也不求來生的果報只覺得菩薩應該這樣行應這樣的利益眾生三為求法故不惜身命佛法是解脫成佛的法門是難遇難聞的佛不出世的時候或生在邪見興盛的區域或生三途惡道長壽天等一句一頌的佛法也難以得到在菩薩本生談中有願以身體供勞役的願犧牲身命的以求得一頌一經求法是如此的真誠在傳記中如善財的南參常啼的東行玄奘的西遊都是不惜身命求法的榜樣能這樣的為法忘軀是久修菩薩正行的勝利四修諸善根心無厭足菩薩的心量虛空一樣的廣大海一樣的深修習一切善根從沒有滿足厭心顯出了菩薩的無限精進這那裡是得少為足的小乘所可及的這樣的獨處處眾求法修善就是菩薩四法攝諸善根的勝利己四福德莊嚴復次迦葉菩薩有四無量福德莊嚴何謂為四以清淨心而行法施於破戒人生大悲心於諸眾生中稱揚讚歎菩提之心於諸下劣修習忍辱迦葉是為菩薩有四無量福德莊嚴第四勝利是無量福德莊嚴菩薩積集無邊的福智資糧就作為菩薩的莊嚴什麼是莊嚴一如美麗衣服耳環手釧瓔珞等使人端莊嚴麗的是莊嚴二軍人出征時所有的盔甲武器也叫莊嚴這不但顯得更威武也不易為敵人所損害這樣菩薩的無量福德使菩薩的身心莊嚴清淨不受煩惱魔外所害所以稱無量福德為莊嚴現在以四種最難得的莊嚴來說一以清淨心而行法施菩薩純以大悲心為眾生說法不存絲毫名利恭敬的私欲叫清淨心二於破戒人生大悲心菩薩是平等大悲於一切眾生都看作自己的兒女一樣但對於破戒的惡行眾生特別的悲憫心切這如父母的愛兒女雖平等的慈愛而對於有病的或能力差些的會特別的關顧三於諸眾生中稱揚讚歎菩提之心這是清淨法施中最切要的法施在大眾說法時常常稱讚菩提心的功德華嚴經入法界品讚揚的特別多勸人發菩提心以大乘法來說菩提心為因這是首要的沒有菩提心一切大乘功德不能出生不能成立俗語說先立其大者本立而道生以佛法來說這莫過於菩提心了四於諸下劣修習忍辱忍辱中最難忍的是受到下劣者的侮辱傷害覺得自己這樣的身分地位而受到這種人的辱害實在難以忍受其實對這種人能修忍辱才能於一切修忍否則向富貴權勢兇惡者低頭不過是權衡得失明哲保身而已算得什麼忍辱呢這四法都與施戒忍有關也是與眾生有關的最難得的福德莊嚴戊三正行成就復次迦葉名菩薩者不但名字為菩薩也能行善法行平等心名為菩薩略說成就三十二法名為菩薩何謂三十二法修習菩薩正行就是在初阿僧祇劫中積集無邊的福智資糧如積集圓滿成就資糧位滿就是名符其實的菩薩世尊為了具體的說明這正行成就的菩薩所以又對迦葉說名菩薩者不但名字為菩薩叫叫而已如初發菩提心的初受菩薩戒的也可以名為菩薩但並沒有成就菩薩的體相如人一樣初在胎中結生或還在血皰肉團階段雖說是人了但並沒有人的體相如漸漸的形成了手腳眼耳口鼻才真的像人了菩薩也是這樣發菩提心以後修習廣大正行成就才是有名有實的菩薩登地的菩薩生如來家如胎兒的誕生一樣那麼正行成就的菩薩是怎樣的呢依瑜伽師地論決擇分卷七九引述本經要有具法行平等行善行法住行相本譯但說能行善法行平等心二行應該是譯者闕略了法行等四行以略說成就三十二法來說明無著的攝大乘論所知相分也引本經的成就三十二法名為菩薩無著菩薩以十六相來分別解說這三十二法與瑜伽師地論不同現在大體依瑜伽師地論說常為眾生深求安樂皆令得住一切智中心不憎惡他人智慧破壞憍慢深樂佛道一法行有五法法行是一切修行與正法不相違依於法順於法向於法而行一常為眾生深求安樂深求即增上意樂強勝有力的願樂常為眾生的利益安樂著想這是說菩薩一切修學不為自己但為眾生二皆令得住一切智中一切智是佛的大菩提教化眾生發菩提心使眾生都能安住佛道三心不憎惡他人智慧菩薩自己知道了智慧的功德所以對他人的甚深智慧不會起憎惡心嫉妒障礙四破壞憍慢能謙虛低下對有學有德有修有證的菩薩尊敬隨順不起憍慢心上對勝法說此對勝人說五深樂佛道深心愛樂佛菩提志願堅固牢不可破愛敬無虛親厚究竟於怨親中其心同等至於涅槃言常含笑先意問訊所為事業終不中息普為眾生等行大悲心無疲倦多聞無厭自求己過不說他短以菩提心行諸威儀二平等行有八法一愛敬無虛菩薩能真誠的愛敬眾生愛心重了不免近則狎敬心重了又會疏遠起來所以菩薩有愛有敬愛敬合一二親厚究竟於怨親中其心同等至於涅槃親厚即親密究竟即徹底親厚究竟是徹底的敬愛親密約人來說不論是怨敵親愛或不怨不親的中人心都同等的親密約時間來說從現在未來一直到涅槃都是一樣的親愛三言常含笑先意問訊和顏悅色的與人談話愛語而且是先向人問訊起居四所為事業終不中息曾答應了幫助為他作什麼事一定有始有終在沒有完成以前決不會中間停頓的五普為眾生等行大悲對沒有答應擔當為他作事的內心也普遍的起平等大悲在有緣時一定為他作利益的事業六心無疲倦多聞無厭菩薩是無限的精進教化眾生無論怎樣的任勞任怨也不會疲倦利益眾生的無量方便要從多聞中得來所以聽法也永沒有厭足心七自求己過不說他短常反省自己的過失所以能日進於善不說他人的短處所以能存心寬厚去愛人八以菩提心行諸威儀行住坐臥語默動靜叫威儀菩薩的一切身語行為都出發於菩提心上求下化的心以上八法都是對眾生有平等大悲的表現所行惠施不求其報不依生處而行持戒諸眾生中行無礙忍為修一切諸善根故勤行精進離生無色而起禪定行方便慧應四攝法三善行有七法六度四攝是菩薩的善行自利利他的大綱正行成就的菩薩所修的六度四攝能做到像下面所說的一施度所行惠施不求其報財施或法施都不求現生的報答未來富樂的果報二戒度不依生處而行持戒不是凡夫那樣的為了來生的生於人間天上生處三忍度諸眾生中行無礙忍對眾生修忍辱時能心平氣和沒有恚礙心四精進度為修一切諸善根故勤行精進菩薩的精進是大精進不是為了少少功德少少善根而是為一切善根而行精進五禪度離生無色而起禪定修禪定成就的要隨定力不動業而生色無色界天菩薩行以見佛聞法利他為先要所以雖修起禪定而以悲願力智慧力常生人中或生於天上也決不生四無色空無邊處識無邊處無所有處非想非非想處天因為生在這種長壽天上於見佛聞法修菩薩行是有障礙的六智度行方便慧慧是般若般若的正觀無分別法性三乘是同樣的菩薩的般若以方便助成所以與小乘不同什麼是方便悲願為方便無所得為方便這樣的方便慧是菩薩的般若七應四攝法一切化導眾生都與四攝法相應善惡眾生慈心無異一心聽法心住遠離心不樂著世間眾事不貪小乘於大乘中常見大利離惡知識親近善友成四梵行遊戲五通常依真智於諸眾生邪行正行俱不捨棄言常決定貴真實法一切所作菩提為首四法住行正行成就的菩薩不但聞思而已能勤修止觀安住正法所以叫法住有十二法一善惡眾生慈心無異菩薩能以同樣的慈心而對待持戒或毀禁的說法者二一心聽法在這不同的說法者前都恭敬的一心去諦聽三心住遠離聽了能住遠離行不為境相所轉四心不樂著世間眾事雖行在世間說法乞食遊行知僧事而心不會愛著這些事五不貪小乘於大乘中常見大利菩薩能時時見到大乘的殊勝功德佛果的難思功德菩薩的利濟功德所以不貪小乘法否則心住遠離不樂世事就落入小乘行徑了六離惡知識親近善友離不是嫉惡如仇拒人於千里之外而只是不隨順惡法七成四梵行遊戲五通梵行即清淨行這裡的四梵行約慈悲喜捨四無量定說菩薩以利益眾生為主所以得禪以後多修起此四梵行得了根本定就能修發神通神境通天眼通天耳通他心通宿命通五通菩薩利益眾生常以神通攝化故起五通遊戲是自在的意思八常依真智一切修行都依真實智不依虛妄識所以說依智不依識什麼是真實智如下文正觀真實中說上來八法從親近知識到依智修行此下四法是菩薩的攝化眾生一於諸眾生邪行正行俱不捨棄菩薩的攝化是不捨棄眾生的就是邪行眾生也不會棄絕他二言常決定一切教授言說明確決定使人能斷疑起信三貴真實法所說的以真實為要使聽者能如所說而向於實證四一切所作菩提為首教化眾生所有的身教言教沒有世俗的愛染心都是以迴向菩提為主如是迦葉若人有此三十二法名為菩薩上面以法行平等行善行法住分別了三十二法世尊又總結說若人有此三十二法有菩薩的德相資糧位圓滿才可名符其實的名為菩薩了丁二讚菩薩功德戊一標說復次迦葉菩薩福德無量無邊當以譬喻因緣故知上來說明菩薩的正行使人因解起行以下要讚歎菩薩的功德令人起信生敬所以世尊又說迦葉菩薩福德無量無邊說也說不盡也不容易了解唯有以譬喻因緣來說才可以明白譬喻是比喻也是事例現在約比喻說因緣是舉述事由如用作舉例就與譬喻相同了譬喻與因緣為佛說法所常用的本經雖雙舉譬喻因緣而以譬喻為主戊二別讚己一地水火風迦葉譬如一切大地眾生所用無分別心不求其報菩薩亦爾從初發心至坐道場一切眾生皆蒙利益心無分別不求其報在譬喻的讚說功德中共十九喻分為九類先以四大來譬說四大即地水火風這裡的四大約世俗的假名四大說不約極微說一地喻如一切大地眾生所用五趣地獄餓鬼旁生人地居天眾生都依大地而住穿的吃的用的居住睡眠行來出入一切都依大地對眾生來說大地的恩德太大了然而大地無分別心不會想到這些對眾生也不求其報菩薩也是這樣從初發心至坐道場成佛隨時隨處利益眾生一切眾生的任何功德任何安樂都是直接間接的依菩薩而成就皆蒙受了菩薩的利益大地是沒有分別的心所以不求報菩薩是心無分別觀一切法無我所以也不求其報一切不為自己但為利益眾生菩薩是何等的偉大迦葉譬如一切水種百穀藥木皆得增長菩薩亦爾自心淨故慈悲普覆一切眾生皆令增長一切善法二水喻水種即水界各有特性各各類別叫種如一切水種的滋潤水分充足而後百穀藥木皆得增長沒有水就不生不長枯槁死了菩薩也如水一樣由於自心淨潔不偏愛自己所以引發慈悲普覆一切眾生菩薩的慈心普被以種種教化種種策勵種種安慰令眾生都能增長一切善法或得人天善法或得二乘善法或得菩薩善法佛善法如沒有廣大慈心如小乘一樣怎能滋潤眾生增長善法呢迦葉譬如一切火種皆能成熟百穀果實菩薩智慧亦復如是皆能成熟一切善法三火喻火是熱性溫度一切植物的生長到成熟溫度是極重要的在最極寒冷處植物都不易生長不要說成熟了所以說如一切火種皆能成熟百穀果實菩薩智慧火也是這樣愚癡無智為一切不善法的因緣有智慧才能向上向善生長一切善法拿菩薩行來說般若如眼目一樣能引導一切善法到於佛地一切善法能圓滿成就如沒有般若有漏善法終久要散失滅盡的所以說智慧皆能成熟一切善法迦葉譬如一切風種皆能成立一切世界菩薩方便亦復如是皆能成立一切佛法四風喻風是動性在世界初成立時先於虛空中有大風輪起從風輪起水輪從水輪起金輪才成大地這是說在虛空中先現起氣體的漩渦運動而後形成液體到固體世界成立的過程從風氣體的運動開始所以說如風種皆能成立一切世界菩薩方便力也是這樣應時應機以方便的善巧施設而後能成立一切佛法上面四喻以地水火風比喻讚歎菩薩的無分別心清淨慈悲心智慧方便不可思議的功德己二月日迦葉譬如月初生時光明形色日日增長菩薩淨心亦復如是一切善法日日增長五月喻世尊又以白月為喻說如月初生時光明形色絲月眉月弦月滿月一日日增長起來菩薩淨心菩提心也是這樣從初發心登地到佛地不但一天天清淨與淨心相應的一切善法也一日日增長起來到功德圓滿迦葉譬如日之初出一時放光普為一切眾生照明菩薩亦爾放智慧光一時普照一切眾生六日喻如日初出一時放光普為一切眾生而作照明成辦一切事業菩薩放智慧光也這樣的一時普照一切眾生佛菩薩的慧光照明據華嚴經說日出先照高山次照山谷然後普照平地有先後不同怎麼說一時普照呢菩薩的慧光於眾生無分別想所以是頓照的至於見或不見先見或後見那是眾生自己的業力與善根力的關係己三師象迦葉譬如師子獸王隨所至處不驚不畏菩薩亦爾清淨持戒真實智慧隨所住處不驚不畏七師王喻如師子獸王威勇無比在深山中隨所至處無論遇到什麼禽獸都不驚不畏的坦然前進菩薩也是這樣具足了清淨持戒真實智慧所以在生死中隨所住處人間天上大眾中空閒處受讚歎被毀謗不論怎樣菩薩一樣的心安理得不驚不畏戒行清淨行為就正當了真實智慧知見就不錯謬了有了淨戒與真慧還會有惡道惡名不活等驚畏嗎什麼也不驚不畏心安理得唯為眾生而行菩薩道迦葉譬如善調象王能辦大事身不疲極菩薩亦爾善調心故能為眾生作大利益心無疲倦八象王喻如善調順了的象王在戰爭時勇往直前能辦克敵致勝的大事無論怎樣勞苦創傷象王還是非常堅強身不疲極菩薩也是這樣由於止觀熏修極善調伏自心使心極明淨極安定極有力量所以能為眾生作大利益任勞任怨心無疲倦己四蓮華樹根流水迦葉譬如有諸蓮華生於水中水不能著菩薩亦爾生於世間而世間法所不能污九蓮華喻如有青的紅的白的諸蓮華生於水中但水不能著他菩薩也是這樣生於世間不免有衣事食事住事行事彼此往來事相互談論事在家菩薩更有家庭社會的一切事然而菩薩雖行於世間卻是這些世間法所不能污染的心行還是那樣的清淨解脫在世間而不為世間法所染名為出世迦葉譬如有人伐樹根在還生菩薩亦爾方便力故雖斷結使有善根愛還生三界十樹根喻如有人伐樹只砍些枝葉或截去樹幹樹根既在還是要生枝葉的菩薩在三界中受生的道理也是這樣三界是眾生的生死相續死了為什麼還要生由於煩惱煩惱能發業又能潤業使生起果報所以有了煩惱就生死不斷聲聞行者斷了見所斷煩惱就只剩七番生死阿羅漢斷盡了一切煩惱就不再招感後有生死了這樣凡夫在生死就受苦報小乘證涅槃就沒有生死菩薩要長在生死中度眾生才能行菩薩行而成佛這樣的長在生死與凡夫有什麼不同呢不同菩薩也是斷煩惱的那為什麼又不證涅槃呢菩薩有悲願熏修的方便力雖斷結使使是隨眠的異譯不再愛著三界與小乘一樣但還有善根愛深深的愛慕佛菩薩的無邊功德善法雖斷結使不以為完成了還要志求佛菩薩的難思功德就以這種善根愛為愛滋潤業力還生三界廣度眾生如沒有願度眾生願成佛道的方便力早就小乘一樣的證涅槃了迦葉譬如諸方流水入大海已皆為一味菩薩亦爾以種種門集諸善根迴向阿耨多羅三藐三菩提皆為一味十一流水喻溪澗江河叫流水如諸方流水清濁鹹淡甘苦種種不同等到流入大海那就皆為一味鹹味不再有江水河水等分別了菩薩也是這樣以種種門信願門智慧門慈悲門施門戒門等種種門修集諸善根各不相同但這一切善根和集一同迴向阿耨多羅三藐三菩提等到同歸如來的一切智海一一法都豎窮橫遍皆為一味大解脫味了己五山王國王迦葉譬如須彌山王忉利諸天及四天王皆依止住菩薩菩提心亦復如是為薩婆若所依止住十二山王喻這也可與上流水為一類須彌山譯義為妙高山拔海八萬由旬為一切山中最高的所以叫山王如須彌山王忉利諸天及四天王皆依止而住須彌山拔海的半山出海四萬由旬有四大王眾天東方持國天王南方增長天王西方廣目天王北方多聞天王四天王統攝八部鬼神守護世界在須彌山頂上有忉利天忉利是梵語義譯為三十三山頂四方各有八天如封疆大臣中央有釋迦提婆因陀羅簡譯釋提桓因或帝釋天為忉利天王合稱三十三天四大王眾天與忉利天都依須彌山而住名地居天菩薩菩提心也這樣的為薩婆若所依止住梵語薩婆若漢譯為一切智就是佛的大菩提菩提心為因一切智為果果依因立大地中最高最勝的是須彌山頂的帝釋一切眾生中最尊勝的莫過依菩提心的佛菩提了迦葉譬如有大國王以臣力故能辦國事菩薩智慧亦復如是方便力故皆能成辦一切佛事十三國王喻如有大國王他的國土既大人民又多國王怎樣能治理呢國王以文武大臣力故能辦國事國王只是總其成統御百官去治理而已這樣菩薩智慧證入一切法空性平等不二般若將入畢竟空絕諸戲論也是不能安立作為的但依般若起方便力或稱為依根本智起後得智方便將出畢竟空嚴土熟生就能成辦一切佛事般若如王方便如大臣一樣己六陰雲迦葉譬如天晴明時淨無雲翳必無雨相寡聞菩薩無法雨相亦復如是迦葉譬如天陰雲時必能降雨充足眾生菩薩亦爾從大悲雲起大法雨利益眾生十四陰雲喻本喻有晴明陰雲二喻但從稱歎菩薩功德來說只有陰雲一喻先反喻如天晴明時虛空淨無雲翳那是必無雨相這如寡聞菩薩一樣慧力不足不會說法必無法雨的然後正喻說如天陰雲時必能降雨充足眾生的需求真實菩薩也是這樣從大悲雲起大法雨利益眾生如法華經所說三草二木各得受潤生長一樣己七輪王摩尼珠迦葉譬如隨轉輪王所出之處則有七寶如是迦葉菩薩出時三十七品現於世間十五輪王喻轉輪聖王是統一天下以正法化世的仁王據說隨轉輪王所出的世界就有七寶出現七寶是軍事領袖的主兵臣寶理財專家的主藏臣寶化洽宮內的女寶王后象寶馬寶是快速的交通工具珠寶是夜光珠在黑夜中照明軍營輪寶是圓形武器從千里萬里外飛來威力驚人見了都無條件的降伏輪王以此七寶統一天下菩薩出世時也有七寶三十七品現於世間三十七品即三十七道品為修行解脫的德行項目三十七品也分為七類四念處四正勤四神足五根五力七菩提分八聖道分這與輪王的七寶一樣迦葉譬如隨摩尼珠所在之處則有無量金銀珍寶菩薩亦爾隨所出處則有無量百千聲聞辟支佛寶十六摩尼珠喻摩尼珠義譯為如意珠這是非常神妙的如隨摩尼珠所在之處就會有無量金銀珍寶從摩尼珠中出來菩薩也是這樣隨所出處化導眾生就有無量百千聲聞辟支佛寶辟支佛即緣覺或獨覺聲聞與獨覺為小乘二聖都從大乘菩薩而來上輪王喻說明了有菩薩就有法寶摩尼珠喻說有了菩薩就有小乘聖者人寶己八同等園迦葉譬如忉利諸天入同等園所用之物皆悉同等菩薩亦爾真淨心故於眾生中平等教化十七同等園喻如忉利諸天人本來隨福力大小穿的吃的用的玩的都優劣不同可是進入同等園去遊玩時所用之物就一律同等沒有差別了同等園為忉利天四園之一唐譯作雜林園菩薩也是這樣由於真淨心的體驗證得平等不二法性本著真淨平等來觀一切所以能於眾生中平等教化不生差別想教法的差別只是適應的機感不同而已己九咒藥糞穢迦葉譬如咒術藥力毒不害人菩薩結毒亦復如是智慧力故不墮惡道十八咒藥喻如咒術藥力能使毒不害人毒或是毒藥或是蛇蠍等毒本是要傷害人命的但如以藥力來消解或以咒術來制伏毒力就不會害人了這樣菩薩的結使毒雖本來是使人作惡使人墮落的但有了智慧力雖有煩惱結毒也就不墮惡道所以說假使有世間正見增上者雖復百千生終不墮惡趣結毒為菩薩的智慧所制伏雖有而不成大害這所以菩薩能不斷盡煩惱久在生死中度眾生而沒有墮落的危險迦葉譬如諸大城中所棄糞穢若置甘蔗蒲桃田中則有利益菩薩結使亦復如是所有遺餘皆是利益薩婆若因緣故十九糞穢喻如諸大城中所棄糞穢垃圾呀糞便呀非立即清理不可可是到了農夫手裡若置放在甘蔗蒲桃田中作為肥料那不但不討厭反而有利益了菩薩結使也是這樣在凡夫小乘人看來這是最要不得