難得而且他也不宣說有我論可是內心的身見我見不滅一切還是以自我為中心我能持戒我能清淨持戒我是怎樣我要怎樣這樣的比丘即使不說有我而思想行為一切依我見而行是名第二類破戒比丘似善持戒三有一類比丘不但具足持戒而且慈心廣大不止如上的自利了但同樣的有我相人相眾生相取眾生相而行慈心是凡夫的眾生緣慈由於取著我人眾生相所以聞一切法本來無生無我相可得無法相可得就會心大驚怖以為非佛所說而進行誹毀甚深法義像這類比丘是名第三類破戒比丘似善持戒四還有一類比丘持戒精嚴能具足修行十二頭陀法頭陀是梵語是抖擻的意義這是過著極端刻苦生活的稱呼十二頭陀行中衣著方面有二但三衣糞掃衣飲食方面有四常乞食不餘食一坐食節量食住處方面有五住阿蘭若塚間坐樹下坐露地坐隨地坐睡眠方面有一即常坐不臥這樣的苦行頭陀而心中見有所得以為有法可得實有法性可證違反了性空不可得的正法這樣是名第四類破戒比丘似善持戒從這四類來說凡是取相著有執我立我的他們的知見與世俗甚至與外道一致的那不管他怎樣持戒也就是破戒違反如來戒法的真義己二善淨持戒庚一長行復次迦葉善持戒者無我無我所無作無非作無有所作亦無作者無行無非行無色無名無相無非相無滅無非滅無取無捨無可取無可棄無眾生無眾生名無心無心名無世間無非世間無依止無非依止不以戒自高不下他戒亦不憶想分別此戒是名諸聖所持戒行無漏不繫不受三界遠離一切諸依止法不善淨持戒的四類破戒比丘已如上說那怎樣才是善巧的清淨的持戒呢說明這點如來又對迦葉說真實的善持戒者一定是無我無我所的這是標要從離執一邊說沒有我見我所見也就沒有我愛我所愛等從契入正法說是通達無我無我所也就是我空法空性的這才是善淨持戒否則執我執我所與正法不相應就是前面所說的破戒比丘了本著這樣的淨戒立場所以說無作無非作依世俗說戒是善淨的表業動作而有所表示的與無表業無所表見的表與無表舊譯為作與無非作在這法性本空的正覺中沒有法是作的作都不可得更無所謂非作了由於作不可得所以無有所作的戒也無受戒持戒的作者沒有能作者與所作法也就無行無非行了行是遷流造作的意思廣義為一切有為法要略為以思心所為主的身口意行什麼是戒有的說是表無表色有的說是名所攝的思也可說身口業是色意業是名然從上面無作無行來說當然也無色無名這樣無相可以表示相都不可得更無非相可得了以毘尼來說毘尼的意義是滅滅一切不如法的罪惡過失但在我法空性中一切法本來不生也就無法可滅滅尚且不可得自無所謂非滅了由於正覺法性無取無捨所以無某些法而可取可持也無某些法而可棄可捨上來約正覺以觀戒法戒是世界悉檀每一類戒每一條戒每一項規章制度都是與人地心物有關約人來說或是對社會或是對教團男女老少都離不了人廣義即離不了眾生在真實的淨戒中無眾生可得眾生只是假名其實假名也是不可得的所以又說無眾生名這正如般若經所說菩薩不可得菩薩名字也不可得戒是依內心而動發於外的但在真實戒中超越意識的卜度所以無心也無心名戒是世間法不離地域性而真實戒不屬於地域性所以無世間但這並非說遺世獨存所以又無非世間戒為學佛者所依止如佛的依正法而住一樣但這是無依止相可得也無非依止如著於依止或無依止即乖失佛意上來約正覺以觀戒所關涉的事件這樣真善淨戒的一切如法清淨不染決不以持戒而自高傲的不自高也就不會以低下來看他人的戒行不嫌惡他人的不清淨有違犯以平等捨心而住這如般若經說尸羅波羅蜜持犯不可得故不著持犯相不起高下見也不憶想分別此戒以為如何如何這樣的善持戒是什麼戒是名諸聖聲聞緣覺佛所持的戒行這是最勝妙的如佛在菩提樹下正覺法性而成佛即名為自然戒上善戒一念般若現前自然的心地清淨無往而不自得所作沒有不合於法的這樣與聖道相應的戒就是一般所說的道共戒這是不與漏相應的無漏不為煩惱所縛的不繫不受三界生死果報遠離一切諸依止法如不再愛樂欣喜阿賴耶不著於一切這樣的戒才是善淨的持戒才是如來戒學的究極意義庚二偈頌爾時世尊欲明了此義而說偈言清淨持戒者無垢無所有持戒無憍慢亦無所依止持戒無愚癡亦無有諸縛持戒無塵污亦無有違失持戒心善軟畢竟常寂滅遠離於一切憶想之分別解脫諸動念是淨持佛戒不貪惜身命不用諸有生修習於正行安住正道中是名為佛法真實淨持戒持戒不染世亦不依世法逮得智慧明無闇無所有無我無彼想已知見諸相是名為佛法真實淨持戒無此無彼岸亦無有中間於無此彼中亦無有所著無縛無諸漏亦無有欺誑是名為佛法真實淨持戒心不著名色不生我我所是名為安住真實淨持戒雖行持諸戒其心不自高亦不以為上過戒求聖道是名為真實清淨持戒相不以戒為最亦不貴三昧過此二事已修習於智慧空寂無所有諸聖賢之性是清淨持戒諸佛所稱讚心解脫身見除滅我我所信解於諸佛所行空寂法如是持聖戒則為無有比依戒得三昧三昧能修慧依因所修慧逮得於淨智已得淨智者具足清淨戒說了上面清淨持戒那時世尊為了要顯示明了此清淨持戒的深義所以又重說偈言偈即伽陀為印度文學中的詩歌體凡經中先長行直說又以偈重說使意義更顯了的稱為重頌屬於十二部經的祇夜佛在這裡所說的重頌都是顯了清淨持戒凡九節可分二段第一段直據持戒以明清淨一如來所說的清淨持戒到底是怎樣的呢無垢污雜染清淨得都無所有這樣的了無纖毫可得的清淨持戒無憍慢心不會以自己能持戒或有功德而起憍慢的心也無所依止不會落入任何窠臼這樣的清淨持戒無煩惱根本的愚癡無明也無有依無明而起的諸縛煩惱都是繫縛持戒非常清淨不但不犯罪也無少少塵污的沾染對僧眾的規制也無有違失這樣的持戒心善調伏柔軟能成法器安住於畢竟常寂滅中能遠離於一切的憶想分別心不為戲論所動所以能解脫諸動念經上說動即為魔縛不動為法印這樣的離念安住畢竟寂滅才是清淨持佛戒者二清淨持戒的不貪惜自己的身命一心為道不會因愛著自己而作種種非法這約不貪愛現身說不用諸有生約不貪愛未來說有是欲色無色三有生是胎卵濕化四生眾生的造作凡夫的持戒都是為了未來的果報有生清淨持戒是不為這些生死法的唯修習於正行八正道行不向生死而住心寂滅不著現未身命一心安住正道中的是名為佛法真實淨持戒三清淨持戒不染著世間生死也不依如幻錯亂的世法不染不依得智慧的光明自然無愚癡黑闇無所有相無法相又無我相無彼相無人相人相與法相都不可得已知見諸法的真相如說一相無相所謂實相這樣是名為佛法真實淨持戒四戒為波羅蜜能登彼岸但在清淨持戒的無生死的此岸可著也無涅槃彼岸可住在生死與涅槃彼此二岸的中間或以煩惱為中流或以戒等道為中流既不著生死不住涅槃也無有中間可住這樣的兩邊不著中道不留所以說於無此彼中間亦無有所著心地清淨無種種繫縛無諸漏欲漏有漏無明漏心無煩惱正見一切而無有虛妄欺誑的亂相是名為佛法真實淨持戒五清淨持戒的心不著名色即不著精神與物質的一切境相內心又不生我我所執見這樣的不著境相不起執見也就是總結上來的廣說是名為安住真實淨持戒了第二段約持戒而進求究竟以明清淨六清淨持戒的雖行持諸戒如比丘比丘尼戒等而謙下柔和其心不自以為高而起憍慢也不以持戒為最上的不以自己的持戒為了不起不以受持的戒行為究竟這就能進一步的超過戒行而上求聖道寬泛的說戒定慧都是聖道徹底的說唯有無漏慧才是聖道佛法出世解脫的聖道特質就在於此如清淨持戒而又能進求聖慧道的是名為真實清淨持戒者的德相七持淨戒的不但不以戒為最上也不貴重三昧三昧是梵語義譯等持即正定戒是世界悉檀定是共世間學如沒有中觀相應都只是世間生死法那有什麼可貴呢所以能超過此戒定二事而修習於智慧這不是世俗的事相的智慧是勝義觀慧以觀一切法畢竟空寂無所有為法門的如能證入空寂無所有那就是三乘諸聖賢之聖性能這樣才是清淨持戒為十方諸佛所稱讚八這樣的依戒而修慧在智慧心中即能解脫身見不為我見所繫縛且更能除滅我我所而不起這樣的無我慧能深徹信解於諸佛所行的空寂法這樣的持聖戒為一切中最上妙的無有比的了九末了總貫這一意義說依戒修定能得三昧依三昧能修勝義觀慧與定相應的名修所成慧依因此所修慧能逮得於淨智無漏的聖智已得淨智的能所並寂才是具足清淨戒從如來的重頌來說如來讚揚道共戒而確認為應依戒而定依定而慧三學的次第增上不可廢但不宜拘守於戒定這樣的圓滿清淨持戒顯示了戒學與慧學的合一法毘奈耶不二這樣的戒才是正法才是如來所稱讚的丁二當機蒙益說是語時五百比丘不受諸法心得解脫三萬二千人遠塵離垢得法眼淨如來宣說真實的聲聞法門這裡已告一段落如來說法是不會沒有義利的所以再敘述當時聲聞學者得益的情形經典的結集者敘述當時法會的情形說如來說是上面這些法語時有五百比丘當下不受取諸法於一切法不再有所取著而心得解脫經典中或說離貪欲故心得解脫離無明故慧得解脫或簡要說心得解脫這都指證得聲聞究竟的阿羅漢果說阿羅漢離見修所斷一切煩惱心得解脫自在不再為煩惱及世法所拘礙此外還有三萬二千人聽了佛的開示也遠塵離垢斷除見所斷的煩惱簡稱三結名遠塵不起感生死報果的雜染業名離垢那時般若現前與正法我空法空性相應名得法眼淨法是正法法眼是證覺正法的智慧眼法眼契證正法不與染惑相應法性清淨智慧清淨所以叫法眼淨聲聞乘所說的法眼與大乘所說五眼之一的法眼多少不同反而與慧眼相合得法眼約證得聲聞初果須陀洹果說總之在當時的聽眾中五百位出家比丘眾已證果的聖者得了阿羅漢還有在家或出家沒有證悟的三萬二千人也證得了初果在家出家初學久學都隨機而得法益丙二巧說丁一鈍根退席五百比丘聞是深法心不信解不能通達從坐起去以下為巧說大科一般的正常說法那些自以為然的小乘學者不能得益所以如來又別出方便善巧來引導教化他們先敘說鈍根的退席如法華會上的五百位增上慢人一樣當時有五百比丘聞是上面所說的甚深法義心不信解不能通達既不能因信順而起解更不能深切的悟入這當然對如來所說的法門不得法味而興趣索然聽又聽不進去坐著也無意義所以就從坐位上起來離開如來與法會而去了丁二退席因緣戊一迦葉說爾時大迦葉白佛言世尊是五百比丘皆得禪定不能信解入深法故從坐起去佛法難聞這些比丘是應該知道的怎麼會在法會中間離去呢大眾也許會覺得希奇所以由本經的當機者大迦葉出來說起經如來開示以說明他們的退席因緣那時大迦葉出來啟白佛說世尊是五百比丘是一向重禪的都修得禪定禪是梵語禪那的簡譯譯義為靜慮是安靜中思慮思慮而又安靜的定定是三昧為心住一境的通稱禪也是定但別指初禪到四禪通別合舉叫禪定大迦葉說他們得禪定是重定的根機不但坐禪豈能作佛修禪也豈能解脫重定而忽略慧學的根機難怪他不能信解契入深法就從坐起而去這是大迦葉說他們退席也就指示退席的問題所在戊二如來說己一現緣佛語迦葉是諸比丘皆增上慢聞是清淨無漏戒相不能信解不能通達佛所說偈其義甚深所以者何諸佛菩提極甚深故若不厚種善根惡知識所守信解力少難得信受如來因大迦葉說起所以作進一步的說明先說他們退席的現在因緣佛告迦葉這五百位比丘皆是增上慢人增上慢是未得謂得他們修禪以為禪是怎樣的深妙有的修得初禪自以為證初果修得四禪自以為得四果自以為有修有證究竟成辦的增上慢人佛世也不少在佛法中如定慧不能平衡去修學那就定心越深心力越闇昧也就越不能勝解深義所以這些重定而以為有修有證的比丘聞是上面所說的清淨無漏戒相聖道戒就不能信解不能通達這雖因為他們的根鈍也因為佛法的甚深所以說佛所說的真實清淨持戒偈意義是極甚深的這樣深的理由何在呢這因為諸佛的大菩提現證最清淨法界到達極甚深的最深奧處如般若經深奧品說這是最深最妙非一切凡愚分別所能信解通達所以過去若不曾厚種善根根鈍慧薄現生又為惡知識所守護那就難於信解了什麼是惡知識說一切法有相我相法相空相可得是惡知識屬於惡知識時常聽聞取相法門習以成性自然信解力少對佛說的深義難得信受奉行五百比丘的退席也是自有因緣不足深怪了己二夙因又大迦葉是五百比丘過去迦葉佛時為外道弟子到迦葉佛所欲求長短聞佛說法得少信心而自念言是佛希有快善妙語以是善心命終之後生忉利天忉利天終生閻浮提於我法中而得出家是諸比丘深著諸見聞說深法不能信解隨順通達是諸比丘雖不通達以聞深法因緣力故得大利益不生惡道當於現身得入涅槃現生的情形每與過去有關生命是這樣的因果相續所以又說到他們的宿緣又大迦葉是五百比丘在釋迦佛以前賢劫第三佛過去迦葉飲光佛時本為外道弟子他們一起到迦葉佛所在存心欲求長短就是想在佛所說的法中找些話來批評說長說短他們的動機是不純的但由於如來的方便善巧他們聞佛說法覺得很有意義得起微少信心而自己心裡想念說是佛確乎希有說的法門真是快善妙語雖然屬於外道不曾能徹底悔悟修學佛法但就以是對佛法的一念的善心命終之後生忉利三十三天受天國的福樂等到忉利天命終因以前善念的餘力現生南閻浮提也就是佛時的印度於我佛法中出家作了比丘這五百人得到了過去聽聞佛法的善果可是由於是諸比丘過去作過外道弟子深著諸見我我所見常見斷見等外道都有他自己的邪僻見解以印度來說一是苦行主義以無義利的禁戒為修行叫戒禁取一是修定瑜伽主義以為種種深定如無所有定非非想定能得涅槃最上最妙叫見取安住於外道的見著中是不容易解脫的這五百位比丘前生作了外道弟子受到異見的深厚熏染所以聞迦葉佛說深法雖覺得希奇難得到底不能信解隨順通達這種外道僻見的等流因果一直到現在作了佛弟子還是偏好禪定不能信解隨順通達深法甚至退席而去不過聽聞了佛法一歷耳根萬劫不失所以五百比丘雖不通達但以聽聞深法義的因緣力種下清淨法種還是得大利益如過去不生惡道而生忉利天上人間現在當於現身得徹底的覺證而入涅槃這些大利益都從過去偶聞佛法而來如文殊師利菩薩曾因反對甚深法而墮地獄但文殊菩薩說現在想起來能這樣的大智慧於佛法得大成就還是從那一次聽聞深法而來所以不論懂與不懂信與不信能聽聞甚深法義功德比一切都希有丁三如來巧化戊一聲聞不能教化爾時佛語須菩提言汝往將是諸比丘來須菩提言世尊是人尚不能信佛語況須菩提耶對於這退席的增上慢比丘如來怎樣巧化呢先明聲聞的不能化以顯出如來教化的勝妙那時佛告須菩提須菩提是梵語譯義為善現在聲聞法中稱解空第一如來要他去教化說汝往他們那裡去將是諸比丘回來須菩提說世尊是人尚且不能信受佛的語言何況我須菩提呢還會聽我的話嗎在般若經中須菩提為菩薩說般若真是法門龍象但只是正常的教化遇到特殊根機要運用特出的方便便沒有辦法這可見大乘的善巧不是小乘聖者可及的戊二如來方便調伏己一現同分身行佛即化作二比丘隨五百比丘所向道中如來自己負起了方便教化的責任佛即化作二位比丘與他們的身分一模一樣而且跟隨五百比丘所走向的道路中在他們後面行去這是如來的同事攝化你與他一樣同一身分使他們有親切共同的感覺就可以接近他們談起話來否則身分如相距過遠就難以接近教化了己二起同分勝解庚一方便引發諸比丘見已問化比丘汝欲那去答言我等欲去獨處修禪定樂所以者何佛所說法不能信解諸比丘言長老我等聞佛說法亦不信解欲至獨處修禪定行如來不但化現同樣的身分比丘而且還示現同樣的勝解重禪化現的二位比丘前進那諸比丘見到了一見如故覺得自己離如來的法會而這二位也離開了所以問化比丘汝欲那裡去當然還不知道這二位也與自己一樣化比丘就答道我等欲去清淨的山邊林下獨處而修禪定去體味禪定的現法樂是的禪定必發輕安與輕安相應的身心喜樂的確極為勝妙特別是第三禪樂多少修行人貪著了禪樂為定力所拘縛