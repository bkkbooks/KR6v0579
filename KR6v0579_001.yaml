結所在在此有故彼有此生故彼生的緣起法則下顯示了生死流轉的現實二還滅門如說無明滅則行滅如是老死憂悲眾惱大苦皆滅既然是果必從因依因有果那就發見了解脫的可能也就是因滅果就滅無因果不生了在此無故彼無此滅故彼滅的緣起法則下開顯了涅槃還滅的真實生死與解脫都依十二緣起而開顯這是如來說法的肝心現在來略為解說一無明是一切煩惱的通性最根本最一般的如般若經說諸法無所有如是有如是無所有是事不知名為無明一切法是本無自性的是從緣而現為這樣的這樣的從緣而有其實是無所有空的真相如不能了達就是無明眾生在見聞覺知中直覺的感到一一法本來如此確實如此既不能直覺到緣有更不知性空這種直覺的實在感就是眾生的生死根源無明二行行是造作遷流的意思指依無明而起的身心活動約性質說有罪行福行不動行約所依說有身行語行意行身心動作及引起的動力業名為行三識泛稱一切生死的因緣是煩惱與業約這一生來說新生命開始最初的一念心名為識四名色依人類的胎生來說識是父母精血結合的最初心依之而引起生理的色心理的名開展在六根未成就位名名色五六入新譯六處即六根為六識生起的所依處胎兒漸長有眼耳等六根相現名六入六觸等到胎兒出生與境相觸引起身心的活動名觸七受受是領納嬰兒漸大受用受學受苦受樂等名受八愛到了成人性欲發動而開始男女的染愛名愛九取到了壯年為了生活為了事業爭名爭利爭權追求外在的一切佔有他支配他名取十有在愛取的活動中造成或善或惡的種種業成為未來新生命的潛力名有十一生依現生的煩惱發業因業力而又有未來新生命的開始名生十二生了無論如何跟著來的是老是死這樣在生死過程中因果鉤引展轉相生充滿了憂慮悲哀苦痛熱惱生死相續只是無限苦惱的大集合而已壬二顯中道明與無明無二無別如是知者是名中道諸法實觀如是行及非行識及所識名色可見及不可見諸六入處及六神通觸及所觸受與受滅愛與愛滅取與取滅有與有滅生與生滅老死與老死滅是皆無二無別如是知者是名中道諸法實觀佛說緣起本就是開示中道的所以阿含經中一再說離是二邊說中道所謂此有故彼有此生故彼生無明緣行如化迦旃延經說佛弟子見緣起生不起無見見緣起滅不起有見因為緣起是世俗的如幻的生滅所以不落二邊契入中道但有些佛弟子見佛說十二緣起流轉還滅就執有無明等自性以為實有生滅可得這樣的與佛的意趣相反所以佛又不得不說無無明亦無無明盡盡與滅相同乃至無老死亦無老死盡本經也就依十二緣起的流轉還滅來顯示本性空的中道說到無明就離不了明無明待明而安立無明是愚癡明就是般若明與無明是相待的假名了無自性以本性空寂所以無二無別煩惱與菩提都空無自性能通達煩惱的自性不可得就是菩提如取著菩提相就是煩惱所以說煩惱即菩提能如是知是名中道諸法實觀行及非行非行是非造作性如思是行受想等非行善惡法是行無記法非行有漏法是行無漏法非行識及所識所識是所知識的是認識的對象識不能離所識而存在名色可見及不可見名是受想行識色是色大概來說名是不可見的色是可見的審細的分別起來色中的色是可見的聲香味觸眼耳鼻舌身也是不可見的或者說五根為天眼所見諸六入處及六神通眾生的六入六根為生識的所依處眼但能見色耳但能聞聲限礙不通聖者到六根自在互用即成六神通如約一般的六通說天眼通與眼天耳通與耳有關神境通與身有關他心宿命漏盡通與意有關觸及所觸觸是根境識三和有觸就有所觸的受與受滅到老死與老死滅正約流轉還滅的相待說這一切都是相待的由於本性空寂所以是皆無二無別能如是知是名中道諸法實觀戊二抉擇深義己一顯了空義庚一法空復次迦葉真實觀者不以空故令諸法空但法性自空不以無相故令法無相但法自無相不以無願故令法無願但法自無願不以無起無生無取無性故令法無起無取無性但法自無起無取無性如是觀者是名實觀上來雖已經開示中觀但空義是甚深的還得再加抉擇顯了以免學者的誤會這又分三節先顯了空義顯了是以語言文字使空義更為明了這又分法空我空來說說到這裡先應略說空的差別佛說空都是修行法門但略有三類不同一分破空以分析的觀法來通達空經中名為散空天台稱之為析空如色法分分的分析起來分析到分無可分時名鄰虛塵即到了空的邊緣再進就有空相現前但這是假觀而不是實觀因為這樣的分析即使分析到千萬億分之一也還是有還是色二觀空如瑜伽師的觀心自在觀青即青相現前觀空即空相現前因為隨心所轉可知是空的但還不徹底因以觀空的方法來觀空觀心是怎麼也不能空的事實上他們也決不許心也是空的這二種法門佛確也曾說過也可以祛息許多煩惱顛倒但不能究竟究竟的是第三自性空不是分破了才空也不是隨心轉而空空是一切法的本性如此如阿含經也說諸行空常空我我所空性自爾故所以佛說法性空不是以觀的力量來消滅什麼而只是因觀而通達一切法的本來面目如古人杯弓蛇影的故事一樣以為吞了蛇所以憂疑成病現在使他自覺到根本沒有蛇憂疑病苦就好了所以觀空是祛除錯覺達於一切法的本性空這才是大乘究竟空義否則眾生為情見所縛不能徹了真空終於又背空而回到有中去安身立命空是本性空絕一切戲論的畢竟空所以說空就圓滿的顯示了中道但為了適應機宜又說為無相無願古譯為無作合名三解脫門又每說無起無生無滅無取無性等使眾生同歸於一實依大乘了義說空無相無願同緣實相無自性以離見名空離相以息分別名無相離取著以息思願名無願但也不妨約偏勝說依諸法無我即名空依涅槃寂靜即名無相依諸行無常即名無願也可作淺深說空一切而有空相現其實畢竟空是空也不可得的所以說無相雖達境無相而心還有所著所以又說無願但這都是方便善巧三解脫門是平等一如的起是現起生是生起與起相近但起可能是錯亂而生是因緣生本譯在無生下還有無我二字參照別譯這應該是衍文所以刪去了無取是無所取著無性是沒有自性如總相的說從無相到無性都是空的異名現在依文來解說佛說迦葉真實觀中道正觀是這樣的並不以空三昧的觀力令諸法的有性成空但是法性自空本性是空的以觀照去觀察只是覺了他的本來如此而已這是本性空自空不是他空這才是中道的真實正觀依此可見空觀真實觀中道觀是一樣的同樣的並不以無相三昧力所以諸法無相但法自無相也不以無願的觀力所以諸法無願但法自無願這樣佛說的無起無生無取無性都是這樣的本來如此能如是觀本性空是名實觀而不是分破空觀空等他空的觀門庚二人空復次迦葉非無人故名曰為空但空自空前際空後際空中際亦空當依於空莫依於人人空就是我空我空的意義與上說的法空一樣佛又說迦葉非無人故名曰為空但空自空這是說並非以無我觀力除滅了人才叫空而只是我性本來不可得為了說明這人我性本來不可得所以接著說前際空後際空中際亦空際是邊際前際是過去一直到過去過去後際是未來一直到未來未來在過未中間叫中際就是現在人我是死生流轉的從過去世到現在又從現生到未來世的如人我是實有的那一定在這三際中但真實的觀察起來過去我不可得現在我不可得未來我也不可得於三世中求我不可得可見空性是本來無我了多數聲聞及一分大乘學者以為我空與法空不同所以雖通達我空卻可以不知道法空甚至否認法空的但一分聲聞及大乘中觀者完全不同意這種誤解我空及法空只是正觀所依的對象不同而照見的性空並無差別如稻草火與煤炭火約火所依的草及炭說火力的強弱說雖有不同而約火熱性燒用說怎能說有不同依此聲聞法多說無我大乘法多說空是習用的名詞多少不同而非性空有什麼不同據這樣的正見來說如聲聞者證得我空他可以不再觀法空但決不會執法實有因為如作真實觀時他怎樣了解無我就會同樣的了解法空反之如執法實有不信法空那他決沒有真正通達無我而是增上慢人自以為證果而已所以大般若經明說須陀洹初果及阿羅漢一定會信解法空的金剛經更顯然說若取法相即著我人眾生壽者若取非法相即著我人眾生壽者本經依本性空明法空也依本性空來明人空這可見中觀者的正見是充分了解大乘正觀的真義末了佛又說當依於空莫依於人這兩句似乎很突然但實在非常重要這裡的空是空性空相真如等佛所開示的正觀要依此空性而修證切莫依人而信解修證原來印度的婆羅門教以為要得解脫非有真我的智慧不可能通達真我才能得解脫釋迦佛的特法就是全盤否定了這種形而上的真我論始終說無常故苦苦故無我無我故無我所則得涅槃換言之非徹底照破了真常我才能解脫所以在佛弟子的現證時每說知法入法但見於法不見於我法是正法妙法即法性涅槃在覺證中但是體見正法根本沒有我可見可得一般學佛者不知外道的我是怎樣的就自以為所修所證與外道的我不同其實佛與外道的修證外道也有修行宗教經驗也自以為證悟得解脫的不同在說明上是很希微的如說體見到真的常的清淨的安樂的不生不滅的無二無別的不可思議的這些句義都難於顯出外道與佛法的不同但這樣的經驗外道一定說這是真我或者說是神這是說這是有意志性的所以把自己的宗教經驗描寫為生命主體絕對主觀或者神化為宇宙的真宰耶和華梵天等但佛弟子的體驗與外道不同是但見於法不見於人的所以在世俗的安立說明中雖說如智不二而但說為一切法性不生不滅而沒有給與意志的特性當然也不稱為真我不想像為創造神了本經在說明我性本空時特別說到當依於空莫依於人真是切要之極不過眾生從無始以來我見熏心所以也不免有佛弟子還在體見真我自以為究竟呢己二遣除情計庚一取圓成實相若以得空便依於空是於佛法則為退墮如是迦葉寧起我見積若須彌非以空見起增上慢所以者何一切諸見以空得脫若起空見則不可除於中道正觀的修學如不能善巧或執空或著有都是不契中道的所以佛舉譬喻來說約三性以遣情執先說取圓成實相圓成實相就是法空真如法性等古來有二空即真二空所顯二宗佛在經中或稱為空或稱為空性空相所以在安立言說邊這都是可以的空以離情執為用但如專以遮破為空那是不對的因為空也意味那因遮而顯的但空所顯性是絕無戲論的超越相待安立的能稱之為什麼呢雖不妨離執寄詮稱之為有但到底是順於世俗的寄詮離執稱之為空不更順於勝義嗎所以二空即真及二空所顯的不同說明可依解深密經來解說為五事具足的人佛直說無自性空不生不滅策發觀行以趣入自證空是順於勝義的但為五事不具足的人使他引生空解不致於畏空及偏執空所以順俗而說空所顯性不問是二空即真空所顯性如於圓成實空或空性而有所取著那過失是非常大的所以佛承上我法自性空而說若以得空便依於空是於佛法則為退墮得空是有空可得可證依空是依著於空這與上文但依於空的依義不同這是說行者在無分別觀中生滅相息而空相現如以此為證得圓成實相那就錯了還有修無分別定的直下離一切念有空相現那時如虛空明淨湛然皎潔自覺得空靈明顯安樂就於中取著這對於佛法不但障礙了進修而且還要退失因為這樣的觀或定境如取著久了勤勇心就漸漸失去兀兀騰騰了此一生有的善惡不分還自以為佛魔一如呢執著空相的過失太大了所以佛開示迦葉說寧可生起我見積聚得若須彌山那樣也決非以空見起增上慢沒有得沒有證自以為得了證了叫增上慢取著空相是空見而誤取空見為證得圓成實空那是何等的錯誤這樣的比較得失並非過甚其辭因為有了我見雖不能解脫但不妨廣修人天善業而執空是不再勇於為善終歸於退失而且我見無論怎麼大還可以空來化導破除引入空的自證空見卻不行了因為一切諸見以空得解脫也就是以空觀而離一切見如錯會佛法而顛倒的生起空見則不可除了已經著空當然不能再以空來化導解除也不能以有來解除空見有只是更增長情執而已所以龍樹中論據此而說大聖說空法為離諸見故若復見有空諸佛所不化青目釋比喻為水能滅火如水中又起火就無法可滅了中觀與瑜伽論師對於空相現前都不許為可取可得的二乘聖者證空那是無漏般若現證無分別法性更不能說取著所以有空可得依著於空的那是修觀或修定而沒有方便的增上慢人迦葉譬如醫師授藥令病擾動是藥在內而不出者於意云何如是病人寧得差不不也世尊是藥不出其病轉增如是迦葉一切諸見唯空能滅若起空見則不可除如來又舉譬喻來說明著空的過失迦葉譬如醫師授藥給病人服下由於藥力令病擾動受藥力影響減殺病勢而逐漸好轉假使不斷服下的那些藥一直在內而不排洩出來迦葉你以為是病人的病可能會全愈嗎差與瘥同是病好了的意思迦葉對佛說不會的是藥不出來其病不但不會好反而要轉增的這就叫舊病未愈藥反成病了說到這裡佛才合譬喻說如是迦葉一切諸見唯空能滅如一切病唯有服藥才能治愈一樣若起空見則不可除如藥留在體內不出來起副作用反而增病一樣那才無藥可治了庚二怖依他性空譬如有人怖畏虛空悲嘷椎胸作如是言我捨虛空於意云何是虛空者可捨離不不也世尊如是迦葉若畏空法我說是人狂亂失心所以者何常行空中而畏於空依他起相就是因緣所生法唯識學者以唯識為宗所以說依他起是心心所法因緣所生法我說畢竟空是華首經所說而表達了般若經等大乘經的要義這裡應該分別一如說緣起法空而徹底否定了緣起法以為如龜毛兔角那樣那是方廣道人空假名論者的妄執二如說緣起的法性空而緣起法相不空那是假名不空論者前是太過派這是不及派空的究竟了義是緣起法唯是假名所以是畢竟空但畢竟空不礙緣起如幻才是空有無礙的中道然而從小乘到一分大乘近於不空論者都是聞畢竟空如刀傷心難以忍受的因為照這些實有論者的見地假必依實怎麼能說一切都是假名畢竟空呢如一切唯假也就一切皆空那一切都沒有他們是以空為沒有的了假名也不可能呀既不能說一切唯假名當然假名安立的沒有自性可以說空而自相安立的有不可以說空了所以他們怖畏真空違逆真空或者修正真空說一切法空是不了義的其實某些是空的某些是不空的在一切唯假名一切畢竟空中他們就感到沒有著落不能成立生死涅槃一切法所以非要在空的以外求到一些不空的才能成立生死與涅槃才能發心修行而向佛道眾生一向為自性見所蒙昧也就一向是愛有惡空佛對於這些五事不具足的有時也不得不方便假說隱空說有以化導他們呢像這種怖畏因緣生法畢竟性空而想在空外別求不空的行人佛在究竟了義的立場以譬喻來呵斥他們說譬如有人怖畏虛空大聲悲嘷與號同以手自己椎胸作如是言我要捨虛空而到沒有虛空的所在佛問迦葉你覺得怎樣是虛空者可捨離嗎迦葉說不可能的虛空遍一切處是物質存在的特性那裡有物質那裡就有虛空怎麼能離卻虛空而到沒有虛空的所在呢佛這才以法合譬說如是迦葉那些聽說一切法畢竟空怖畏空法一定要在不空中安立一切法的不就像這想逃避虛空的愚人嗎我說是人不能信忍一切法畢竟空而要安立不空的人是狂亂失心的神經病者是為無始以來自性見所蒙昧而沒有正知見的人為什麼這樣說呢一切法畢竟空是一切法的本性如此眾生無始以來起惑也好造業也好受報也好就是發心也好修行也好什麼都從來就是畢竟空的一向常行空中幻生幻滅而不自知反而畏於空要求得不空法這不是顛倒失心嗎庚三著遍計執有譬如畫師自手畫作夜叉鬼像見已怖畏迷悶躄地一切凡夫亦復如是自造色聲香味觸故往來生死受諸苦惱而不自覺為了顯示眾生的遍計妄執所以又說畫鬼喻譬如畫師自手畫作夜叉鬼像夜叉是捷疾有力的大力鬼相貌非常兇惡但是自己畫的無論怎麼樣也不應該怕他可是眾生是愚癡的由於畫得太像了活像是真的一樣自己見了也不免動心越看越怕竟然怖畏起來嚇得昏迷過去迷悶躄倒在地這真太可憐了一切凡夫亦復如是可憐自己起惑造業招感到這一期身心以及外在的種種塵境這都是自造的色聲香味觸等從業所感的如幻緣起法本性空寂但由於過去的妄執熏習生起時有自性相現所以一分學者說是自相安立就是錯亂的戲論相內而根身外而塵境也真活像是實有的在眾生的認識中自然的直覺為實有的不空的因此更起妄執執為實有愈執愈迷一直造業受報下去唉生死本來性空而眾生卻往來生死生死不了色聲等本來性空而眾生為境相所縛於是今生後世不斷的受諸苦惱在如幻畢竟空中苦苦不已生生不已而不自覺為性空從空得解脫這豈不像那畫鬼的畫師嗎己三善巧智斷庚一智辛一觀俱境空譬如幻師作幻人已還自殘食行道比丘亦復如是有所觀法皆空皆寂無有堅固是觀亦空在宣說顯了空性遮遣情計以後如來又接著說善巧智斷一科因為遣執顯空是非智慧不辦的有了智慧就一定能斷除惑業但眾生的智淺福薄對於智與斷也不能善巧易於顛倒執著違害了佛的深義所以也非明確的抉擇不可先說智現證的如實智從觀慧生也就是從觀照般若而起現證的實相般若一般不明空義的凡愚對這問題起二大妄執第一有的以為所觀境是空的觀心是不空的他們說觀一切法空一切法是空的但總不能說觀心也是空呀如觀慧也是空的那就沒有觀慧也就不能觀了這樣他們成立心有境空論這如西哲笛卡兒一樣起初懷疑一切而最後覺得能懷疑的我到底是不容懷疑的如我也是可懷疑的那就不能懷疑一切了這樣他又從我思故我在的實在上建立他的哲學這樣的理解盡是世間的思想路數與佛出世解脫的深義不合為了破斥這境空心不空的妄執所以舉喻說譬如幻師以咒術等變化作幻化的人獅虎等這些雖都是幻化的性空無實的但彼此卻還自殘害噉食以幻害幻以幻食幻而歸於不可得這樣行道比丘亦復如是比丘如幻師所起的觀境觀心如幻化的人虎等一樣這能觀所觀一切都是如幻性空的所以說凡有所觀法皆是性空寂滅都是無有堅固能觀亦空雖一切如幻性空而所觀能觀一切成立所以以即空的觀慧觀即空的觀境境空寂觀也空寂怎麼倒執境空而觀心不空呢這一執著的主要根源還是以為空是沒有沒有怎麼能觀呢不解空義妄執就由此而起了辛二智起觀息迦葉譬如兩木相磨便有火生還燒是木如是迦葉真實觀故生聖智慧聖智生已還燒實觀第二有的以為無漏聖智現證般若是如如智是無分別智所以虛妄分別妄識為性的分別觀是怎麼也不能引發聖智的不但不能反而是障礙了因為這是妄上加妄分別中增分別如以水洗水以火滅火一樣永不可能達成離妄離分別的自證這所以主張直體真心當下都無分別以無念離念為方便這對於如來的無邊善巧方便可說是完全失壞了佛於止外說觀定外說慧經聞思而起修慧觀才能趨入真證怎麼說分別觀無用呢這裡佛就說一譬喻來除滅這些妄執佛呼迦葉說譬如兩木相磨不要以為一木加一木木更多了如以兩木相磨為方便久久生暖接著便有火生等到火生起時反還燒是木而木都被燒去了這如由於真實觀的觀一切法空故生聖智慧等聖智生起了不但境相寂滅反還燒了這能觀的真實觀這就達到了境空心寂如如無分別智現前這裡的真實觀是什麼呢是分別觀慧論體性是有漏的虛妄的那怎麼說是真實呢要知分別的觀慧有二一世俗觀慧如觀青瘀膿爛等佛土的依正嚴淨等這都以有分別影像相為境二勝義觀也就是真實觀觀一切法無自性空不生不滅等這雖是分別的而能觀一切分別自性不可得是以無分別影像相為境的這樣的分別觀是順於勝義的是分別而能破分別的經論中說有以聲止聲如說大家不要講話以楔出楔等譬喻來顯示無分別觀的勝用等到引發無漏聖智這樣分別為性的無分別觀也就不起了以分別觀息分別執是大善巧妙方便這樣的真實觀有觀的妙用而沒有取著在悟入真實性時是不能沒有這樣的真實觀中道觀的庚二斷辛一破無智譬如然燈一切黑闇皆自無有無所從來去無所至非東方來去亦不至南西北方四維上下不從彼來去亦不至而此燈明無有是念我能滅闇但因燈明法自無闇明闇俱空無作無取如是迦葉實智慧生無智便滅智與無智二相俱空無作無取智慧能觀法性空而證實性又能斷除惑業惑是煩惱的別名以無明為總相什麼叫無明總相的說是不知緣起性空的中道別相的說是不知苦不知集不知滅不知道不知性不知相不知體用因果等所以無明又叫無智而能破無明的般若也可以稱為明了智生惑滅是一定的但如取著實性以為實有般若可生實有無明可破那就是無智煩惱了所以佛又舉喻來顯示譬如然就是燃燒的燃字燈燈真的點亮了那一切黑闇皆自然的無有了光明從那裡來的黑闇又向那裡去了如以明闇為實有自性的那光明應有一確定的來處然而光明是無所從來的黑闇應確定到那裡去而黑闇又是去無所至的一般以為明闇是物質性那物質應佔有空間如有空間性那光明不是應從十方的那一方來黑闇應向十方的那一方去嗎佛以簡要的句法來說光明非東方來黑闇的去亦不至南西北方四維東南西南東北西北叫四維上下這可見燈明不從彼來黑闇的去亦不至什麼地方了明生闇滅不是這樣的不來不去嗎不僅沒有來去的處所光明也沒有破闇的實用所以說燈明無有是念我能滅闇燈明的不作此想即表示燈明沒有破闇的實用如以為有實性實用那試問燈明是及接觸到闇而破闇呢不及闇而破闇呢如明闇不相及明在明處闇在闇處那明怎能破闇如明不及闇而能破闇那一室的燈明應盡破十方的黑闇了如說明闇相及那不是明中有闇闇中有明嗎明既破闇闇也應障明了這可見明闇如幻如中論的觀燃可燃品廣說所以說不是燈明實能破闇而只因燈明法爾如此燈明現起自然無闇明闇俱空如幻如化的沒有自性的破闇作用所以說無作沒有一毫的自性可取著所以說無取智慧如燈明無明如黑闇根據上說的明闇也可以比知般若破無明的意義了佛這才告訴迦葉這樣實智慧生無智便滅這不但不生不滅不來不去而般若也沒有破惑的自性實用這只是智與無智二相俱空無作無取法爾如是的智生惑滅而已辛二滅結業迦葉譬如千歲冥室未曾見明若然燈時於意云何闇寧有念我久住此不欲去耶不也世尊若然燈時是闇無力而不欲去必當磨滅如是迦葉百千萬劫久習結業以一實觀即皆消滅其燈明者聖智慧是其黑闇者諸結業是結業可作二說一結是煩惱如三結五結等能繫人於生死而不得解脫所以名為結業是身口意的動作由表業而起無表業為招感種種苦樂異熟的因緣上說無智約煩惱的通相說這裡的結業約種種煩惱與業說二結業是繫屬三界的業如欲界繫業色界繫業無色界繫業這樣上文約煩惱說這裡約業說智慧生而結業滅與智生而無智滅一樣所以如來還是舉燈明破闇作比喻所不同的上約空間說十方今約時間說而已佛說迦葉譬如千歲來烏黑的冥室從來未曾見過光明這黑闇簡直可說是冥室中的主人了若然燈時光明要來了你的意思如何冥室的黑闇可能有這樣的意念我久住此間這是我的老家我不欲去嗎迦葉聽了說不會的世尊若然燈時是闇無力想繼續住下而不欲去的因為光明一來這黑闇是自然的消失必當磨滅佛說如是迦葉同樣的眾生無始以來百千萬劫久習而成的無邊結業雖這麼久了但以一實觀的照明結業也就即皆消滅如黑闇一樣所以結論說上面說的燈明就是聖智慧而黑闇也就是一切結業了丁二讚菩薩殊勝戊一生長佛法勝己一不斷結使迦葉譬如種在空中而能生長從本已來無有是處菩薩取證亦復如是增長佛法終無是處迦葉譬如種在良田則能生長如是迦葉菩薩亦爾有諸結使雜世間法能長佛法在修廣大正行時曾以十九種譬喻顯示菩薩的功德現在這習甚深中觀段也以十二種譬喻讚歎菩薩的殊勝十二譬喻分八種殊勝第一是生長佛法勝為什麼菩薩能生長佛功德法因為他不斷結使不離生死不斷結使不離生死而能生長佛法聽來希奇其實正因為不斷結使不離生死才能生長佛法呢先說不斷結使如觀彌勒菩薩上生經說此阿逸多具凡夫身未斷諸漏不修禪定不斷煩惱佛記此人成佛無疑可見不斷結使為菩薩道的特勝佛舉喻說迦葉譬如穀麥種在空中而能生長苗葉開花結實那是從本際無始已來無有是處絕無可能的這樣在修行菩薩道時如菩薩取證空性斷除煩惱以為到達了究竟參學事畢那就如種在空中一樣雖畢竟清淨而要他增長佛法圓成佛道也是終無是處的了這因為取證空性煩惱就斷了生死要在煩惱水滋潤業種的情況下才會生起如煩惱斷了生死就不能再起菩薩也就不能長在生死中廣度眾生了這就等於小乘退墮小乘怎會增長佛法而向佛果呢接著佛又反過來告訴迦葉譬如種在肥沃的良田雖不大清淨卻能生長苗葉開花結實這樣迦葉真正的菩薩也是如此在修行道中如悲心還沒有深切願力還沒有宏大般若還沒有五度來扶助那就不求取證盡量降伏粗重煩惱削弱煩惱的勢力而仍保有諸結使結是三結等使是七使或譯隨眠以隨逐行人增長煩惱得名菩薩沒有斷除這些煩惱所以在所修的聖道戒定慧中雜有煩惱等世間法也就因此在生死中度眾生能長佛法了己二不離生死迦葉譬如高原陸地不生蓮花菩薩亦復如是於無為中不生佛法迦葉譬如卑濕淤泥中乃生蓮花菩薩亦爾生死淤泥邪定眾生能生佛法生死指生了又死死了又生起的意思本來不斷煩惱與不離生死是不相離的一約雜染因說一約雜染果說如來慈悲心深再舉喻來說明譬如高原陸地非常乾燥潔淨卻不生蓮花菩薩也如是如取證空性於無為中無差別真如性中以為所作已辦更沒有事了由於清淨寂滅也就不生佛的功德法反之迦葉譬如卑濕淤泥中雖是污穢的卻能生蓮花菩薩也如是不證空性不斷煩惱不離生死與邪惡苦惱的生死眾生在一起也就能救度生死淤泥中的邪定眾生這樣的悲願深廣才能生佛法眾生有三類成就八正道一定趣入出世解脫的叫正定聚如成就八邪道一定要墮入三惡道的叫邪定聚成就人天善法的中等眾生叫不定聚也就是上智下愚與中人的分類這裡說邪定眾生意思說菩薩對罪惡的苦惱眾生特別關切而已其實不定眾生也是菩薩救度的對象又蓮花喻一般只重視他的出淤泥而不染而不知蓮花是不能離開淤泥的戊二福智廣大勝己一功德大迦葉譬如有四大海滿中生酥菩薩有為善根甚多無量亦復如是迦葉譬如若破一毛以為百分以一分毛取海一渧一切聲聞有為善根亦復如是第二是福智廣大勝菩薩一定修集福德與智德二資糧都是廣大無邊非聲聞乘可比先說福德佛說迦葉譬如有四大海充滿了海中的都是生酥生酥是從牛乳取出來的沒有熬熟熬熟就成為熟酥再不能與水交融了四大海充滿了生酥真是多極了現在拿來比喻菩薩有為善根也是這樣的甚多無量生滅有作的名有為菩薩沒有與法性相應以前所有的一切福德善根施戒定等都還是有為的菩薩的有為善根那麼多而聲聞呢佛告迦葉譬如若破一毛以為百分以一分毛沾取海水的一渧那簡直微不足道而一切聲聞人的有為善根恰好如毛分的一渧真是難以為喻己二智慧大迦葉譬如小芥子孔所有虛空一切聲聞有為智慧亦復如是迦葉譬如十方虛空無量無邊菩薩有為智慧甚多為力無量亦復如是再說聲聞的智德也還不及菩薩的智德佛又舉譬喻說譬如小芥子孔所有虛空芥子已夠小了芥子孔不更微小嗎一切聲聞隨信行隨法行慧解脫俱解脫或賢或聖他們所有解悟無我我所空的有為智慧也是這樣的微小譬如十方虛空是那樣的無量無邊菩薩有為智慧勝解一切法性空的智慧也是這樣的甚多功力無量能為佛道的眼目導一切功德而向於佛果也如是的不可思量大小乘的勝義慧都是觀空的所以舉虛空為譬喻芥子孔的空與太虛空雖然本質是平等的而量是相差得太遠了這所以小乘偏重人無我的空慧僅能自了而菩薩特重一切法空這空無我的勝慧能為上趣佛道下化眾生的善巧方便這一比喻龍樹的大智度論也曾引述到以明大小乘空義的差別戊三種姓尊貴勝己一真實佛子迦葉譬如剎利大王有大夫人與貧賤通懷妊生子於意云何是王子不不也世尊如是迦葉我聲聞眾亦復如是雖為同證以法性生不名如來真實佛子迦葉譬如剎利大王與使人通懷妊生子雖出下姓得名王子初發心菩薩亦復如是雖未具足福德智慧往來生死隨其力勢利益眾生是名如來真實佛子第三是種姓尊貴勝在古代重視種姓的貴賤尊貴的王族中如確係先王的血統而能繼承王家的大業那是特受尊敬的這裡就以此為比喻顯示菩薩的殊勝遠非聲聞賢聖可及先明菩薩為真實的佛子如來舉喻說迦葉譬如印度四種姓中主持國政的剎利大王有大夫人王后他雖是大王的元后卻與貧賤階級的臣僕私通因而懷妊生子迦葉你的意思如何這算是王子嗎迦葉說這不是大王的血統雖或者也叫他王子而實不能說是真正王子的世尊我以為這樣佛即印可他說如是迦葉要知道在佛法中我所教化的聲聞眾亦復如是雖然聲聞也稱為同證法性同得解脫也說以法性生他們每自己宣說從佛口生從法化生自認為佛子但他們不名如來真實佛子為什麼呢佛心者大慈悲是他們沒有廣大甚深的悲願多少繼承了外道的獨善與苦行沒有能契合佛的真精神正像王大夫人與貧賤私通而生的王子一樣接著佛又對迦葉說譬如剎利大王與使女交通使女也懷妊生子母親雖出下賤的種姓而生下的孩子卻得名王子享受王家的尊貴為什麼呢因為這確是大王血統的緣故這樣初發心菩薩亦復如是雖是薄地凡夫因自力或他力受人教化發起了自利利他上求下化的大菩提心菩提心在凡夫心中成就如王子從貧賤的使女而生一樣當凡夫初發心初名菩薩時雖未具足福德智慧看起來苦惱非常還是往來生死當中頭出頭沒但他確是菩薩隨其菩提心成就的力勢已能在生死中利益眾生他有了大慈悲為本的菩提種姓所以是名如來真實佛子在聲聞法中聲聞四果名為佛子因為從佛聞法而已同證法性了大小兼暢的大乘中說聲聞與菩薩都是佛子但約大乘不共的意義來說聲聞算不得佛子而菩薩即使是無福無慧生死流轉卻已是真實的佛子了己二紹隆佛種迦葉譬如轉輪聖王而有千子未有一人有聖王相聖王於中不生子想如來亦爾雖有百千萬億聲聞眷屬圍繞而無菩薩如來於中不生子想迦葉譬如轉輪聖王有大夫人懷妊七日是子具有轉輪王相諸天尊重過餘諸子具身力者所以者何是胎王子必紹尊位繼聖王種如是迦葉初發心菩薩亦復如是雖未具足諸菩薩根如胎王子諸天神王深心尊重過於八解大阿羅漢所以者何如是菩薩名紹尊位不斷佛種再說紹隆佛種這與上文大致相近但這裡著重在將來能荷擔如來的家業如來舉喻說迦葉譬如剎利大王中統一四洲的轉輪聖王一定有千子具足但如還未有一人有轉輪聖王相時聖王於這麼多的王子中就不生子想什麼是聖王相出胎後有三十二相具足在胎時母后的心意清淨少煩惱身體安和還有天龍等來衛護的瑞相千子雖不能成轉輪聖王但到底是聖王的王子怎麼說不生子想呢要知道子第一是自己的血統第二是能繼承自己的家業千子們都沒有輪王相將來不會繼承王的尊位統理國政那就會覺到還不是太子這一比喻如來合法說如來是輪王一樣自成佛教化以來雖有百千萬億聲聞賢聖為如來的眷屬如來說法時聲聞眾是雲屯霧集的圍繞如來莊嚴法會但在這大眾中如無菩薩如來也就於聲聞眾中不生子想因為這都不是當來下生繼承佛位的佛子相反的譬如轉輪聖王有大夫人忽然懷妊了雖還只是七日但是子具有轉輪王相當時臣民們雖還不知道而諸天天龍八部都尊重胎中的王子而來護衛他超過了其餘諸子年長而具身力的人天龍等為什麼如此因為是胎中的王子將來生下來必定紹承輪王的尊位繼續聖王的種胤主持國政利益民眾遠過其他王子的功德如來再合喻說迦葉初發心菩薩亦復如是雖未具足諸菩薩根沒有顯而可見的菩薩德相不是一般人所能認識如胎中的王子也還只是精血凝和沒有眼耳等根相但諸天神王天龍八部們卻深心尊重初發心菩薩勝過於八解脫的大阿羅漢在聲聞乘中最高的聖果是阿羅漢位阿羅漢是梵語意思是斷盡了煩惱生死已盡應受人天的供養約斷煩惱證法性了生死說阿羅漢是一樣的但約定力通力悲心世俗智來說淺深也大有差別其中俱解脫阿羅漢能得八解脫一內有色想外觀色解脫二內無色想外觀色解脫三淨身作證具足住解脫四空無邊處解脫五識無邊處解脫六無所有處解脫七非想非非想處解脫八滅受想定解脫這是定力極深具足三明六通的大阿羅漢說菩薩的功德比聲聞的自利功德大還容易信解現在說菩薩最初發心什麼功德還沒有就比得八解脫的大阿羅漢還高就難免有人懷疑了所以佛又說明理由如是菩薩雖還沒有成就菩薩根但已名為能繼紹如來的尊位者能使未來不斷佛種有了菩薩就有佛佛相承廣大無盡的普利眾生這那裡是八解羅漢可及呢戊四初心希有勝己一勝出聲聞迦葉譬如一琉璃珠勝於水精如須彌山菩薩亦爾從初發心便勝聲聞辟支佛眾第四是初心希有勝上說菩薩的種姓尊貴已說到初發心菩薩的尊貴現在如來承上意而更為譬說迦葉譬如一顆小小的蔚藍色的琉璃珠價值與妙用都勝於水精一般的水晶那怕水晶大得如須彌山那樣菩薩也如此從初發心以來即使位居凡夫便勝於聲聞辟支佛眾聲聞一向是大眾共住的辟支佛譯義為獨覺其實除麟角喻辟支一人出世而外其餘也都是眾多共住的上文說初發心菩薩勝過八解脫的大阿羅漢現在進一步說不要說得八解脫的就是無數的二乘無學眾也不及一位初心菩薩呢己二人天禮敬迦葉譬如大王夫人生子之日小王群臣皆來拜謁菩薩亦爾初發心時諸天世人皆當禮敬初發心菩薩不但勝過二乘而且也為人天所尊敬如來舉喻說迦葉譬如剎利大王夫人當他誕生王子的日子所屬的小王及群臣都要來拜謁為他是王子而慶賀這樣菩薩也如此初發心時諸天與世人皆當禮拜恭敬因為他是菩薩是佛的種姓是未來佛凡夫沒有慧眼或者會輕視初心菩薩所以佛特地說應尊敬戊五普利眾生勝迦葉譬如雪山王中生諸藥草無有所屬無所分別隨病所服皆能療治菩薩亦爾所集智藥無所分別普為眾生平等救護第五是普利眾生勝佛舉比喻說迦葉譬如雪山王喜馬拉耶山區近印度西北區的大山終年積雪極高極大所以叫雪山王在這大雪山中生諸藥草這一地區古代是不屬於任何國家也不屬於任何人的所以雪山的一切藥草也都無有所屬因為不是屬於誰的所以不問是什麼人無所分別只要是隨病所宜對症的話就能隨所服的藥而皆能療治菩薩也如此修行所集的以智為主的一切法門如雪山的各種藥草一樣所以叫智藥對人的貴賤貧富智愚都無所分別一視同仁而能普為一切眾生作平等救護解脫眾生的苦惱戊六出生如來勝迦葉譬如月初生時眾人愛敬踰於滿月如是迦葉信我語者愛敬菩薩過於如來所以者何由諸菩薩生如來故第六出生如來勝人天應尊敬菩薩而且要敬重到極點對於這如來又舉喻說迦葉譬如月初生時印度的民俗就舉行非常隆重的新月祭所以說眾人愛敬這新月踰越了十五晚上的滿月我們中國人是喜愛滿月的但在印度除了團圓的滿月外還敬愛新月因為新月是象徵著光明的出生從此一直向大圓滿的光明而前進如來說了這一比喻才合喻說迦葉大家如相信我的語言那麼愛敬菩薩就應該過於對如來的尊敬為什麼呢因為如來如滿月初發心菩薩如新月大乘經中有以月光漸增到圓滿的比喻說明菩薩的從初發菩提心到無上菩提的圓成成佛從愛敬新月的意義就可知特別愛敬菩薩的意義由於從諸菩薩能出生如來呀沒有菩薩就沒有佛佛是從菩薩生的這就顯出菩薩的重要應受世人最高的崇敬了戊七眾生福田勝迦葉譬如愚人捨月禮事星宿智者不爾終不捨離菩薩行者禮敬聲聞第七眾生福田勝菩薩這樣的可崇敬那自然應尊敬菩薩菩薩才是我們的殊勝福田如來又舉喻說迦葉譬如愚人捨棄了圓滿光明的月亮反而去禮拜事奉那些星宿如北斗星二十八宿等這是怎樣的顛倒如以菩薩為月亮那星宿就如聲聞眾了這樣有智者不會那樣的顛倒終不捨離菩薩行者真實福田反而去禮敬那小乘的聲聞行人戊八聲聞依止勝迦葉譬如諸天及人一切世間善治偽珠不能令成琉璃寶珠求聲聞人亦復如是一切持戒成就禪定終不能得坐於道場成無上道迦葉譬如治琉璃珠能出百千無量珍寶如是教化成就菩薩能出百千無量聲聞辟支佛寶第八聲聞依止勝這末後一喻從不應禮敬聲聞而來原來聲聞還是從菩薩出生的呢菩薩為聲聞根本大乘法為小乘法根本拿這點來結讚菩薩的殊勝如來舉治珠的譬喻珠不僅是生成的也還要經人力的修治古法治珠要經磨押穿三個過程才能顯出珠所具的光澤現在佛對迦葉說迦葉譬如諸天或者是人一切世間善於治珠的治珠師假使所治的是偽珠那無論怎樣的修治也不能令成無價的琉璃寶珠這是偽珠的品質限定了的這樣求聲聞人亦復如是他發的是出離心沒有悲願但求自苦的解脫這也決定了他無論聲聞人所有一切持戒功德成就甚深的禪定功德熏修得怎麼好也終不能得坐於道道是菩提的舊譯場而成無上道總之聲聞人無論如何修持也不能成佛再舉喻來說菩薩迦葉譬如治珠師所治的是一顆毘琉璃珠經過一番琢磨修治就能顯出琉璃珠的妙用據說從琉璃珠能引出百千無量數的各種珍寶拿這來比喻那就是教化發菩提心起大悲願修集廣大福智資糧等到成就真實菩薩那就從菩薩的教化中能出生百千無量數的聲聞辟支佛寶二乘聖果雖不及菩薩但也是世所希有的珍寶故比喻為各種寶物從菩薩的不斷結使到這出生二乘為二乘所依止種種比喻讚歎顯出菩薩道的善巧崇高丙三作教化事業丁一畢竟智藥治戊一總說爾時世尊復告大迦葉菩薩常應求利眾生又正修習一切所有福德善根等心施與一切眾生所得智藥遍到十方療治眾生皆令畢竟云何名為畢竟智藥正明菩薩道中已說了修廣大正行習甚深中觀現在要說起方便大用作教化事業前二是自利這裡要說利他菩薩雖以利他為重而實是自利利他相成的如修廣大正行都是與眾生有利益的而現在要說的方便教化又都是從自己的修集得來怎樣自利就怎樣利他所以菩薩是在利他為先的原則下去從事自利利他上求下化的工作在菩薩的方便化導中分畢竟智藥與出世智藥二科菩薩能治眾生的生死苦惱病主要是智慧所以叫智藥菩薩以般若智慧而修集的一切法藥是能根治眾生生死重病的所以叫畢竟智藥畢竟就是究竟徹底的意思這些智藥雖能達到菩提涅槃但或是遠方便或是近方便或是助成的或是主要的那切近而主要的智藥名為出世智藥菩薩修集得來的佛法不外這二類說明畢竟智藥先總說這是另起一大段所以經上說爾時世尊又告大迦葉說修廣大正行與甚深中觀的菩薩是出發於大菩提心的利他心重所以常應尋求方便怎樣去利眾生要利益眾生就知道要切實修學約修集福德說又正修習一切所有的福德善根不是為自己而願以平等心普遍的回向施與一切眾生同得解脫同成佛道約修習智德說凡菩薩修習所得智藥也願與眾生共有所以遍到十方世界去療治眾生的身心重病不但去療治而且皆令畢竟全愈這正如金剛經所說我皆令入無餘涅槃而滅度之那麼那些藥名為畢竟智藥呢戊二別說己一諸對治行謂不淨觀治於貪婬以慈心觀治於瞋恚以因緣觀治於愚癡以行空觀治諸妄見以無相觀治諸憶想分別緣念以無願觀治於一切出三界願以四非倒治一切倒以諸有為皆悉無常治無常中計常顛倒以有為苦治諸苦中計樂顛倒以無我治無我中計我顛倒以涅槃寂靜治不淨中計淨顛倒畢竟智藥是些什麼法門呢分對治行與菩提行二類菩提行是近方便是引發證悟的法門對治行是遠方便在初學時先要調治煩惱安定自心才能進一步的趨向出世解脫這在古譯中稱為停心觀奘譯作淨行所緣停心觀舊有不淨慈悲因緣很多經論只說此三法門界數息五門本經以前三為一類以界觀的達無我我所分為三空觀及四正觀二類一不淨觀這是於死屍取青瘀等相然後攝心成觀如經中所說的九想脹想青瘀想壞想血塗想膿爛想噉想散想骨想燒想就是不淨觀如修習不淨觀為對治貪婬的特效法藥貪婬是障道法而凡人都為他惑亂或貪姿色或貪音聲或貪體臭或貪體態如曲線等或貪他的溫柔供事修九想觀成就這一切淫念就都不起了二以慈心觀來對治瞋恚病瞋恚病極其粗重俗說一念瞋心起八萬障門開這是大乘行者所特重的因為瞋心一起對於利益眾生就成為障礙了這應觀一切眾生如父如母如兒如女修習願一切眾生得安樂同情眾生的慈心慈心增長瞋恚也就不起了慈心遍於一切眾生所以素食放生也能培養慈心當來下生的彌勒佛初發心就不食眾生肉特以慈心所以姓彌勒彌勒就是慈來表彰他的特德三以因緣觀來對治愚癡病這裡的愚癡不是別的而是不明善惡不明業果不明流轉生死不明我我所空等愚癡這唯有以如來十二因緣的觀察智藥才能對治他因為空相應緣起即開示業果流轉等道理以上三觀為一類其次是三空觀一以諸行生滅無常無常故苦苦故無我無我所的空觀修習成就悟解得有為諸行沒有實我可得我見為一切妄執根本能降伏我見自然就能治諸妄見這裡的妄見可攝得常無常見邊無邊見一見異見等二無相觀眾生著有就於一切法取相分別妄想無邊最為解脫的重障所以修無相觀觀一切法虛妄不取一切相就能對治顧戀過去的憶想取著現在的分別欣求未來的緣念離一切取相三無願觀無願或譯無作眾生於生死中愛著不捨所以起後有愛喜貪俱行愛彼彼喜樂愛起心思願相應心作業願求生死的相續名為凡夫或者把生死看成怨家三界看做牢獄於是願求出此三界生死名為小乘現在菩薩的無願觀能治三界生死的思願更能對治小乘一切出三界生死的願欲能觀生死本空即沒有生死可出涅槃可求為菩薩的無願觀以上三觀為一類此下四觀名四非倒能對治四顛倒常顛倒樂顛倒我顛倒淨顛倒治四顛倒即治一切倒如分別來解說一無常觀以諸有為皆悉無常的正觀對治於生滅無常中計常住的顛倒二苦觀以有為生滅法無常故苦的正觀對治諸苦中計樂的顛倒什麼叫諸苦在對境而起領受時分苦受樂受捨受三受但深一層觀察老病死等苦受不消說是苦的苦苦樂受如一旦失壞了就會憂苦不了叫壞苦就使是不苦不樂的捨受在諸行流變中到底不能究竟所以叫行苦這些都離不了苦而凡夫著為快樂所以經說如貪刀頭上的蜜一樣三無我觀以諸法無我的正觀對治於本來空無我中計我的顛倒這更是眾生的顛倒根本一切眾生都不自覺的起自我見其實不過為迷於色受想行識而起的妄執所以薩迦耶見有身見俗稱我見是以五蘊為所緣而並沒有自我可得的四涅槃寂靜觀以涅槃寂靜觀對治於不淨中計淨的顛倒淨是清淨不染污淺一些說如把自己的身體看得非常清淨美麗所以去修飾莊嚴他或把世間看得非常美好而迷戀他單是這些淨顛倒佛法常以不淨觀來對治他但深一些的或因自己的修養節制或幻想一聖神的崇高德性唯一真神而想像為怎樣的聖潔這些淨顛倒就不是不淨觀所能對治得了所以本經從大乘法來說內而身心外而世界三界六道神也在其內一切是不淨的所以可因之而起貪戀因之而起煩惱三界的生死雜染法那裡有淨呢特別是自己的色身佛說是畫瓶一樣外面看來美觀加上莊嚴真使人顧影生憐但裡面盡是些臭穢便利怎麼莊嚴修飾也無法掩飾得了但眾生於不淨計淨志求清淨才幻想有聖潔的神等不知唯有不生滅離眾相無煩惱的涅槃才是寂靜的究竟清淨所以觀涅槃能治一切淨顛倒以四正治四倒如執著四非倒還是顛倒所以大乘法說非常非無常等這又是一類這三類十法是對治行都是觀智慧菩薩用這些智藥來對治眾生的煩惱重病己二七菩提行以四念處治諸依倚身受心法行者觀身順身相觀不墮我見順受相觀不墮我見順心相觀不墮我見順法相觀不墮我見是四念處能厭一切身受心法開涅槃門以四正勤能斷已生諸不善法及不起未生諸不善法未生善法悉能令生已生善法能令增長取要言之能斷一切諸不善法成就一切諸善之法以四如意足治身心重壞身一相令得如意自在神通以五根治無信懈怠失念亂心無慧眾生以五力治諸煩惱力以七覺分治諸法中疑悔錯謬以八正道治墮邪道一切眾生再來說切近的法藥七菩提行菩提義譯為覺達成正覺的條件因素名為菩提分或菩提支菩提品總括佛說的菩提分主要的有三十七類名為三十七菩提分這是可以分為七大類四念處四正勤四如意足五根五力七菩提分八正道分這七大類就是現在所要說的七菩提行以下分別來解說一四念處這是被稱為一乘道能滅憂苦的重要法門菩薩就以此來救治眾生四念處是身念處受念處心念處法念處菩薩以身受心法為繫念處心住於此而正觀察所以名身念處或譯念住法念處以念得名而實體是念相應的智慧四念處有二一別相念處觀身不淨觀受是苦觀心無常觀法無我二總相念處觀身為不淨苦無常無我觀法也是不淨苦無常無我本經所說的也是總相念處但歸結於無我因無常苦不淨等正觀最後都是為了引發無我正見這才是四念處法門的宗要眾生對於身受心法總是有所取著起常樂我淨四倒所以佛說四念處對治顛倒不再取著所以說治諸依倚身受心法依倚就是依之而生取著的意思分別來說身念處是修行者觀身自身他身自他的色身隨順身相觀察如觀身是種種不淨三十六物所成等就可以治滅執淨的顛倒如隨順這身的實相空無我性來觀察就不再依著身而起我執就能不墮我見了身體確是最容易引起我執的所以如來說法每每是先說身念處受念處是修行者隨順受苦受樂受捨受的實相來觀察受一切都離不了苦所以觀受是苦能不著受而治樂顛倒如觀受的實相從因緣所起了無自性可得那就不會計著受而不墮我見了心念處是眾生的顛倒莫過於執著心識為常住不變的這雖是婆羅門教以來的老執著也實是眾生的通病所以修行者隨順心相觀心識如流水燈燄剎那生滅無常無常是空初門從生滅無常中得空無我正見就能除常倒而不墮我見了法念處是一切法中除了色身法及心法中的受與識其他如想思等一切心相應行心不相應行有為法還有無為法這些就是法念處觀察的對象修行者隨順法相而起正觀沒有一法是可取可著的也就是沒有一法是可以安立為我的如著法是有這就是執我的所在因而能不墮我見是四念處如能修習觀察都能不起我見就能厭一切身受心法也就是能厭離生死流轉心向涅槃所以說能開涅槃門而有了進入涅槃的可能二四正勤這是四種能斷除懈怠放逸勇於為善的精進所以也名四正斷勤與精進佛法中都是指向上向善的努力來說那四種呢一由於精進能斷過去已生諸不善法煩惱已生的已經過去了但過去了的煩惱還能影響自己身心束縛自己這要以精進來斷除他如曾經加入了社會的不良組織雖然好久沒有活動了但還受他的控制必須以最大的勇氣割斷過去的關係才能重新做人二以精進來達成不再生起未生諸不善法未生的煩惱還沒有生起那不是沒有嗎不能說沒有只是潛在而沒有發現出來罷了這必須精進對治使善法增長智慧增長才能使未生的煩惱再沒有生起的機會三未生起的善法要以精進力能令生起這如潛在的財富生得的智力要努力使他充分發揮出來一樣四對已生起的善法要常生歡喜心加以不斷的熏修能令他一天天增長廣大起來這四種正勤扼要的說一句這是能斷一切諸不善法成就一切諸善法的精進沒有精進是不能達成這一目標依大乘法說修空名為不放逸了達一切法性空才能痛惜眾生於沒有生死中造成生死沒有苦痛中自招苦痛才能勇於自利利他不著一切法而努力於斷一切惡集一切善的進修三四如意足如意是神通自在神通自在依禪定而引發禪定有欲希願增上勤增上心止的別名增上觀增上依這四法而修成定為神通所依止如足一樣所以欲勤心觀所成定名為四如意足也叫四神足這是得定發通的重要行門但為什麼會發神通呢如他心通能知他人的心念神境通能入地履水升空那怕千里萬里一念間就能到達這怎麼會可能呢要知身心世界都是因緣和合的幻相沒有自性可得而眾生無始妄執卻取著一合相想像為一一個體的實在由於實執的熏習身心世界一一固體化粗重化自成障礙如因誤會而弄到情意不通一樣這才自他不能相通大小不能相容遠近不能無礙修發神通不過部分或徹底的恢復虛通無礙的諸法本相而已如修世間禪定那是修得離去我們這個欲界繫的身心世界也就是最實體化粗重化的身心世界從根本禪色界繫法中修發得神通自在但這只是心色比較微妙輕靈還只是有限度的虛通無礙如修大乘出世禪定那是觀一切法如幻性空也就得一切法無礙論說以無所得得無所礙所以能對治身心的個體化粗重化破壞身心的一合相而得心意相通法法無礙得如意自在神通四五根根是根基深固的意思修信根能對治不信三寶四諦的無信修精進根如四正勤能對治懶於為善勇於作惡的懈怠修念根如四念處能繫心念處對治失念正念的忘失修定根如四禪能對治散亂心修慧根如四諦二諦一實諦的正知能對治無慧的眾生眾生二字應通前四根五法具足善法才堅固所以叫五根五五力五力的內容還是上面說的信勤念定慧但由於五根的善力增強進而有破治不信等諸煩惱的力量所以又名為五力六七覺分也名七菩提分一擇法覺支支就是分擇是簡擇抉擇為觀慧的別名法是智慧簡擇的正法這是七覺分中的主體餘六是助成二喜覺支喜是喜受因為深嘗法味遠離憂苦而得悅樂三精進覺支即依擇法而向寂滅的精進四念覺支即正念相續五輕安覺支是因得定而起的身心輕安六定覺支即與慧相應的正定七捨覺支這不是捨受而是行蘊中的捨心所住心平等而不取不著以擇法為中心的七覺分能達成正法的覺證如能現覺正法知法入法就能對治於諸法中所有的疑悔錯謬在迷不覺的眾生在人生旅程中不是面臨歧途躊躇不決疑就是走上錯路盲目前進而死路一條錯謬錯誤與疑惑到頭來是徬徨空虛憂悔正覺的聖者主要為斷除三結我見戒禁取疑我見是理的迷謬戒禁取是行為的錯謬而疑是對三寶四諦真理與道德的懷疑如真正的覺悟了這一切煩惱都不再存在因而是真知灼見心安理得充滿了正法的喜樂而沒有憂悔這名為於法無畏在一切菩提分中這是極重要的一項七八正道這是如來說法最先揭示的道品為離邪向正轉迷啟悟的修持軌範一正見於四諦二諦一實諦的深徹知見為八正道的主導者二正思惟對於正見的內容深思而求其實現這二者屬於慧學三正業為遠離殺盜淫的身惡行而有身正業四正語為遠離妄語兩舌惡口綺語而有正語五正命是如法得財如法使用所有的正常經濟生活這三者屬於戒學六正精進即斷惡修善為助成一切道品三學的精勤七正念於正見正思所得的正法繫念現前不忘不失八正定因繫心一處到達禪定的成就這二者是定學八正道以無漏的戒定慧為體這不但是聖者的八正道行入涅槃也是凡夫邪道的徹底對治者所以說能對治墮邪道的一切眾生墮邪道即邪定聚眾生邪道是八邪道邪見邪思惟邪業邪語邪命邪精進邪念邪定有了八邪一定墮落惡趣修八正道才能迴邪向正而使他解脫戊三結說迦葉是為菩薩畢竟智藥菩薩常應勤修習行上面所說的三類十項的對治行七類三十七品的菩提行都是菩薩修集所成的以智為主的法藥菩薩以此自利也就以這樣的智藥遍十方界去化導群迷救治眾生的生死重病這些智藥本來都是聲聞所常用的法藥為什麼稱為菩薩的智藥呢這因為一大乘能容受一切所以名大這些聲聞所修行的三乘共法也就是大乘菩薩的修法所以大般若經摩訶衍品就以三十七品等為大乘二在大乘菩薩修學起來也就比聲聞的深一層如以沒有出三界願為無願以涅槃寂靜來對治淨顛倒以不墮我見來說四念處等所以只要以大乘心行來修學小法也就成為大乘了如來將這些法藥說明了以後結告迦葉說迦葉這就是菩薩的畢竟智藥能徹底救治眾生的大法這些無論是自利或者利他作為修學菩薩道的都是時常應該精勤修習實行的丁二出世智藥治戊一舉喻起說又大迦葉閻浮提內諸醫師中耆域醫王最為第一假令三千大千世界所有眾生皆如耆域若有人問心中結使煩惱邪見疑悔病藥尚不能答何況能治菩薩於中應作是念我終不以世藥為足我當求習出世智藥亦修一切善根福德如是菩薩得智藥已遍到十方畢竟療治一切眾生再來說畢竟的出世智藥以我執繫著而起的是世間法體達空無我性超勝了這樣的世間法名為出世出世為佛法本義但每被人誤解如來要說明出世智藥先以比喻說起大迦葉譬如我們這個地區是四大洲之一的南閻浮提洲從有一棵閻浮提樹得名在這閻浮提內所有的諸醫師中要推耆域醫王最為第一耆域是頻婆娑羅王的王子長於醫藥為當時僧團的特約醫師由於他醫理高明所以讚為醫王耆域是一位了不起的大醫師然而假令三千大千世界所有眾生大家皆如耆域那樣的擅長醫藥簡直是沒有治不了的病若有人問起人們心中的結使煩惱邪見疑悔等心病該用什麼藥來治療那大家尚不能答覆根本不知道又從那裡答起連答都答不出來何況能治療這心中的煩惱病呢結使等煩惱為生死根本有煩惱就有業有業就有生死苦報所以解脫生死重病要從根治煩惱下手可是世間的醫師雖也有治精神病的應用心理治療的但對心中的煩惱頭數煩惱力用根本不明白不能認識病源當然不能下藥治療了學菩薩道的對於此中道理有深刻的認定知道這不是世間一般所能根治的所以應該常作是念我終不以一般的世藥為滿足我當求習出世間的智藥不但學習出世的真智慧還要修一切善根福德這樣的福慧雙修才能自他兩利如是菩薩學得了智藥就會遍到十方界去畢竟療治一切眾生的生死重病戊二隨義正說己一標法性空以觀心何謂菩薩出世智藥謂知諸法從緣合生信一切法無我無人亦無眾生壽命知見無作無受信解通達無我我所於是空法無所得中不驚不畏勤加精進而求心相說到出世的畢竟智藥就是究竟解脫的不二法門依唯識宗的現觀次第是先觀所取空次觀能取空然後趣入現證依中觀宗的現觀次第是先泛觀一切法空次觀能觀的心也空然後趣入現證大致相近但唯識宗以唯識無境的勝解為方便而中觀宗以緣生無性空為方便本經所說更順於中觀的修法如來承上譬喻進一步起問什麼叫菩薩出世智藥這是先要依經論的教理了知諸法都是從緣和合而生一切法依眾緣而有依眾緣而生離去因緣就什麼都不能存在這是確認了佛法的根本法則既然一切是因緣和合而有那就能深信一切法是無我無人亦無眾生壽命知見無作無受了這就是依因緣和合生的法則信得諸法無我法印這裡的我人到知見都是我的異名在大般若經中我的異名一共有十六名在上面解說我空時已說到我人眾生壽命這裡再說到四名外道凡夫對於自我以為是能知者能見者作善惡業者受果報者所以知見等都是自我的別名在緣生無我的正觀中一切都不可得能信得諸法無我也就能信解通達無我我所信是依人及經論所說經教理的推比而起信解是經思惟而得深刻的勝解通達是修慧能深徹的了達無我就沒有我所無我是我空無我所是法空上來泛觀一切法空進一步要返觀這能觀的心相也空一般人大都是依識立我所以這也就是廣觀法空而後反觀我空的現觀次第如上所說的我法皆空是最難信解的因為一般都誤以為空是沒有所以聽說一切空就不免有沒有著落的恐怖但大乘利根菩薩從緣生無性去解空知道畢竟空中不礙一切有業有報有修有證能於畢竟空中立一切法所以能於是空法無所得中不驚不畏不但不驚怖而且深信不疑更能勤加精進由博返約從一切法空中而求心相是什麼心相也可譯作心性求心相就是求心的自性知見作受繫縛解脫眾生總以為心在主宰有心可得為眾生妄執的最後堡壘所以非進求心相不可從前慧可禪師向達磨禪師求安心法這也是以為有心可得而只是憂悔不安不得自在達磨禪師說將心來與汝安這就是要他返觀自心勤求心相可禪師求心的結果是求心了不可得這與下文的觀心一樣這才是安心解脫的不二法門己二觀心無性以顯性庚一觀心無性辛一約勝義觀心無性菩薩如是求心何等是心若貪欲耶若瞋恚耶若愚癡耶若過去未來現在耶若心過去即是盡滅若心未來未生未至若心現在則無有住是心非內非外亦非中間是心無色無形無對無識無知無住無處如是心者十方三世一切諸佛不已見不今見不當見若一切佛過去來今而所不見云何當有但以顛倒想故心生諸法種種差別是心如幻以憶想分別故起種種業受種種身以下是勤求心相觀心無性以顯性在說明上分為觀心無性無性即性兩節觀心無性也分二科先正約勝義顯無性是勤求心相的正意如來先總標說菩薩應如是求心怎麼樣求呢應推求觀察何等是心求心是求心的自性是什麼但求覓起來心是畢竟不可得的本經約三門觀察一三毒求心是貪欲嗎瞋恚嗎愚癡嗎假如心是貪欲那瞋癡就不是心了假如是瞋恚貪癡又不是心了假如心是愚癡那心就不能是貪瞋了假使說貪癡或瞋癡可以相應同時而有所以不妨是貪又是癡是瞋又是癡但這既不免貪瞋相違的過失而且相應共有可見是眾緣和合而不是心自性相自性是不二的自體呢這樣從這三毒去推求什麼都不能說是心依經論成法這應該是三性求心是善嗎是惡嗎是無記嗎心既不能局限於一性又不能同時通於三性所以以三性推求心是了不可得本經且約惡性說從三毒去推求二三時求從時間去觀察心是過去的嗎未來的嗎現在的嗎若心在過去過去是已滅那即是盡滅而不可得若心在未來未來是未生起未至現在那不是等於沒有嗎若心在現在現在只是不離過去未來的假名並沒有一念安住不動的現在所以經上說即生即滅這樣現在是即生即滅無有住相那又指什麼為現在心呢作三時觀察心是了不可得所以金剛經說過去心不可得現在心不可得未來心不可得三三處求如心是有實自性的那心在什麼處在內在外在中間推求觀察起來是心非內並不能指出心在身內的那一處而且心如在內怎麼能了外境呢當然也非外誰能證明心在身外而且在外又怎能覺了自己身心呢也非中間中間是相待的假名是並不能確指的觀門無邊本經且約三毒三時三處為觀門但推求起來不見有一定法名為心不見心有自性可得而契入心空觀心性空而入現證無分別性瑜伽師地論說經有六句本經前文出四句這裡譯為七句以顯示心相不可得七句是一是心無色非色根識所能得的色相二無形無對無形就是無對是譯者的衍文這是說心不如五塵等那樣的有形有對三無識不是意根識所能明了的四無知也不是雜染有漏識所能知的五無住不是心依根住而有所得的六無處也不是心在器世間而有處所的觀察起來心是這樣的無所得唯是如如無差別性所以如來接著說不是由於智力微薄觀察不到而是心相本來如此是心連十方三世一切諸佛也是觀心了不可得過去佛不已見現在佛不今見未來佛不當見這樣若一切佛也過去未來現今三時觀所不能見那怎麼眾生一定以為應當有心可得呢經說云何當有是反問以表顯心不可得但從下文看也是伏一疑問儘管勝義觀中求心了不可得但心確是那樣的現成這到底是什麼呢這可說是人人懷疑的問題從前德山禪師挑了金剛經青龍疏想到南方去難破禪宗半路上遇到賣點心的婆子問他金剛經說三心都不可得上座點的是那一個心德山竟茫然不知所答德山以為心不可得就誤會為沒有心了真俗不能無礙解空不能達有難怪他經不起老婆子現實門中一問就落得啞口無言這問題且看如來如何解答佛說但以顛倒想心生諸法種種差別為了解說這二句接著說是心如幻以憶想分別所以心與煩惱俱起而起種種善惡業作了業就受人天惡趣等種種身這一解說包含兩個意義一心是什麼是本性空而如幻的有雖現現成成的有心有分別心相是了不可得心是如幻性空並非不可得中別有什麼微妙的真實的心二心生種種差別法生確是阿含經以來的決定說這與唯識學的依識立境諸識所緣唯識心所現不同這是說由於無始來的妄想心所以造業受果生死流轉心就是那樣的如幻如化那樣的虛妄顛倒在幻化虛妄中織成幻化虛妄的三界六道生死不了如以為一定有心可得是真是實那不妨打破沙盆問到底心是什麼怎麼樣有的什麼時候開始有的一連串的推求觀察而心是了不可得通達心無所得就能現證真性解脫自在辛二約世俗呵心妄有又大迦葉心去如風不可捉故心如流水生滅不住故心如燈焰眾緣有故是心如電念念滅故心如虛空客塵污故心如獼猴貪六欲故心如畫師能起種種業因緣故心不一定隨逐種種諸煩惱故心如大王一切諸法增上主故心常獨行無二無伴無有二心能一時故心如怨家能與一切諸苦惱故心如狂象蹈諸土舍能壞一切諸善根故心如吞鈎苦中生樂想故是心如夢於無我中生我想故心如蒼蠅於不淨中起淨想故心如惡賊能與種種考掠苦故心如惡鬼求人便故心常高下貪恚所壞故心如盜賊劫一切善根故心常貪色如蛾投火心常貪聲如軍久行樂勝鼓音心常貪香如猪憙樂不淨中臥心常貪味如小女人樂著美食心常貪觸如蠅著油勝義觀中心是畢竟不可得的有的是世俗如幻妄心為作業受報的主導者上明從觀空入證本可以直接無性即性的下文但對於世俗幻妄的心識本不可得而眾生著有實為顛倒憶想分別的根源所以又大加呵責勸眾生遠離他如知道心的幻妄而不惑知道心的性空而不著自能離妄心而現證無分別法性呵妄心有一大段喻說共二十四句可說是集阿含與毘尼中散說的大成如來在本經中一一的總敘出來如來說大迦葉如幻的妄心是怎樣的呢一心是似有而不可得的剎那生起就滅入過去如風一樣的迅速風一樣的不可捉摸沒有一些痕跡可得二心如流水俗說長江後浪推前浪剎那生滅不住所以纔覺得此心早就不是此心了三心如燈焰從眾緣有燈焰是依緣而有的所以看起來燈焰長明而其實是由於眾緣油及燈芯等的被燒前後的燈焰相續並不一樣四是心如閃電一般一霎間過去所以說念念滅五心如虛空那樣本來清淨淨是空的異名什麼也不可得但由於外來的客塵雲霧沙塵等而現出虛空昏暗的污染相經上說心性本淨客塵所染是心非心本性淨故如以為眾生有一清淨真心那就不是如來虛空喻的本意了上來五喻為一段風喻無常故空流水燈焰電喻無常虛空喻不淨六心如獼猴一樣跳躍不停不是拉著這個就是捉住那個心的貪愛六欲微妙的色欲聲欲香欲味欲觸欲法欲也是貪這貪那而不息的七心如畫師畫師能在白紙上畫出山水人物鳥獸形形式式心在一切本空中以憶想分別能起種種善惡業因緣有了業因緣就會招感三界六趣的種種報身八心如生性不一定的人自己毫無定見一切隨環境轉心沒有定性所以也就隨逐種種諸煩惱或時成貪心或時成瞋心或成憍慢心等九心如大王大王是一國的主有權力能統攝心在一切諸法中也是增上最有力的主導者這約第六意識說如約心與心所相應六識都名為心王十心常如獨行而無二無伴的人這以旅程中的獨行者為喻心在生滅過程中也是無有二心能一時中有的但這不妨多識並生也不妨心與心所同時相應不過說在一念心中沒有二眼識二意識可以同時生起而已但一心論者心所無體論者就依據這一比喻而成立他的理論十一心如怨家怨家是時常想害你使你受苦心的認識不全煩惱相應所以心也能給與眾生以一切諸苦惱十二心如狂象象一旦發起狂來土地也被踐踏房舍也會被撞倒所以說蹈諸土舍這如心顛倒起來能壞一切諸善根特別邪見起重惡業能斷善根上來七喻為一段廣明心的作用其中心如大王心如畫師心常獨行尤為佛法所常說十三心如魚的吞鈎被釣住而有喪生的危險卻顛倒的以為美味當前在苦中生起樂的覺想十四是心如夢一樣顛顛倒倒好像別人就是自己以為我在做什麼而不知是於無我中生起自我的覺想十五心如蒼蠅在糞便等臭穢物上亂飛於不淨中顛倒的生起淨想上來三喻為一段明顛倒心十六心如惡賊為了劫奪物品追求寶物的所在能以殘酷手法與人以種種考掠的苦痛十七心如惡鬼一樣常求人便伺人以可乘的機會如人的福盡了或起了邪心作了惡業惡鬼就乘虛而入作怪害人十八心常高下不平如惡神一樣沒有平等心因你的信他不信他而或愛或恨給人以幸福或災禍心也就是這樣的常為不平等的貪恚所壞變異十九心如盜賊如不加防備會劫奪你所有的一切善根上來四喻為一段形容心的邪惡二十心常貪色色是顯色形色特別是男女色如貪欲心盛起來就如飛蛾的自投火中一樣死活都不顧的二十一心常貪聲如歌唱音樂貪聲的聽見了就心裡舒暢如從軍的久在行伍習慣了就愛樂戰勝的凱旋鼓音二十二心常貪香香是好香惡香平等香的總稱俗語說如入鮑魚之肆久而不聞其臭心如貪香臭成習那會越臭越過癮如猪憙樂在糞穢不淨中臥你要拉猪到清淨所在猪是死命都不肯走的二十三心常貪味如小女人樂著美食這有一故事在內國王有一幼女宮人抱著到王園中去玩經過大樹忽然落下一顆不曾見過的果實宮人撿來給王女吃王女吃了非常好吃一定還要吃這到那裡去找呢宮人研究起來大樹上有鳥巢這一定是老鳥從深山中啣來餵小鳥不慎而落下來的於是宮人伏在樹上等老鳥啣果回來時就奪下給王女吃久了老鳥生了氣啣一顆看來一樣的毒果回來宮人照樣的伏在樹上搶果來給王女吃這可吃得腸斷而死俗語說拼死吃河豚也正是貪美味而不惜一死的明證二十四心常貪觸輕軟等合意的觸覺如蒼蠅的貪著油的潤滑而終於死在油中一樣上來五喻為一段明心貪五欲的過失庚二無性即性辛一無為相如是迦葉求是心相而不可得若不可得則非過去未來現在若非過去未來現在則出三世若出三世非有非無若非有非無即是不起若不起者即是無性若無性者即是無生若無生者即是無滅若無滅者則無所離若無所離者則無來無去無退無生若無來無去無退無生則無行業若無行業則是無為現在要說到無性即性依經文看來這是直承前文勝義觀心無性而來空與無性一般總覺得是否定是沒有總覺得應該有其所有真如實相是真實有才對然如來的方便開示是從空無自性中顯示法性的如般若經說何謂諸法自性一切法自性不可得是為一切諸法自性換句話說眾生於一切法執有自性所以法性不顯唯有通達一切無自性一切不可得說似一物即不中才開顯了一切法的自性所以無性為自性是有甚深意義的如在無性外別求自性無性與自性相對立那就失去了如來說法的善巧方便有言無義本經的顯示法性充分的表顯此義這又分兩節來說如來承前文的觀心不可得對迦葉說如是迦葉上面從三毒門三時門三處門種種方便來觀察求是心相而不可得不但凡夫不能得十方三世諸佛也不能得這可見真實如此並非顛倒了若心是畢竟不可得那就非過去法非現在法非未來法若非過去未來現在那就出三世也就是不落時間超越時間了若出三世不落時間相那就非有非無為什麼有一定是因緣和合的有從因緣而有一定有時間相可說所以既不落時間相就不能說是有了既然非有也就是非無無與有相對待有成無或約時間說或約空間說或對他說或自身分位說都是待有而無的如非有也就非無例如一向就沒有牛角鹿角等那也決不會說兔角的沒有了有與無為認識上極根本的概念如非有非無就不落意識不落言詮了如來從超越時間超越有無進一步說非有非無的即是不起起是從沒有到有從不是所知而成為所知的如有無都不可說那還有什麼起呢若不起即是無性無性是沒有自性如有自性就有現起的可能既畢竟不起可見是極無自性了若無性即是無生這如經上說若說緣生即無生是中無有生自性若無生性也即是無滅沒有生怎會有滅呢若無滅那就無所離不生不滅中有什麼可離呢若無所離就無來無去無退無生無來無去約死生往來生來死去不可得說無退無生約善惡得失的不可得說退是得到了而又失去如世間定慧的退失或善惡業力的有盡生是沒有而得到了這樣的無來無去無退無生就無行業業是動作事業行是遷流造作一切無來無去無得無失那就沒有行業可說了若無行業那就是無為行業是有為法有為法是業煩惱所為作成的有生有滅而遷流三世的所以沒有行業就是業煩惱所不起的生滅所不得的無為大小乘論師雖成立多種無為但如來對有為說無為的本意如本經所說是阿含經以來一致的定說這一段從觀心空不可得展轉顯示現證的無為法辛二聖性相壬一泯諸相若無為者則是一切諸聖根本是中無有持戒亦無破戒若無持戒無破戒者是則無行亦無非行若無有行無非行者是則無心無心數法若無有心心數法者則無有業亦無業報若無有業無業報者則無苦樂若無苦樂即是聖性是中無業無起業者無有身業亦無口業亦無意業是中無有上中下差別以下據現證無為而顯示聖性先約泯絕諸相說佛先總標說若無為法那就是一切諸聖三乘聖者的根本無為法本來如此如以此為所依而體證這無為法那就成為聖人聲聞四果緣覺大地菩薩佛聖是正義離惑而證真的叫做聖人金剛經也說一切賢聖皆以無為法而有差別如離去無為法就沒有聖人可說諸聖者所現證的無為法是沒有時空相沒有能所相沒有心境名義質量等相待相所以在這現證的絕對空性無為中是無有持戒也無破戒可得本經在宣說菩薩廣大正行時特重於戒律下面也如此所以在六度萬行中舉戒來說戒如受持不犯不染污不滲漏不破損名為持犯了戒行損壞了戒體叫做破從現相邊說是如此但深求一切法的真相無性空不可得無為這是沒有能持所持的相對也沒有受持與破壞的增減所以般若經說戒性空持犯不可得故若無為中無持戒無破戒那就無行無非行了行是身行語行意行持戒與破戒都是行持戒破戒不可得就無行無行也就無非行若無有行無非行那就無心無心數法心數即心所的舊譯心是六識心數是受想行等無行與非行當然無心與心所可得若無有心心數法就無有業無業報業是思心所相應及引起的身語動作心是受業的果報主所以如沒有心與心所就沒有業與業報可說若無有業無業報就無苦樂苦樂約業力所感的苦報樂報說若無苦樂那就超脫了生死繫縛的業報那即是離繫的聖性上文揭示無為為聖者的根本展轉論證到這才歸結到就是聖性聖者以此而成也就是聖者以此為性如在大乘不共學中就稱為佛性聖性佛性只是無為法空性的別名從上來的顯示可見聖性中是無業無起業的人所以無有身業無口業無意業聖性中沒有行業所以沒有優劣沒有增減沒有得失一切平等所以說是中無有上中下差別聖者所現證的聖者以此為性的就是這樣的無為金剛經也說是法平等無有高下壬二顯淨德是性平等如虛空故是性無別一切諸法等一味故是性遠離離身心相故是性離一切法隨順涅槃故是性清淨遠離一切煩惱垢故是性無我離我我所故是性無高下從平等生故是性真諦第一義諦故是性無盡畢竟不生故是性常住諸法常如故是性安樂涅槃為第一故是性清淨離一切相故是性無我求我不可得故是性真淨從本已來畢竟淨故上來約泯絕諸相說現在在不可說而又不可不說中方便顯示那聖性的清淨德性共十四句一是性上文所說的聖性是平等的不生不滅不增不減不垢不淨如虛空一樣二是性無別一切諸法雖萬別千差而究極是平等的一味同一解脫味為聖者所同證如四河入海同一鹹味一樣上二總說聖性的平等無差別性三是性遠離因為遠離身心相身相心相繫著眾生而不離但在聖性中是沒有身心的繫著相可得四是性離一切法從身心而擴大到一切法為什麼離這生死一切法因為聖性是隨順涅槃的涅槃是無為法可以說聖性就是涅槃但約究竟的無餘涅槃說聖性是隨順涅槃趣向涅槃臨入涅槃的五是性清淨因為遠離一切煩惱垢染聖性清淨本來是離垢的又從一切法而說到繫縛的煩惱但聖性是修證即不無污染即不得的清淨六是性無我因為聖性是離我我所而證的我是煩惱繫縛中的根本著處所以又說離我離我我所才能現證聖性那怎麼可說這聖性是我或真我呢上四句約聖性離染說七是性無高下因為聖性是從平等的無為法性而現證的與平等法相契而生起的證平等理所以聖性也沒有高下可說八是性真諦諦是確實不倒的意思諦有二一世俗諦就世俗而說諦其實是虛假的二勝義諦是無漏勝智所證的真義這不但是諦而且是真而非妄的現在說聖性是真諦因為這是第一義諦第一義諦為勝義諦的異譯既是無漏勝智所證的那當然是真諦了上二句約真理與勝智顯聖性九是性無盡無盡是一直如此沒有滅盡相聖性是畢竟不生的所以也沒有滅盡可得了十是性常住常與無盡恆略不同無盡約三世如此說常約超越三世說說聖性是常因為一切諸法常如其性不變不失所以法華經說是法住法位世間相常住十一是性安樂在一切安樂中有為樂可盡唯涅槃出三界苦厄的離繫樂最為第一十二是性清淨離一切妄取相性自空寂所以名清淨上說清淨約離垢說這裡約一切相不現說十三是性無我於聖性中求我是畢竟不可得的十四是性真淨不是始染而終淨不是相染而體淨不是離染而成淨這是從本已來畢竟淨所以說真淨上說性淨這裡說真淨如空有性空與畢竟空一樣上六句與一般所說的是常是樂是淨相同但說無我與常樂我淨的四德說不同雖然聖性也可以說是我得自在故但容易與凡外的真我常我相雜濫所以本經不說是我保有無我說的特色這就是菩薩的出世智藥以此自得解脫也以此解脫眾生現證聖性成就一切清淨功德性聲聞緣覺菩薩佛只是智證的分滿而已上來正說菩薩道已究竟乙二兼說聲聞道丙一正說丁一應機開示戊一比丘應行不應行己一應修三學庚一增上戒學又大迦葉汝等當自觀內莫外馳騁本經以菩薩道為主而兼說聲聞道菩薩與聲聞是同證法空性的基於同一正法所以是無所得大無所得小聲聞法決不是法有我有或法有我無的因為大小同得無所得正觀一定能信解空義所以般若經說須陀洹一定能信般若法門法華經也說不信一乘是增上慢人自以為然的假名阿羅漢現在如來本著這佛法不二解脫一味的深見再來開示聲聞道經文分正說巧說密說三科正說是一般開示的聲聞常道在聲聞法中以出家的比丘為主所以先說比丘的應行不應行應修行的就是戒定慧三學佛說三學以戒為依止依戒而進修定慧依慧而得解脫所以名為增上如來又告訴大迦葉說汝等聲聞弟子應當自己反觀自身反觀內心發現自己的煩惱而降伏他能內觀才能進入佛法才能修三學得真解脫切莫如世人一樣意馬心猿的向外馳騁心在外境塵欲上追求那是馳求不了永不滿足也就是生死不了永沒有安心立命處當自觀內莫外馳騁可說是佛法的標幟為戒定慧三學內在共同的特質如是大迦葉當來比丘如犬逐塊云何比丘如犬逐塊譬如有人以塊擲犬犬即捨人而往逐之如是迦葉有沙門婆羅門怖畏好色聲香味觸故住空閑處獨無等侶離眾憒鬧身離五欲而心不捨是人有時或念好色聲香味觸貪心樂著而不觀內不知云何當得離色聲香味觸以不知故有時來入城邑聚落在人眾中還為好色聲香味觸五欲所縛以空閑處持俗戒故死得生天又為天上五欲所縛從天上沒亦不得脫於四惡道地獄餓鬼畜生阿修羅道是名比丘如犬逐塊如來開示戒學說大迦葉我為比丘們制戒現在的聲聞弟子多數能如法如律深見如來的意趣可是當來比丘怕就不知佛法的真實意趣專在形式儀表上著力如犬的追逐土塊一樣怎麼說比丘如犬逐塊呢譬如有人以土塊投擲守門的犬犬忘了守門不知去追逐那個人竟然捨人而往逐那土塊這不是愚癡嗎不追逐人人不逃走那土塊是永遠投不完的忙忙碌碌的逐塊結果是門也忘記守了如來說了譬喻才合法說如是迦葉有些勤修眾善止息惡行的出家沙門沙門是梵語譯義為勤息還有持戒修清淨行的在家婆羅門婆羅門是梵語譯義是淨行不一定指婆羅門種姓說這些出家在家人為了怖畏那好的色聲香味觸五欲不敢迷戀五欲而免墮落惡道不得解脫苦惱這才住空閑處僻靜的環境獨自居住而無師友等侶遠離大眾的喧囂憒鬧一心去修行可是他們雖身離五欲而心欲卻並不能捨離不知道微妙的五欲可能引發內心的貪欲稱為欲而並不是真欲真欲是內心的貪欲這樣不知道降伏內心的貪欲而專於避免控制外在物欲的享受誘惑不等於癡犬的逐塊而不逐人嗎這樣的嚴持戒行頭陀苦行不貪五欲最後是必然失敗的是人住空閑處修行的有時或憶念曾經受用的好色聲香味觸他們儘管山居苦行但在事相上著力貪心樂著五欲而不知觀察內心不知道怎樣才能當得遠離色聲香味觸五欲不再受他的誘惑他們始終不知從根去解決所以雖長期的住山持戒而一直過著物欲與離欲的矛盾生活人不能永遠山居獨處的有時為了什麼又來入城邑聚落在人眾中遇到了誘惑的境遇內心控制不了特別是內心壓抑久了更易衝動於是還為好色聲香味觸五欲所縛也就是捨戒還俗了從山林出來重過喧囂的生活了或犯戒而仍混在僧團中過活這是現生就失敗了的非墮惡趣不可即使他終老山林嚴持戒律苦行頭陀到底但他在空閑處所持的是俗戒僅是世俗的事相戒以這種持戒功德死得生天欲界天上是最微妙的五欲所在天子天女欲樂自在那時的持戒苦行早不知那裡去了又為天上的五欲所縛而過著欲樂的生活等到天壽盡了從天上沒與歿同持戒功德已受用盡了惡業現前也不得脫於四惡道地獄餓鬼畜生阿修羅道的苦報眾生生死的趣向有六名六趣或六道人與天為二善道地獄等為四惡道地獄是最苦的處所有八熱八寒大地獄及遊增地獄等餓鬼中雖也有多福的受用不了但多數是無福的常受饑餓苦所以以餓鬼為名畜生實包括一切的禽獸鱗介阿修羅譯義為非天這是本住忉利天而現退住須彌山下的大海中可說是墮落的天神上面說的那種沙門婆羅門在制御外來的五欲上著力怎樣持戒怎樣苦行而不知在內心的貪欲上下一番功夫知外而不知內知形儀而不知心地是名比丘如犬逐塊又大迦葉云何比丘不如犬逐塊若有比丘為人所罵而不報罵打害瞋毀亦不報毀但自內觀求伏其心作如是念罵者為誰受者為誰打者害者毀者瞋者亦復為誰是名比丘不如犬逐塊佛又告大迦葉那要怎樣才比丘不如犬逐塊呢上從心離貪欲說今再從心離瞋恚說以說明降伏內心的任何煩惱是達成清淨持戒的心要若有比丘遇到惡因緣不管是自己不對他人不對或者是誤會總之如為人所罵而能不報以罵詈受到別人的打害瞋恨毀辱也不加報復不會你打我也打你毀辱我我也毀辱你這樣的不為瞋恚煩惱所動能忍辱而不還報才能清淨持戒對外不採取報復態度中國也有唾面自乾等忍辱法但一般的修養如遇重大的逆境當前要忍也難忍了佛說要堅忍持戒非要自己內觀以求降伏其心不隨瞋恚等轉不可降伏其心的方法是內心作如是念罵我者為誰受罵者為誰打者害者毀者瞋者又為誰這大有中國禪師看話頭的風格誰誰誰觀察推求起來由於一切法無我罵者不可得受罵者也不可得罵者與被罵者不可得罵也就不可得了罵不可得那還會氣憤不平嗎還會報罵報打嗎以我法空的觀慧來自觀其心瞋恚早就不可得了這就是金剛經降伏其心的法門這樣的比丘不為環境所動轉能自觀我法空而離瞋離貪離癡也如此是名比丘不如犬逐塊是能知佛法的真實意趣才是能清淨持戒的人依經文來說戒律好像是一套外來佛制的的法制規章從軌範身口以節制內心其實戒律的真意義還是要從淨化內心中去嚴淨戒律沒有出世正見怎會有出世的正業正語正命呢庚二增上心學迦葉譬如善調馬師隨馬𢤱悷即時能伏行者亦爾隨心所向即時能攝不令放逸增上心學就是定學心是定或止的別名如持戒清淨就能心安理得容易進而修定了如來先舉喻說迦葉譬如善於訓練馬的調馬師隨那馬是怎樣的𢤱悷不調如性情暴惡不受駕御亂跳亂奔等都有適當的方法主要是勒緊繮繩加上鞭打錐刺即時能使馬降伏隨調馬師的意思而行動接著合喻說修行者的修心修習禪定就如調馬師的調馬一樣為什麼修定為了心的散亂成性不是掉舉而妄想紛飛就是惛沈而暗昧不明在這樣的散亂心中觸境隨緣心不能自主為貪瞋等煩惱所役使那樣的散亂掉舉惛沈如𢤱悷的惡馬一樣非經一番調治決不能自如調伏心的方法主要是隨心所念而向外馳求憶過去念未來向五欲向貪瞋癡向親里國土等時不讓他繼續外向而即時能攝心回來換言之是攝心內向使心安住於應住的境界佛法中說到繫念攝心的方法極多最簡要的是觀心使心不外散而念念返觀自心安住自心這一攝心內住的法門能不令心如野馬般的放逸如修習到定心增明不但能發禪定的無邊功德更可以修慧而向解脫庚三增上慧學迦葉譬如咽塞病即能斷命如是迦葉一切見中唯有我見即時能斷於智慧命譬如有人隨所縛處而求解脫如是迦葉隨心所著應當求解攝心不放逸即使達到禪心自在也還只是定學佛教人於定中修觀修勝義觀慧而得解脫才是增上慧學佛又舉喻說迦葉譬如生病各式各樣的或輕或重或急或緩但如生了咽喉阻塞病如乳蛾脹喉頭癌等那就與其他的病情不同即能使人斷命而死如是迦葉在一切見中唯有我見最為根本即時能斷眾生的智慧命如咽塞病一樣智慧般若與無明相反有無明就沒有般若般若起就能破無明無明能障慧明是著我著法的實有也就是不了我我所空的我我所見有我就有我所所以我我所見是我法空慧的根本障礙說我見是能斷智慧命的重病知道了這點那麼什麼病病在那裡就應治什麼病向那裡去治才能藥到病除不能如俗語說的東門遇鬼西門送祟才好依上所說生死根源的病本是我見那麼想解脫生死繫著唯有能治我見的空慧了如來為此又舉喻說譬如有人被人繫縛了那要認清縛在那裡一定要隨所縛處而求解脫不能縛在足部而向腰間去求解這樣一切煩惱以薩迦耶見我見為本我見就是繫縛我見繫縛什麼呢我們為五欲所縛為名利權力所縛為男女色事所縛但根本縛著處是心心與我見相應著自心為實而起我見所以隨心所著應當向心去求解脫如上文求心不可得的觀心空寂就是解脫生死繫縛的不二門這點唯識學說末那識與我見相應執阿賴耶識為自內我名為我愛執藏也就是一切眾生的根本愛著處中觀學說識於一切法而起著見有自性為我見根源我見著處自性正就是如來所說眾生愛阿賴耶樂阿賴耶喜阿賴耶為眾生縛著根本所以必須隨心所著而求解脫如提婆菩薩的廣百論說識為諸有種境是識所行見境無我時諸有種皆滅己二應離八失又大迦葉出家之人有二不淨心何謂為二一者讀誦路伽耶等外道經書二者多畜諸好衣鉢又出家人有二堅縛何謂為二一者見縛二者利養縛又出家人有二障法何謂為二一者親近白衣二者憎惡善人又出家人有二種垢何謂為二一者忍受煩惱二者貪諸檀越又出家人有二雨雹壞諸善根何謂為二一者敗逆正法二者破戒受人信施又出家人有二癰瘡何謂為二一者求見他過二者自覆其罪又出家人有二燒法何謂為二一者垢心受著法衣二者受他持戒善人供養又出家人有二種病何謂為二一者懷增上慢而不伏心二者壞他發大乘心比丘們所應行的是三學修了三學就可以得解脫但比丘還有八種過失是不應有的應離的每類二法所以實是八類二法有了這八失那就怕要墮落了所以如來慈悲又特為開示一不淨心如來說大迦葉出家之人有二不淨心不淨本可通一切不清淨但這裡指意樂不淨內心的動機與志向的不淨那二種不淨心呢一歡喜讀誦路伽耶順從世俗的功利的等外道經書二歡喜多積畜與蓄同種種美好衣鉢本來人是身心的綜合體需要物質與精神生活的充實在精神方面學佛而有豐富的知識當然是好的但如不能獲得佛法的深切信解不能辨別德失而好讀外道的世俗的書籍就大有問題例如整天在政治軍事社會經濟科學醫藥或者上帝永生這一類的知識熏習中久了可能會覺得世間法非常重要外道也著實高明這就有動搖佛法信解的危險了物質方面人當然要穿要吃但佛制比丘們三衣一鉢隨緣度日只要能維持健康就得如穿衣用鉢盛飯菜的器具而重視他的質料光澤不但夠了就算還要多多的積蓄起來那是追求物欲貪心會一天天增長起來心在不純正的知識欲過度的物欲上轉那當然是不清淨了二堅縛如來說出家人有二堅縛堅縛是繫縛得緊緊的不容易擺脫那二種呢一見縛為見解成見所縛自以為然固執不捨那是從多讀世俗外道的書籍而來二利養縛比丘受人的財利供養如衣鉢飲食日用品等如內心的物欲增長就會染著利養為利養所縛佛說利養瘡深如繩索的縛人破皮破肉徹骨徹髓一樣換句話說為財利所迷著了有時看得比生命還重要呢三障如來說出家人有了二縛就會有二障法障礙生死的解脫那二種呢一親近白衣印度的在家人多穿白衣所以白衣即在家人的代名如比丘多讀世俗書籍引起世俗的執見那就會歡喜與在家人往來覺得與在家人在一起臭味相投對一般出家人反而落落難合二憎惡善人自己這樣的俗化腐化言行都不合法度不能自知慚愧就會憎恨厭惡如法的出家在家人對於他善人們不一定有惡意但可能會如法教誡他不肯接受心裡不免相形見絀這才討厭如法的善人四垢如來說出家人有二種垢垢是內心有了嚴重的污垢那二種呢一忍受煩惱煩惱雖是人人都有的但總有多少自覺覺得不好由於執著成見經常與白衣往來內心的煩惱越來越重浪湧波翻一樣久了反而債多不愁蝨多不癢能忍受煩動惱亂而不再有對治厭離的意念到這時內心已經麻木了二貪諸檀越檀越是梵語譯義為施主由於貪著利養也就貪著施主對於有力的施主經常親近以為這是我的施主我的護法如施主而供養別人就會嫉妒於是毀謗同道爭奪護法這些可恥的行為都不斷地造作了五雨雹內心有了深厚污垢進一步會損害自己的善根如天上落下雨冰雹對於結實纍纍的果實萌芽發育的幼苗會給予嚴重的損害或打擊得什麼都完了如來所以說出家人有二雨雹能損壞諸善根那二種呢一敗逆正法這是與佛法相違逆等於反叛了佛教從前劉宋時代有一位慧琳比丘專心世俗學問滿腹的文章經濟大受宋文帝的賞識他參預政治當時稱為黑衣宰相這是好讀外書堅持成見親近白衣忍受煩惱的典型結果他寫了一篇黑白論竟說有些地方佛法還不及儒家這就是敗逆正法了他虧了政治力量的維護否則早就被驅出僧團了二破戒受人信施上是破見這是破戒實在已失去僧格但還俗而營謀生活也並不容易所以依舊賴在僧團中受人信心的布施這怎麼消受得了呢這樣的人損害了自己的善根福德徹底毀滅自己豈不可憐六癰瘡破見破戒而留住僧團的不會身心安樂如生了癰瘡一樣的痛苦所以如來說出家人有二癰瘡那二種呢一求見他人的過失二自己隱覆自己的罪過破見與破戒的僧團會嚴重的勸告諫或者處罰他不知反省的惡比丘唯一的辦法一方面是吹求揭發見別人的過失你還不是一樣某人也是那樣你們為什麼不問僧伽有偏見故意找我為難甚至無中生有誹謗詆毀以轉移人的注意以達到減輕僧伽對自己的壓力一方面自己犯罪作惡決不向人發露而盡量的掩飾覆藏起來以免同道大眾的舉發這樣的自欺欺人內心是怎樣的苦痛不安七燒法如來說出家人有二燒法火一樣的然燒形容身心為煩惱與惡業所逼惱如發高燒一樣這比皮膚上的癰瘡嚴重多了那二種呢求見他過而自覆其罪的人不能懺悔出罪增加僧團的不安他還在一充滿罪惡的垢心受著法衣如法的衣服如安陀會鬱多羅僧伽梨充出家人二自己多犯戒行卻受